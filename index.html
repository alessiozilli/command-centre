<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZCK Command Centre</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .portal-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
        }

        .portal-sigil {
            margin-bottom: 12px;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #990000;
        }

        .portal-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 36px;
        }

        .portal-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .portal-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            text-decoration: none;
            color: #e6edf3;
            transition: border-color 0.2s, background 0.2s;
            cursor: pointer;
        }

        .portal-card:hover {
            border-color: #990000;
            background: #1a1f27;
        }

        .portal-card .icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .portal-card.alessio .icon {
            background: #990000;
            color: #fff;
        }

        .portal-card.reanna .icon {
            background: #f0883e;
            color: #fff;
        }

        .portal-card .info {
            text-align: left;
        }

        .portal-card .name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .portal-card .role {
            font-size: 0.8rem;
            color: #8b949e;
        }

        .portal-card .arrow {
            margin-left: auto;
            color: #8b949e;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .portal-card:hover .arrow {
            color: #e6edf3;
        }
    </style>
</head>
<body>

    <div class="portal-box">
        <div class="portal-sigil">AZCK</div>
        <div class="portal-title">Command Centre</div>

        <div class="portal-cards">
            <a href="alessio.html" class="portal-card alessio">
                <div class="icon">AZ</div>
                <div class="info">
                    <div class="name">Alessio</div>
                    <div class="role">Operations &amp; Forge</div>
                </div>
                <div class="arrow">&rarr;</div>
            </a>
            <a href="reanna.html" class="portal-card reanna">
                <div class="icon">RG</div>
                <div class="info">
                    <div class="name">Reanna</div>
                    <div class="role">Office &amp; Grants</div>
                </div>
                <div class="arrow">&rarr;</div>
            </a>
        </div>
    </div>

    <script>

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmx2bmZzem9oeXJtaXZkaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjkxMTMsImV4cCI6MjA5MDE0NTExM30.o96DFNbBObst0EAmX51rnRFXzu8oTN1o-HNAxN7MY8A';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

</body>
</html>
