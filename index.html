<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Command Centre</title>
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            line-height: 1.6;
            font-size: 16px;
        }

        /* ===== HEADER ===== */
        header {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 2rem 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            flex: 1;
            min-width: 200px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .header-date {
            font-size: 0.95rem;
            color: #8b949e;
            font-weight: 500;
        }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-label {
            color: #8b949e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .status-count {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .status-item.done .status-count {
            color: #3fb950;
        }

        .status-item.synced .status-count {
            color: #8b949e;
            font-size: 0.8rem;
        }

        /* ===== NAVIGATION BAR ===== */
        nav.pill-nav {
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        nav.pill-nav a, nav.pill-nav button {
            padding: 0.5rem 1rem;
            border: 1px solid #30363d;
            border-radius: 20px;
            background-color: transparent;
            color: #8b949e;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        nav.pill-nav a:hover, nav.pill-nav button:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        nav.pill-nav a.active {
            background-color: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
            font-weight: 600;
        }

        /* ===== SUMMARY STATS ===== */
        .summary-stats {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            align-items: center;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-block.done .stat-value {
            color: #3fb950;
        }

        .stat-block.synced .stat-value {
            font-size: 0.9rem;
            color: #8b949e;
        }

        /* ===== CATEGORY TABS ===== */
        .category-tabs {
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-tab {
            padding: 0.5rem 1rem;
            border: 2px solid #30363d;
            border-radius: 6px;
            background-color: transparent;
            color: #e6edf3;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
            user-select: none;
            font-family: inherit;
        }

        .category-tab:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .category-tab.active {
            border-color: #990000;
            background-color: rgba(153, 0, 0, 0.15);
            color: #ff6b6b;
        }

        .category-count {
            font-size: 0.8rem;
            color: #8b949e;
            margin-left: 0.5rem;
        }

        .category-tab.active .category-count {
            color: #ff6b6b;
        }

        .btn-add-category {
            padding: 0.5rem 0.75rem;
            border: 1px dashed #30363d;
            border-radius: 6px;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-add-category:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* ===== MAIN CONTENT ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        .filter-btn.active {
            background-color: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
            font-weight: 600;
        }

        .btn-add-task {
            padding: 0.75rem 1.5rem;
            background-color: #990000;
            color: #e6edf3;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-add-task:hover {
            background-color: #cc0000;
        }

        /* ===== TASK LIST ===== */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-row {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.25rem;
            display: grid;
            grid-template-columns: auto 1fr auto auto auto auto;
            gap: 1rem;
            align-items: center;
            transition: all 0.2s;
        }

        .task-row:hover {
            border-color: #58a6ff;
            background-color: #0d1117;
        }

        .task-row.done {
            opacity: 0.6;
        }

        .task-row.done .task-title {
            text-decoration: line-through;
            color: #8b949e;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3fb950;
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            color: #e6edf3;
            font-size: 0.95rem;
        }

        .task-notes {
            font-size: 0.85rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .priority-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .priority-badge.high {
            background-color: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }

        .priority-badge.medium {
            background-color: rgba(240, 136, 62, 0.15);
            color: #f0883e;
        }

        .priority-badge.low {
            background-color: rgba(139, 148, 158, 0.15);
            color: #8b949e;
        }

        .task-date {
            font-size: 0.85rem;
            color: #8b949e;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-task-action {
            padding: 0.4rem 0.8rem;
            border: 1px solid #30363d;
            border-radius: 4px;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-task-action:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        .btn-task-action.delete:hover {
            color: #f85149;
            border-color: #f85149;
        }

        /* ===== EDIT FORM (INLINE) ===== */
        .task-edit-form {
            grid-column: 1 / -1;
            background-color: #0d1117;
            border: 1px solid #58a6ff;
            border-radius: 6px;
            padding: 1rem;
            display: grid;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #58a6ff;
            outline: none;
            background-color: #0d1117;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn-save, .btn-cancel {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-save {
            background-color: #58a6ff;
            color: #0d1117;
        }

        .btn-save:hover {
            background-color: #79c0ff;
        }

        .btn-cancel {
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .btn-cancel:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #e6edf3;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn-confirm {
            padding: 0.75rem 1.5rem;
            background-color: #f85149;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-confirm:hover {
            background-color: #fc6d71;
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        /* ===== ADD CATEGORY FORM ===== */
        .category-form {
            display: grid;
            gap: 1rem;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .color-picker-input {
            width: 50px;
            height: 50px;
            border: 2px solid #30363d;
            border-radius: 4px;
            cursor: pointer;
        }

        /* ===== CONTEXT MENU ===== */
        .context-menu {
            display: none;
            position: fixed;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            min-width: 150px;
        }

        .context-menu.active {
            display: block;
        }

        .context-menu-item {
            padding: 0.75rem 1rem;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #30363d;
        }

        .context-menu-item:last-child {
            border-bottom: none;
        }

        .context-menu-item:hover {
            background-color: #0d1117;
            color: #e6edf3;
        }

        .context-menu-item.delete:hover {
            color: #f85149;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #8b949e;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state-text {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .status-bar {
                justify-content: space-around;
                width: 100%;
                gap: 0.75rem;
            }

            .status-item {
                flex-direction: row;
                gap: 0.5rem;
            }

            .status-label {
                font-size: 0.7rem;
            }

            .task-row {
                grid-template-columns: auto 1fr;
                gap: 0.75rem;
            }

            .task-meta {
                grid-column: 1 / -1;
                gap: 0.75rem;
            }

            .task-actions {
                grid-column: 1 / -1;
            }

            .priority-badge {
                font-size: 0.75rem;
                padding: 0.2rem 0.6rem;
            }

            .category-tabs {
                padding: 1rem;
                overflow-x: auto;
            }

            .container {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            .summary-stats {
                padding: 1rem;
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .filter-bar {
                gap: 0.5rem;
            }

            .filter-btn {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }

            .btn-add-task {
                width: 100%;
            }

            nav.pill-nav {
                padding: 0.75rem 1rem;
                gap: 0.5rem;
            }

            nav.pill-nav a, nav.pill-nav button {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }
        }
        /* ===== LOGIN GATE ===== */
        #loginGate {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #loginGate.hidden { display: none; }
        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        .login-box h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            color: #e6edf3;
        }
        .login-box .login-sub {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 28px;
        }
        .login-box input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 0.15em;
        }
        .login-box input[type="password"]:focus {
            border-color: #990000;
        }
        .login-box .login-btn {
            width: 100%;
            padding: 12px;
            background: #990000;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.03em;
        }
        .login-box .login-btn:hover { background: #b30000; }
        .login-box .login-error {
            color: #f85149;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }
        .login-box .login-icon {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .login-box .login-icon svg {
            width: 160px;
            height: 160px;
            filter: drop-shadow(0 0 24px rgba(153, 0, 0, 0.35));
        }
        /* === SIGIL ANIMATIONS === */

        /* The whole sigil breathes — nothing changes but everything is in motion */
        .sigil-core { animation: sigilBreathe 6s ease-in-out infinite; transform-origin: 50px 50px; }
        @keyframes sigilBreathe { 0%,100%{ opacity:0.85; } 50%{ opacity:1; } }

        /* Parallel paths — related but each on its own track */
        .path-a { animation: pathDrift 28s linear infinite; transform-origin: 50px 50px; }
        .path-b { animation: pathDrift 28s linear infinite reverse; transform-origin: 50px 50px; }
        .path-c { animation: pathDriftC 36s linear infinite; transform-origin: 50px 50px; }
        @keyframes pathDrift { to { transform: rotate(360deg); } }
        @keyframes pathDriftC { to { transform: rotate(360deg); } }

        /* Counter-rotating rings — attracted by the rejection */
        .counter-ring { animation: counterSpin 35s linear infinite; transform-origin: 50px 50px; }
        @keyframes counterSpin { to { transform: rotate(-360deg); } }
        .counter-ring-2 { animation: counterSpin2 22s linear infinite; transform-origin: 50px 50px; }
        @keyframes counterSpin2 { to { transform: rotate(-360deg); } }

        /* Orbit pulses — each force on its own timing */
        .orb-a { animation: orbPulse 4s ease-in-out infinite; }
        .orb-b { animation: orbPulse 4s ease-in-out infinite 0.6s; }
        .orb-c { animation: orbPulse 4s ease-in-out infinite 1.2s; }
        .orb-d { animation: orbPulse 4s ease-in-out infinite 1.8s; }
        .orb-e { animation: orbPulse 4s ease-in-out infinite 2.4s; }
        .orb-f { animation: orbPulse 4s ease-in-out infinite 3.0s; }
        .orb-g { animation: orbPulse 4s ease-in-out infinite 3.6s; }
        @keyframes orbPulse { 0%,100%{ opacity:0.4; } 50%{ opacity:0.85; } }

        /* Wandering particles — separated but not alone */
        .particle-1 { animation: pSpin1 9s linear infinite; transform-origin: 50px 50px; }
        .particle-2 { animation: pSpin2 14s linear infinite; transform-origin: 50px 50px; }
        .particle-3 { animation: pSpin3 7s linear infinite; transform-origin: 50px 50px; }
        .particle-4 { animation: pSpin4 11s linear infinite; transform-origin: 50px 50px; }
        .particle-5 { animation: pSpin5 18s linear infinite; transform-origin: 50px 50px; }
        @keyframes pSpin1 { to { transform: rotate(360deg); } }
        @keyframes pSpin2 { to { transform: rotate(-360deg); } }
        @keyframes pSpin3 { to { transform: rotate(360deg); } }
        @keyframes pSpin4 { to { transform: rotate(-360deg); } }
        @keyframes pSpin5 { to { transform: rotate(360deg); } }

        /* X remains the same — the core never moves */
        .energy-core { animation: corePulse 4s ease-in-out infinite; }
        @keyframes corePulse { 0%,100%{ r:2.5; opacity:0.6; } 50%{ r:4; opacity:1; } }

        /* Arc segments — broken circles, never complete */
        .arc-a { animation: arcGlow 8s ease-in-out infinite; }
        .arc-b { animation: arcGlow 8s ease-in-out infinite 2.7s; }
        .arc-c { animation: arcGlow 8s ease-in-out infinite 5.3s; }
        @keyframes arcGlow { 0%,100%{ stroke-opacity:0.75; } 50%{ stroke-opacity:0.95; } }

        /* Inner ring pulse — withdrawn to what remains */
        .inner-pulse { animation: innerGlow 6s ease-in-out infinite; }
        @keyframes innerGlow { 0%,100%{ opacity:0.2; } 50%{ opacity:0.5; } }
        #appContent { display: none; }
        #appContent.visible { display: block; }
    </style>
</head>
<body>

    <!-- ===== LOGIN GATE ===== -->
    <div id="loginGate">
        <div class="login-box">
            <div class="login-icon">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#ff4422" stop-opacity="0.9"/>
                            <stop offset="35%" stop-color="#990000" stop-opacity="0.4"/>
                            <stop offset="100%" stop-color="#990000" stop-opacity="0"/>
                        </radialGradient>
                        <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#990000" stop-opacity="0.1"/>
                            <stop offset="100%" stop-color="#990000" stop-opacity="0"/>
                        </radialGradient>
                    </defs>

                    <g class="sigil-core">

                        <!-- ============================================
                             "Nothing changes but everything is in motion"
                             ============================================ -->

                        <!-- L1: Aura — the field of constant -->
                        <circle cx="50" cy="50" r="49" fill="url(#auraGrad)"/>

                        <!-- L2: 7 Atom orbits — "all forces related but each on its own track" -->

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // === SUPABASE CONFIG (uncomment when ready) ===
        // const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        // const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        // const USE_SUPABASE = true;

        // ===== CONSTANTS & STORAGE =====
        const STORAGE_KEY = 'azck-command-centre';
        const DEFAULT_CATEGORIES = [
            { id: 1, name: 'Personal', color: '#58a6ff', sortOrder: 1 },
            { id: 2, name: 'AZ Custom Knives', color: '#990000', sortOrder: 2 },
            { id: 3, name: 'Quad Fang', color: '#FC4C02', sortOrder: 3 },
            { id: 4, name: '3D Printing', color: '#bc8cff', sortOrder: 4 },
            { id: 5, name: 'Family', color: '#3fb950', sortOrder: 5 }
        ];

        const DEFAULT_TASKS = [
            {
                id: 1,
                categoryId: 1,
                title: 'Amazon returns at Staples',
                notes: '',
                priority: 'high',
                status: 'open',
                dueDate: '2026-04-01',
                createdAt: new Date('2026-04-01').toISOString(),
                completedAt: null
            },
            {
                id: 2,
                categoryId: 1,
                title: 'Home Depot returns',
                notes: 'Return items before deadline',
                priority: 'high',
                status: 'open',
                dueDate: '2026-04-02',
                createdAt: new Date('2026-04-02').toISOString(),
                completedAt: null
            },
            {
                id: 3,
                categoryId: 1,
                title: 'Replace kitchen faucet / sink',
                notes: 'Return current faucet to Costco. Buy a working replacement. May need copper soldering and shark bite',
                priority: 'high',
                status: 'open',
                dueDate: null,
                createdAt: new Date().toISOString(),
                completedAt: null
            }
        ];

        // ===== STATE MANAGEMENT =====
        let appState = {
            categories: [],
            tasks: [],
            activeCategory: null,
            activeFilter: 'all',
            editingTaskId: null,
            lastSynced: null,
            nextId: 100
        };

        // ===== UTILITY FUNCTIONS =====
        function formatDate(dateString) {
            if (!dateString) return null;
            const date = new Date(dateString);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const dateOnly = new Date(date);
            dateOnly.setHours(0, 0, 0, 0);

            if (dateOnly.getTime() === today.getTime()) return 'Today';
            if (dateOnly.getTime() === yesterday.getTime()) return 'Yesterday';
            if (dateOnly.getTime() === tomorrow.getTime()) return 'Tomorrow';

            const daysAgo = Math.floor((today - dateOnly) / (1000 * 60 * 60 * 24));
            const daysUntil = Math.floor((dateOnly - today) / (1000 * 60 * 60 * 24));

            if (daysAgo > 0) return `${daysAgo}d ago`;
            if (daysUntil > 0) return `in ${daysUntil}d`;

            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function getRelativeDateInfo(dateString) {
            if (!dateString) return { type: 'none', days: 0 };
            const date = new Date(dateString);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dateOnly = new Date(date);
            dateOnly.setHours(0, 0, 0, 0);

            const daysOffset = Math.floor((dateOnly - today) / (1000 * 60 * 60 * 24));

            if (daysOffset === 0) return { type: 'today', days: 0 };
            if (daysOffset < 0) return { type: 'overdue', days: daysOffset };
            if (daysOffset <= 7) return { type: 'week', days: daysOffset };
            return { type: 'future', days: daysOffset };
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function initializeData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                appState.categories = data.categories || DEFAULT_CATEGORIES;
                appState.tasks = data.tasks || [];
                appState.lastSynced = data.lastSynced || null;
                appState.nextId = data.nextId || 100;
            } else {
                appState.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
                appState.tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
                appState.nextId = 100;
                saveData();
            }
            if (appState.categories.length > 0) {
                appState.activeCategory = appState.categories[0].id;
            }
        }

        function saveData() {
            appState.lastSynced = new Date().toISOString();
            const data = {
                categories: appState.categories,
                tasks: appState.tasks,
                lastSynced: appState.lastSynced,
                nextId: appState.nextId
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateSyncDisplay();
        }

        // ===== RENDER FUNCTIONS =====
        function updateHeaderDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('headerDate').textContent = dateStr;
        }

        function updateStatusBar() {
            const openTasks = appState.tasks.filter(t => t.status === 'open').length;
            const doneTasks = appState.tasks.filter(t => t.status === 'done').length;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayTasks = appState.tasks.filter(t => {
                if (!t.dueDate) return false;
                const dueDate = new Date(t.dueDate);
                dueDate.setHours(0, 0, 0, 0);
                return dueDate.getTime() === today.getTime();
            }).length;

            document.getElementById('statusOpen').textContent = openTasks;
            document.getElementById('statusToday').textContent = todayTasks;
            document.getElementById('statusDone').textContent = doneTasks;

            updateSyncDisplay();
            updateSummaryStats();
        }

        function updateSyncDisplay() {
            if (!appState.lastSynced) {
                document.getElementById('statusSynced').textContent = '—';
                document.getElementById('statLastUpdated').textContent = 'Never';
            } else {
                const now = new Date();
                const synced = new Date(appState.lastSynced);
                const diffMinutes = Math.floor((now - synced) / 60000);

                let timeStr = 'just now';
                if (diffMinutes > 0 && diffMinutes < 60) {
                    timeStr = `${diffMinutes}m ago`;
                } else if (diffMinutes >= 60) {
                    const diffHours = Math.floor(diffMinutes / 60);
                    timeStr = `${diffHours}h ago`;
                }

                document.getElementById('statusSynced').textContent = timeStr;
                document.getElementById('statLastUpdated').textContent = timeStr;
            }
        }

        function updateSummaryStats() {
            const openTasks = appState.tasks.filter(t => t.status === 'open').length;
            const doneTasks = appState.tasks.filter(t => t.status === 'done').length;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const nextWeek = new Date(today);
            nextWeek.setDate(nextWeek.getDate() + 7);

            const dueThisWeek = appState.tasks.filter(t => {
                if (!t.dueDate || t.status === 'done') return false;
                const dueDate = new Date(t.dueDate);
                dueDate.setHours(0, 0, 0, 0);
                return dueDate >= today && dueDate < nextWeek;
            }).length;

            document.getElementById('statTotalOpen').textContent = openTasks;
            document.getElementById('statDueWeek').textContent = dueThisWeek;
            document.getElementById('statCompleted').textContent = doneTasks;
        }

        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = '';

            appState.categories.forEach(cat => {
                const button = document.createElement('button');
                button.className = `category-tab ${cat.id === appState.activeCategory ? 'active' : ''}`;
                button.dataset.categoryId = cat.id;

                const count = appState.tasks.filter(t => t.categoryId === cat.id).length;
                button.innerHTML = `${cat.name} <span class="category-count">(${count})</span>`;

                button.addEventListener('click', () => {
                    appState.activeCategory = cat.id;
                    appState.activeFilter = 'all';
                    renderCategoryTabs();
                    renderTasks();
                    updateFilterButtons();
                });

                button.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showCategoryContextMenu(e, cat.id);
                });

                button.addEventListener('long', (e) => {
                    showCategoryContextMenu(e, cat.id);
                });

                container.appendChild(button);
            });

            // Add category button
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add-category';
            addBtn.textContent = '+ Category';
            addBtn.addEventListener('click', showAddCategoryModal);
            container.appendChild(addBtn);
        }

        function renderTasks() {
            const container = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            let filteredTasks = appState.tasks.filter(t => t.categoryId === appState.activeCategory);

            if (appState.activeFilter === 'open') {
                filteredTasks = filteredTasks.filter(t => t.status === 'open');
            } else if (appState.activeFilter === 'high') {
                filteredTasks = filteredTasks.filter(t => t.priority === 'high' && t.status === 'open');
            } else if (appState.activeFilter === 'done') {
                filteredTasks = filteredTasks.filter(t => t.status === 'done');
            }

            if (filteredTasks.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            filteredTasks.forEach(task => {
                const row = document.createElement('div');
                row.className = `task-row ${task.status === 'done' ? 'done' : ''}`;
                row.dataset.taskId = task.id;

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.status === 'done';
                checkbox.addEventListener('change', () => {
                    task.status = checkbox.checked ? 'done' : 'open';
                    task.completedAt = checkbox.checked ? new Date().toISOString() : null;
                    saveData();
                    updateStatusBar();
                    renderTasks();
                });

                const content = document.createElement('div');
                content.className = 'task-content';

                const title = document.createElement('div');
                title.className = 'task-title';
                title.textContent = task.title;

                if (task.notes) {
                    const notes = document.createElement('div');
                    notes.className = 'task-notes';
                    notes.textContent = task.notes;
                    content.appendChild(title);
                    content.appendChild(notes);
                } else {
                    content.appendChild(title);
                }

                const meta = document.createElement('div');
                meta.className = 'task-meta';

                const priorityBadge = document.createElement('span');
                priorityBadge.className = `priority-badge ${task.priority}`;
                priorityBadge.textContent = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);
                meta.appendChild(priorityBadge);

                if (task.dueDate) {
                    const dateSpan = document.createElement('span');
                    dateSpan.className = 'task-date';
                    dateSpan.textContent = formatDate(task.dueDate);
                    meta.appendChild(dateSpan);
                }

                const actions = document.createElement('div');
                actions.className = 'task-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'btn-task-action';
                editBtn.textContent = 'Edit';
                editBtn.addEventListener('click', () => showEditForm(task.id));
                actions.appendChild(editBtn);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-task-action delete';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', () => confirmDelete(task.id));
                actions.appendChild(deleteBtn);

                row.appendChild(checkbox);
                row.appendChild(content);
                row.appendChild(meta);
                row.appendChild(actions);

                container.appendChild(row);

                // Show edit form if this task is being edited
                if (appState.editingTaskId === task.id) {
                    const editForm = createEditForm(task);
                    const formRow = document.createElement('div');
                    formRow.className = 'task-row';
                    formRow.appendChild(editForm);
                    container.appendChild(formRow);
                }
            });
        }

        function createEditForm(task) {
            const form = document.createElement('div');
            form.className = 'task-edit-form';

            const titleGroup = document.createElement('div');
            titleGroup.className = 'form-group';
            titleGroup.innerHTML = '<label for="editTitle">Task Title</label>';
            const titleInput = document.createElement('input');
            titleInput.type = 'text';
            titleInput.id = 'editTitle';
            titleInput.value = task.title;
            titleGroup.appendChild(titleInput);
            form.appendChild(titleGroup);

            const notesGroup = document.createElement('div');
            notesGroup.className = 'form-group';
            notesGroup.innerHTML = '<label for="editNotes">Notes</label>';
            const notesInput = document.createElement('textarea');
            notesInput.id = 'editNotes';
            notesInput.value = task.notes || '';
            notesGroup.appendChild(notesInput);
            form.appendChild(notesGroup);

            const priorityGroup = document.createElement('div');
            priorityGroup.className = 'form-group';
            priorityGroup.innerHTML = '<label for="editPriority">Priority</label>';
            const prioritySelect = document.createElement('select');
            prioritySelect.id = 'editPriority';
            ['low', 'medium', 'high'].forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p.charAt(0).toUpperCase() + p.slice(1);
                opt.selected = p === task.priority;
                prioritySelect.appendChild(opt);
            });
            priorityGroup.appendChild(prioritySelect);
            form.appendChild(priorityGroup);

            const dueDateGroup = document.createElement('div');
            dueDateGroup.className = 'form-group';
            dueDateGroup.innerHTML = '<label for="editDueDate">Due Date (optional)</label>';
            const dueDateInput = document.createElement('input');
            dueDateInput.type = 'date';
            dueDateInput.id = 'editDueDate';
            dueDateInput.value = task.dueDate || '';
            dueDateGroup.appendChild(dueDateInput);
            form.appendChild(dueDateGroup);

            const buttonGroup = document.createElement('div');
            buttonGroup.className = 'form-buttons';

            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn-save';
            saveBtn.type = 'button';
            saveBtn.textContent = 'Save';
            saveBtn.addEventListener('click', () => {
                task.title = titleInput.value || 'Untitled Task';
                task.notes = notesInput.value;
                task.priority = prioritySelect.value;
                task.dueDate = dueDateInput.value || null;
                appState.editingTaskId = null;
                saveData();
                updateStatusBar();
                renderTasks();
            });
            buttonGroup.appendChild(saveBtn);

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'btn-cancel';
            cancelBtn.type = 'button';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.addEventListener('click', () => {
                appState.editingTaskId = null;
                renderTasks();
            });
            buttonGroup.appendChild(cancelBtn);

            form.appendChild(buttonGroup);
            return form;
        }

        function showEditForm(taskId) {
            appState.editingTaskId = taskId;
            renderTasks();
        }

        function confirmDelete(taskId) {
            const task = appState.tasks.find(t => t.id === taskId);
            if (!task) return;

            showConfirmModal(
                'Delete Task',
                `Are you sure you want to delete "${task.title}"? This cannot be undone.`,
                () => {
                    appState.tasks = appState.tasks.filter(t => t.id !== taskId);
                    saveData();
                    updateStatusBar();
                    renderTasks();
                }
            );
        }

        // ===== MODAL & FORM HANDLERS =====
        function showConfirmModal(title, message, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;

            document.getElementById('btnConfirmCancel').onclick = () => {
                modal.classList.remove('active');
            };

            document.getElementById('btnConfirmOK').onclick = () => {
                modal.classList.remove('active');
                onConfirm();
            };

            modal.classList.add('active');
        }

        function showAddCategoryModal() {
            const modal = document.getElementById('categoryModal');
            document.getElementById('categoryModalTitle').textContent = 'Add Category';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryColor').value = '#58a6ff';
            document.getElementById('colorValue').textContent = '#58a6ff';

            const form = document.getElementById('categoryForm');
            form.onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('categoryName').value.trim();
                const color = document.getElementById('categoryColor').value;

                if (!name) return;

                const newCategory = {
                    id: appState.nextId++,
                    name,
                    color,
                    sortOrder: appState.categories.length + 1
                };

                appState.categories.push(newCategory);
                saveData();
                renderCategoryTabs();
                modal.classList.remove('active');
            };

            document.getElementById('btnCategoryCancel').onclick = () => {
                modal.classList.remove('active');
            };

            document.getElementById('categoryColor').addEventListener('input', (e) => {
                document.getElementById('colorValue').textContent = e.target.value;
            });

            modal.classList.add('active');
            document.getElementById('categoryName').focus();
        }

        function showCategoryContextMenu(e, categoryId) {
            const menu = document.getElementById('contextMenu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.add('active');

            const category = appState.categories.find(c => c.id === categoryId);
            if (!category) return;

            document.getElementById('contextRename').onclick = () => {
                menu.classList.remove('active');
                const newName = prompt('Rename category:', category.name);
                if (newName && newName.trim()) {
                    category.name = newName.trim();
                    saveData();
                    renderCategoryTabs();
                }
            };

            document.getElementById('contextDelete').onclick = () => {
                menu.classList.remove('active');
                showConfirmModal(
                    'Delete Category',
                    `Delete "${category.name}"? All tasks in this category will be deleted.`,
                    () => {
                        appState.categories = appState.categories.filter(c => c.id !== categoryId);
                        appState.tasks = appState.tasks.filter(t => t.categoryId !== categoryId);
                        if (appState.activeCategory === categoryId) {
                            appState.activeCategory = appState.categories[0]?.id || null;
                        }
                        saveData();
                        updateStatusBar();
                        renderCategoryTabs();
                        renderTasks();
                    }
                );
            };

            document.addEventListener('click', (e) => {
                if (e.target !== menu && !menu.contains(e.target)) {
                    menu.classList.remove('active');
                }
            }, { once: true });
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const filter = btn.dataset.filter;
                btn.classList.toggle('active', filter === appState.activeFilter);
            });
        }

        // ===== EVENT LISTENERS =====
        document.addEventListener('DOMContentLoaded', () => {
            initializeData();
            updateHeaderDate();
            updateStatusBar();
            renderCategoryTabs();
            renderTasks();

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    appState.activeFilter = btn.dataset.filter;
                    updateFilterButtons();
                    renderTasks();
                });
            });

            // Add task button
            document.getElementById('btnAddTask').addEventListener('click', () => {
                const newTask = {
                    id: appState.nextId++,
                    categoryId: appState.activeCategory,
                    title: '',
                    notes: '',
                    priority: 'medium',
                    status: 'open',
                    dueDate: null,
                    createdAt: new Date().toISOString(),
                    completedAt: null
                };

                appState.tasks.push(newTask);
                appState.editingTaskId = newTask.id;
                saveData();
                renderTasks();
                updateStatusBar();
            });

            // Update sync display periodically
            setInterval(updateSyncDisplay, 60000);
        });

        // Close modals on outside click
        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target.id === 'confirmModal') {
                e.target.classList.remove('active');
            }
        });

        document.getElementById('categoryModal').addEventListener('click', (e) => {
            if (e.target.id === 'categoryModal') {
                e.target.classList.remove('active');
            }
        });

        // Close context menu on click outside
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('contextMenu');
            if (!menu.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>

    </div><!-- end #appContent -->

    <!-- ===== LOGIN GATE SCRIPT ===== -->
    <script>
    // ============================================================
    // PASSWORD GATE
    // Uses SHA-256 hash — password is NOT stored in plain text.
    // To change the password:
    //   1. Open browser console on any page
    //   2. Run: crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_NEW_PASSWORD')).then(h => console.log(Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('')))
    //   3. Copy the hash and replace PASSWORD_HASH below
    //
    // Current password: azck2026
    // (Delete this comment after you've memorised it)
    // ============================================================
    const PASSWORD_HASH = 'f70972e48319bfe1952e027e425600edc9e95863c84db43366fa110b7a3a4336';
    const SESSION_KEY = 'azck-cc-auth';
    const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24 hours

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function checkExistingSession() {
        const session = localStorage.getItem(SESSION_KEY);
        if (session) {
            try {
                const { hash, expires } = JSON.parse(session);
                if (hash === PASSWORD_HASH && Date.now() < expires) {
                    unlockApp();
                    return;
                }
            } catch(e) {}
            localStorage.removeItem(SESSION_KEY);
        }
    }

    function unlockApp() {
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('appContent').classList.add('visible');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const pw = document.getElementById('loginPassword').value;
        const hash = await sha256(pw);
        if (hash === PASSWORD_HASH) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({
                hash: PASSWORD_HASH,
                expires: Date.now() + SESSION_DURATION
            }));
            unlockApp();
        } else {
            document.getElementById('loginError').textContent = 'Wrong password. Try again.';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginPassword').focus();
        }
        return false;
    }

    // Check on page load — skip login if session is still valid
    checkExistingSession();
    </script>
