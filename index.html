<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZCK Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        .login-icon {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .login-icon svg {
            width: 160px;
            height: 160px;
            filter: drop-shadow(0 0 24px rgba(153, 0, 0, 0.35));
        }

        /* === SIGIL ANIMATIONS === */
        .sigil-core { animation: sigilBreathe 6s ease-in-out infinite; transform-origin: 50px 50px; }
        @keyframes sigilBreathe { 0%,100%{ opacity:0.85; } 50%{ opacity:1; } }

        .path-a { animation: pathDrift 28s linear infinite; transform-origin: 50px 50px; }
        .path-b { animation: pathDrift 28s linear infinite reverse; transform-origin: 50px 50px; }
        .path-c { animation: pathDriftC 36s linear infinite; transform-origin: 50px 50px; }
        @keyframes pathDrift { to { transform: rotate(360deg); } }
        @keyframes pathDriftC { to { transform: rotate(360deg); } }

        .counter-ring { animation: counterSpin 35s linear infinite; transform-origin: 50px 50px; }
        @keyframes counterSpin { to { transform: rotate(-360deg); } }
        .counter-ring-2 { animation: counterSpin2 22s linear infinite; transform-origin: 50px 50px; }
        @keyframes counterSpin2 { to { transform: rotate(-360deg); } }

        .orb-a { animation: orbPulse 4s ease-in-out infinite; }
        .orb-b { animation: orbPulse 4s ease-in-out infinite 0.6s; }
        .orb-c { animation: orbPulse 4s ease-in-out infinite 1.2s; }
        .orb-d { animation: orbPulse 4s ease-in-out infinite 1.8s; }
        .orb-e { animation: orbPulse 4s ease-in-out infinite 2.4s; }
        .orb-f { animation: orbPulse 4s ease-in-out infinite 3.0s; }
        .orb-g { animation: orbPulse 4s ease-in-out infinite 3.6s; }
        @keyframes orbPulse { 0%,100%{ opacity:0.4; } 50%{ opacity:0.85; } }

        .particle-1 { animation: pSpin1 9s linear infinite; transform-origin: 50px 50px; }
        .particle-2 { animation: pSpin2 14s linear infinite; transform-origin: 50px 50px; }
        .particle-3 { animation: pSpin3 7s linear infinite; transform-origin: 50px 50px; }
        .particle-4 { animation: pSpin4 11s linear infinite; transform-origin: 50px 50px; }
        .particle-5 { animation: pSpin5 18s linear infinite; transform-origin: 50px 50px; }
        @keyframes pSpin1 { to { transform: rotate(360deg); } }
        @keyframes pSpin2 { to { transform: rotate(-360deg); } }
        @keyframes pSpin3 { to { transform: rotate(360deg); } }
        @keyframes pSpin4 { to { transform: rotate(-360deg); } }
        @keyframes pSpin5 { to { transform: rotate(360deg); } }

        .energy-core { animation: corePulse 4s ease-in-out infinite; }
        @keyframes corePulse { 0%,100%{ r:2.5; opacity:0.6; } 50%{ r:4; opacity:1; } }

        .arc-a { animation: arcGlow 8s ease-in-out infinite; }
        .arc-b { animation: arcGlow 8s ease-in-out infinite 2.7s; }
        .arc-c { animation: arcGlow 8s ease-in-out infinite 5.3s; }
        @keyframes arcGlow { 0%,100%{ stroke-opacity:0.75; } 50%{ stroke-opacity:0.95; } }

        .inner-pulse { animation: innerGlow 6s ease-in-out infinite; }
        @keyframes innerGlow { 0%,100%{ opacity:0.2; } 50%{ opacity:0.5; } }

        .login-box input[type="email"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 1rem;
            margin-bottom: 0.75rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            border-color: #990000;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #990000;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        .login-btn:hover { background: #b30000; }

        .login-error {
            color: #f85149;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .login-loading {
            display: none;
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .login-loading.active { display: block; }
    </style>
</head>
<body>

                    </g>
                    <g class="path-b">
                        <ellipse cx="50" cy="50" rx="26" ry="8" fill="none" stroke="#58a6ff" stroke-width="0.6" opacity="0.45" transform="rotate(90 50 50)"/>

                    </g>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="#e6edf3" stroke-width="0.3" opacity="0.12"/>
                    <path class="arc-a" d="M50 22 L78 50 L50 78 L22 50 Z" fill="none" stroke="#990000" stroke-width="1.35" opacity="0.65"/>
                    <line x1="3" y1="50" x2="35" y2="50" stroke="#e6edf3" stroke-width="0.35" opacity="0.1"/>
                    <line x1="65" y1="50" x2="97" y2="50" stroke="#e6edf3" stroke-width="0.35" opacity="0.1"/>
                    <line x1="50" y1="3" x2="50" y2="35" stroke="#e6edf3" stroke-width="0.35" opacity="0.1"/>
                    <line x1="50" y1="65" x2="50" y2="97" stroke="#e6edf3" stroke-width="0.35" opacity="0.1"/>
                    <circle class="inner-pulse" cx="50" cy="50" r="15" fill="none" stroke="#990000" stroke-width="0.6" opacity="0.35"/>
                    <circle cx="50" cy="50" r="10" fill="none" stroke="#d4a84b" stroke-width="0.3" stroke-dasharray="1.5 5" opacity="0.3"/>
                    <circle cx="50" cy="50" r="7" fill="url(#coreGrad)"/>
                    <circle class="energy-core" cx="50" cy="50" r="2.5" fill="#ff4422" opacity="0.6"/>
                    <circle cx="48.5" cy="48" r="0.8" fill="rgba(212,168,75,0.2)"/>
                </g>
            </svg>
        </div>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        <div class="login-error" id="loginError"></div>
        <div class="login-loading" id="loginLoading">Signing in...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twrlvnfszohyrmivdhre.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmx2bmZzem9oeXJtaXZkaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjkxMTMsImV4cCI6MjA5MDE0NTExM30.o96DFNbBObst0EAmX51rnRFXzu8oTN1o-HNAxN7MY8A';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ROUTES = {
            'admin@azcustomknives.com': 'reanna.html',
            'alessio.zilli@azcustomknives.com': 'alessio.html'
        };
        const DEFAULT_ROUTE = 'alessio.html';

        // No auto-redirect — always show login screen

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pw = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const loadingEl = document.getElementById('loginLoading');

            errorEl.textContent = '';
            loadingEl.classList.add('active');

            const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

            loadingEl.classList.remove('active');

            if (error) {
                errorEl.textContent = error.message || 'Sign in failed.';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
                return;
            }

            const userEmail = data.user.email.toLowerCase();
            const dest = ROUTES[userEmail] || DEFAULT_ROUTE;
            window.location.href = dest;
        });
    </script>

</body>
</html>
