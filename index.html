<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Command Centre — Alessio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Lexend+Mega:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --az:#990000;--qf:#c4922a;--per:#3a7fbf;--td:#2a9e8f;--fam:#9b72cf;
  --bg:#0f0f0f;--surf:#1a1a1a;--surf2:#242424;--surf3:#2e2e2e;
  --text:#f0ede8;--text2:#a09c96;--text3:#6a6762;--border:#2e2e2e;
  --r:10px;--font:'Lexend',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.75;letter-spacing:0.02em;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surf);flex-wrap:wrap;gap:12px}
.hdr-left{display:flex;flex-direction:column}
.brand{font-family:'Lexend Mega',sans-serif;font-size:15px;letter-spacing:0.07em;color:var(--text)}
.datelbl{font-size:11px;color:var(--text3);font-weight:300;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:20px}
.hdr-stats{display:flex;gap:18px}
.stat{font-size:12px;color:var(--text3)}
.stat strong{color:var(--text2);font-weight:500}
.sync-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);font-weight:400;letter-spacing:0.01em}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--td);flex-shrink:0;transition:background .3s}
.sync-dot.saving{background:var(--qf);animation:pulse .6s ease-in-out}
.sync-dot.error{background:#e05555}
.sync-label{transition:opacity .2s}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surf);overflow-x:auto}
.tab{padding:10px 22px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:var(--font);letter-spacing:0.02em;position:relative;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--text2)}
.tab.a-per{color:var(--per)}.tab.a-az{color:var(--az)}.tab.a-qf{color:var(--qf)}.tab.a-td{color:var(--td)}.tab.a-fam{color:var(--fam)}
.tab.a-per::after,.tab.a-az::after,.tab.a-qf::after,.tab.a-td::after,.tab.a-fam::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.tab.a-per::after{background:var(--per)}.tab.a-az::after{background:var(--az)}.tab.a-qf::after{background:var(--qf)}.tab.a-td::after{background:var(--td)}.tab.a-fam::after{background:var(--fam)}
.tc{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.tc-per{background:var(--per)}.tc-az{background:var(--az)}.tc-qf{background:var(--qf)}.tc-td{background:var(--td)}.tc-fam{background:var(--fam)}

/* MAIN */
.main{flex:1;padding:24px;max-width:900px;width:100%;margin:0 auto}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.pt{font-size:20px;font-weight:600}
.pt small{font-weight:300;font-size:13px;color:var(--text3);margin-left:8px}
.add-btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);letter-spacing:0.02em;display:flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.85}
.ab-per{background:var(--per);color:#fff}.ab-az{background:var(--az);color:#fff}
.ab-qf{background:var(--qf);color:#1a0e00}.ab-td{background:var(--td);color:#fff}.ab-fam{background:var(--fam);color:#fff}

/* STATS ROW */
.sr{display:flex;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.sr span{font-size:12px;color:var(--text3)}
.sr strong{color:var(--text2);font-weight:500}

/* PROGRESS */
.pb-wrap{height:3px;background:var(--surf3);border-radius:2px;margin-bottom:14px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width .3s}
.pb-per{background:var(--per)}.pb-az{background:var(--az)}.pb-qf{background:var(--qf)}.pb-td{background:var(--td)}.pb-fam{background:var(--fam)}

/* FILTER BUTTONS */
.fb{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.fb-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.fb-btn:hover{border-color:var(--text3)}
.fb-btn.on{color:#fff;border-color:transparent}
.fb-per.on{background:var(--per)}.fb-az.on{background:var(--az)}.fb-qf.on{background:var(--qf)}.fb-td.on{background:var(--td)}.fb-fam.on{background:var(--fam)}

/* TASK CARDS */
.tg{display:flex;flex-direction:column;gap:8px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;border-left:3px solid transparent;transition:background .15s}
.card:hover{background:var(--surf2)}
.bl-per{border-left-color:var(--per)}.bl-az{border-left-color:var(--az)}.bl-qf{border-left-color:var(--qf)}.bl-td{border-left-color:var(--td)}.bl-fam{border-left-color:var(--fam)}
.card.done-card{opacity:.45}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .15s}
.chk:hover{border-color:var(--text3)}
.chk.checked{border-color:var(--td);color:var(--td)}
.tb{flex:1;min-width:0}
.tt{font-size:14px;font-weight:500;margin-bottom:2px}
.tn{font-size:12px;color:var(--text3);line-height:1.5}
.ta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pri{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:3px 8px;border-radius:4px}
.pri-high{background:rgba(220,60,60,.15);color:#e05555}
.pri-medium{background:rgba(196,146,42,.12);color:var(--qf)}
.pri-low{background:rgba(106,103,98,.12);color:var(--text3)}
.due{font-size:11px;color:var(--text3);white-space:nowrap}
.due-soon{color:#e05555}
.due-today{color:var(--qf)}
.ta-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.ta-btn:hover{background:var(--surf3);color:var(--text2)}
.ta-btn.del-btn:hover{color:#e05555;border-color:#e05555}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:24px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto}
.mt{font-size:16px;margin-bottom:18px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.fi,.fta,.fsl{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;outline:none;transition:border-color .15s}
.fi:focus,.fta:focus,.fsl:focus{border-color:var(--text3)}
.fta{resize:vertical;min-height:70px}
.fsl{appearance:none;cursor:pointer}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.ma{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.bc{padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font)}
.bc:hover{background:var(--surf2)}
.bs{padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font)}
.bs-per{background:var(--per);color:#fff}.bs-az{background:var(--az);color:#fff}
.bs-qf{background:var(--qf);color:#1a0e00}.bs-td{background:var(--td);color:#fff}.bs-fam{background:var(--fam);color:#fff}

/* NOZZLE SIZE (3D printing only) */
.nozzle-row{display:none}
.nozzle-row.show{display:block}
.nozzle-group-hdr{font-size:12px;color:var(--text3);font-weight:500;letter-spacing:0.03em;padding:6px 0 2px;margin-top:8px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surf3);border:1px solid var(--border);border-radius:var(--r);padding:10px 20px;font-size:13px;color:var(--text);font-family:var(--font);z-index:200;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:36px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* RESPONSIVE */
@media(max-width:640px){
  .hdr{padding:12px 16px}
  .main{padding:16px}
  .hdr-stats{display:none}
  .tab{padding:8px 14px;font-size:12px}
  .fr{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="brand">COMMAND CENTRE</div>
      <div class="datelbl" id="dateLbl"></div>
    </div>
    <div class="hdr-right">
      <div class="hdr-stats" id="hdrStats"></div>
      <div class="sync-status" id="syncStatus"><span class="sync-dot" id="syncDot"></span><span class="sync-label" id="syncLabel">Synced</span></div>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="ph">
      <div class="pt" id="panelTitle"></div>
      <button class="add-btn" id="addBtn" onclick="openAdd()">+ Add Task</button>
    </div>
    <div class="sr" id="statsRow"></div>
    <div class="pb-wrap"><div class="pb" id="progBar"></div></div>
    <div class="fb" id="filterBar"></div>
    <div class="tg" id="taskGrid"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeM(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mt" id="modalTitle">Add Task</div>
    <div class="fg">
      <label class="fl">Task Title</label>
      <input class="fi" id="fTitle" placeholder="What needs to get done?">
    </div>
    <div class="fg">
      <label class="fl">Notes (optional)</label>
      <textarea class="fta" id="fNotes" placeholder="Details, context, next steps..."></textarea>
    </div>
    <div class="fr">
      <div class="fg">
        <label class="fl">Priority</label>
        <select class="fsl" id="fPri">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Due Date</label>
        <input class="fi" id="fDue" type="date">
      </div>
    </div>
    <div class="fg nozzle-row" id="nozzleRow">
      <label class="fl">Nozzle Size</label>
      <select class="fsl" id="fNozzle">
        <option value="0.4">0.4 mm &mdash; standard</option>
        <option value="0.2">0.2 mm &mdash; fine detail</option>
      </select>
    </div>
    <div class="ma">
      <button class="bc" onclick="closeM()">Cancel</button>
      <button class="bs" id="saveBtn" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>


<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ── DATA ── */
const CATS = [
  {key:'per', label:'Personal',        color:'--per'},
  {key:'az',  label:'AZ Custom Knives', color:'--az'},
  {key:'qf',  label:'Quad Fang',        color:'--qf'},
  {key:'td',  label:'3D Printing',      color:'--td'},
  {key:'fam', label:'Family',           color:'--fam'}
];
let cur = 'per';          // active category
let filter = 'all';       // all | open | high | done
let editId = null;        // task id being edited
let data = {};            // {per:[], az:[], qf:[], td:[], fam:[]}

/* ── PERSIST ── */
const SEED = {
  per: [
    {id:'p1',title:'Replace kitchen faucet / sink',notes:'Return current faucet to Costco. Buy a working replacement. May need copper soldering and shark bite',pri:'high',due:null,done:false},
    {id:'p2',title:'Basement: fix drywall',notes:'Repair wall downstairs',pri:'medium',due:null,done:false},
    {id:'p3',title:'Basement: organize cat beds & laundry area',notes:'Better infrastructure for cat beds and laundry in the long room',pri:'medium',due:null,done:false},
    {id:'p4',title:'Organize the long room',notes:'',pri:'medium',due:null,done:false},
    {id:'p5',title:'Poly off the cat litter box section',notes:'Do before installing the Litter Robot',pri:'medium',due:null,done:false},
    {id:'p6',title:'Install Litter Robot (self-cleaning cat litter box)',notes:'Going with the Litter Robot. Section needs to be polyed first.',pri:'medium',due:null,done:false},
    {id:'p7',title:'Purchase: big cat door',notes:'',pri:'medium',due:null,done:false},
    {id:'p8',title:'Plumbing prep: copper soldering & shark bites',notes:'Do before faucet install',pri:'medium',due:null,done:false},
    {id:'p9',title:'Basement: paint floors',notes:'',pri:'low',due:null,done:false},
    {id:'p10',title:'Basement: install trim',notes:'',pri:'low',due:null,done:false},
    {id:'p11',title:'Basement: paint walls',notes:'',pri:'low',due:null,done:false},
    {id:'p12',title:'Basement: redo ceiling',notes:'',pri:'low',due:null,done:false},
    {id:'p13',title:'Amazon returns at Staples',notes:'',pri:'high',due:'2026-04-01',done:false},
    {id:'p14',title:'Home Depot returns',notes:'Return items before deadline',pri:'high',due:'2026-04-02',done:false}
  ],
  az: [
    {id:'a1',title:"Michelle's Culinary Crew plate \u2014 pre-order",notes:'Current batch. Pre-ordered. 3-week deadline.',pri:'high',due:'2026-04-14',done:false},
    {id:'a2',title:"Franco's Culinary Crew plate \u2014 pre-order",notes:'Current batch. Pre-ordered. 3-week deadline.',pri:'high',due:'2026-04-14',done:false},
    {id:'a3',title:"Mike's knife (Surri's order) \u2014 finish",notes:"Surri's last custom knife order for Mike. Same 3-week window as Culinary Crew plates.",pri:'high',due:'2026-04-14',done:false},
    {id:'a4',title:'Warranty / restoration: rusty custom knife',notes:'Rust treatment and full restoration needed',pri:'high',due:null,done:false},
    {id:'a5',title:"Tel's wife \u2014 new custom knife",notes:'Tel is a first client. Wife wants a full-size Raptor or Raptor Elite in Crew Wear steel. Confirm design.',pri:'medium',due:null,done:false},
    {id:'a6',title:'Rewrite After Hours Program',notes:'',pri:'medium',due:null,done:false},
    {id:'a7',title:'Rewrite Sharpening Seminar curriculum / booklet',notes:'',pri:'medium',due:null,done:false},
    {id:'a8',title:'Write Advanced Sharpening Seminar curriculum / booklet',notes:'',pri:'medium',due:null,done:false},
    {id:'a9',title:'Write Advanced After Hours Program \u2014 kitchen knife',notes:'',pri:'medium',due:null,done:false},
    {id:'a10',title:'Write Procedures Book',notes:'Document all shop procedures: drilling, cutting, cleaning, gluing, grinding, laser engraving, safety protocols.',pri:'medium',due:null,done:false},
    {id:'a11',title:"Norm's knife \u2014 finish",notes:'Has been in the shop a couple of years. Not a priority.',pri:'low',due:null,done:false},
    {id:'a12',title:"Chase's Tanuki \u2014 custom order",notes:'Timeline unknown. On the list.',pri:'low',due:null,done:false},
    {id:'a13',title:'Raptor series \u2014 future batch',notes:'No pressing timeline. Future project.',pri:'low',due:null,done:false},
    {id:'a14',title:'Badger series \u2014 future batch',notes:'Future project. Not urgent.',pri:'low',due:null,done:false}
  ],
  qf: [
    {id:'q1',title:'Finalize Quad Fang website',notes:'',pri:'high',due:null,done:false},
    {id:'q2',title:'Follow up with foundry re: casting',notes:'Casting may not be viable \u2014 may pivot to machining.',pri:'high',due:null,done:false},
    {id:'q3',title:'Consult Matt re: machining the Quad Fang',notes:'Matthew is the machinist advising on manufacturing details.',pri:'high',due:null,done:false},
    {id:'q4',title:'Set up Facebook page',notes:'',pri:'medium',due:null,done:false},
    {id:'q5',title:'Set up Instagram',notes:'',pri:'medium',due:null,done:false},
    {id:'q6',title:'Set up Microsoft 365 account',notes:'Need Word and Excel separate from AZ Custom Knives accounts.',pri:'medium',due:null,done:false},
    {id:'q7',title:'Product: QF 100 grain broadhead',notes:'',pri:'medium',due:null,done:false},
    {id:'q8',title:'Product: QF 125 grain broadhead',notes:'',pri:'medium',due:null,done:false},
    {id:'q9',title:'Product: QF 150 grain broadhead',notes:'',pri:'medium',due:null,done:false},
    {id:'q10',title:'Consider TikTok presence',notes:'',pri:'low',due:null,done:false},
    {id:'q11',title:'Product: Sabre Tooth broadhead',notes:'Future product line.',pri:'low',due:null,done:false},
    {id:'q12',title:"Product: Kids' knife",notes:'Future product.',pri:'low',due:null,done:false},
    {id:'q13',title:'Product: Exchangeable blade holder',notes:'Future product.',pri:'low',due:null,done:false},
    {id:'q14',title:'Product: Alpha high-end folding knife',notes:'Future product.',pri:'low',due:null,done:false}
  ],
  td: [
    {id:'t1',title:'Curtain rod bracket \u2014 living room',notes:'Custom bracket for living room curtain rod.',pri:'medium',due:null,done:false,nozzle:'0.4'},
    {id:'t2',title:'AZ shopping cart key tags',notes:'Multi-part print. Must use 0.2 nozzle only.',pri:'medium',due:null,done:false,nozzle:'0.2'}
  ],
  fam: [
    {id:'f1',title:'Pick up Mom from airport',notes:'Arriving from Switzerland. Flight lands 8:21 PM Thursday. Leave home by 8:00 PM. Calendar reminder set.',pri:'high',due:'2026-03-26',done:false}
  ]
};

function load(){
  try {
    const raw = localStorage.getItem('cc_tasks');
    data = raw ? JSON.parse(raw) : {};
  } catch(e){ data = {}; }
  // Seed with default tasks if empty
  let isEmpty = true;
  CATS.forEach(c => { if(data[c.key] && data[c.key].length > 0) isEmpty = false; });
  if(isEmpty) data = JSON.parse(JSON.stringify(SEED));
  CATS.forEach(c => { if(!data[c.key]) data[c.key] = []; });
  persist();
}
function persist(){
  showSyncStatus('saving');
  try {
    localStorage.setItem('cc_tasks', JSON.stringify(data));
    setTimeout(()=> showSyncStatus('synced'), 400);
  } catch(e){
    showSyncStatus('error');
  }
}
function showSyncStatus(state){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot';
  if(state === 'saving'){
    dot.classList.add('saving');
    label.textContent = 'Saving...';
  } else if(state === 'synced'){
    label.textContent = 'Synced';
  } else if(state === 'error'){
    dot.classList.add('error');
    label.textContent = 'Sync error';
  }
}

/* ── HELPERS ── */
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  if(diff === 0) return 'Today';
  if(diff === 1) return 'Tomorrow';
  if(diff === -1) return 'Yesterday';
  if(diff > 1 && diff <= 30) return 'In ' + diff + 'd';
  if(diff < -1 && diff >= -30) return Math.abs(diff) + 'd ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function dueCls(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  if(diff < 0) return 'due-soon';
  if(diff === 0) return 'due-today';
  return '';
}
function esc(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ── DATE LABEL ── */
function setDateLabel(){
  const now = new Date();
  document.getElementById('dateLbl').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

/* ── HEADER STATS ── */
function updateStats(){
  const tasks = data[cur] || [];
  const open = tasks.filter(t => !t.done).length;
  const done = tasks.filter(t => t.done).length;
  const now = new Date(); now.setHours(0,0,0,0);
  const today = tasks.filter(t => {
    if(!t.due || t.done) return false;
    const d = new Date(t.due + 'T00:00:00');
    return d.getTime() === now.getTime();
  }).length;
  document.getElementById('hdrStats').innerHTML =
    `<div class="stat"><strong>${open}</strong> Open</div>` +
    `<div class="stat"><strong>${today}</strong> Today</div>` +
    `<div class="stat"><strong>${done}</strong> Done</div>`;
}

/* ── TABS ── */
function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = CATS.map(c => {
    const count = (data[c.key] || []).length;
    return `<button class="tab${cur===c.key?' a-'+c.key:''}" onclick="go('${c.key}')"><span class="tc tc-${c.key}"></span>${c.label} <span style="opacity:.5;font-weight:300">(${count})</span></button>`;
  }).join('');
}

/* ── GO (switch category) ── */
function go(cat){
  cur = cat;
  filter = 'all';
  render();
}

/* ── CARD HTML ── */
function cardHTML(t){
  const cat = CATS.find(c => c.key === cur);
  const doneClass = t.done ? ' done-card' : '';
  const chkClass = t.done ? ' checked' : '';
  const chkChar = t.done ? '&#10003;' : '';
  const dueStr = fmtDate(t.due);
  const dueClass = !t.done ? dueCls(t.due) : '';
  let nozzleTag = '';
  if(cur === 'td' && t.nozzle) nozzleTag = `<span class="pri" style="background:rgba(42,158,143,.12);color:var(--td)">${t.nozzle}mm</span>`;
  return `<div class="card bl-${cur}${doneClass}">
    <button class="chk${chkClass}" onclick="tog('${t.id}')">${chkChar}</button>
    <div class="tb">
      <div class="tt">${esc(t.title)}</div>
      ${t.notes ? `<div class="tn">${esc(t.notes)}</div>` : ''}
    </div>
    <div class="ta">
      ${nozzleTag}
      <span class="pri pri-${t.pri}">${t.pri}</span>
      ${dueStr ? `<span class="due ${dueClass}">${dueStr}</span>` : ''}
      <button class="ta-btn" onclick="openEdit('${t.id}')">Edit</button>
      <button class="ta-btn del-btn" onclick="del('${t.id}')">Delete</button>
    </div>
  </div>`;
}

/* ── RENDER ── */
function render(){
  renderTabs();
  updateStats();
  setDateLabel();

  const cat = CATS.find(c => c.key === cur);
  const tasks = data[cur] || [];
  const total = tasks.length;
  const doneCount = tasks.filter(t => t.done).length;
  const openCount = total - doneCount;
  const now = new Date(); now.setHours(0,0,0,0);
  const todayCount = tasks.filter(t => {
    if(!t.due || t.done) return false;
    return new Date(t.due + 'T00:00:00').getTime() === now.getTime();
  }).length;

  // Panel title
  document.getElementById('panelTitle').innerHTML = `${cat.label} <small>${total} tasks</small>`;

  // Add button styling
  const addBtn = document.getElementById('addBtn');
  addBtn.className = 'add-btn ab-' + cur;

  // Stats row
  document.getElementById('statsRow').innerHTML =
    `<span><strong>${openCount}</strong> open</span>` +
    `<span><strong>${doneCount}</strong> done</span>` +
    `<span><strong>${todayCount}</strong> due today</span>`;

  // Progress bar
  const pBar = document.getElementById('progBar');
  pBar.className = 'pb pb-' + cur;
  pBar.style.width = total ? ((doneCount / total) * 100) + '%' : '0%';

  // Filter bar
  const fb = document.getElementById('filterBar');
  const filters = [{k:'all',l:'All'},{k:'open',l:'Open'},{k:'high',l:'High Priority'},{k:'done',l:'Done'}];
  fb.innerHTML = filters.map(f =>
    `<button class="fb-${cur} fb-btn${filter===f.k?' on':''}" onclick="setF('${f.k}')">${f.l}</button>`
  ).join('');

  // Filter tasks
  let list = tasks;
  if(filter === 'open') list = tasks.filter(t => !t.done);
  if(filter === 'high') list = tasks.filter(t => t.pri === 'high' && !t.done);
  if(filter === 'done') list = tasks.filter(t => t.done);

  // Sort: high > medium > low, then by due date
  const priOrder = {high:0, medium:1, low:2};
  list = [...list].sort((a,b) => {
    if(a.done !== b.done) return a.done ? 1 : -1;
    if(priOrder[a.pri] !== priOrder[b.pri]) return priOrder[a.pri] - priOrder[b.pri];
    if(a.due && b.due) return a.due.localeCompare(b.due);
    if(a.due) return -1;
    if(b.due) return 1;
    return 0;
  });

  const grid = document.getElementById('taskGrid');
  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state"><div class="icon">&#9744;</div><p>No tasks here yet</p></div>`;
  } else if(cur === 'td'){
    // Group by nozzle size for 3D Printing
    const nozzles = {'0.4':'0.4 mm \u2014 standard nozzle','0.2':'0.2 mm \u2014 fine detail nozzle'};
    const groups = {};
    list.forEach(t => {
      const n = t.nozzle || '0.4';
      if(!groups[n]) groups[n] = [];
      groups[n].push(t);
    });
    let html = '';
    ['0.4','0.2'].forEach(n => {
      if(groups[n] && groups[n].length){
        html += `<div class="nozzle-group-hdr">${nozzles[n]}</div>`;
        html += groups[n].map(t => cardHTML(t)).join('');
      }
    });
    grid.innerHTML = html;
  } else {
    grid.innerHTML = list.map(t => cardHTML(t)).join('');
  }

  // Save button styling
  document.getElementById('saveBtn').className = 'bs bs-' + cur;

  // Nozzle row
  document.getElementById('nozzleRow').classList.toggle('show', cur === 'td');
}

/* ── FILTERS ── */
function setF(f){ filter = f; render(); }

/* ── ADD / EDIT ── */
function openAdd(){
  editId = null;
  document.getElementById('modalTitle').textContent = 'Add Task';
  document.getElementById('fTitle').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('fPri').value = 'medium';
  document.getElementById('fDue').value = '';
  document.getElementById('fNozzle').value = '0.4';
  document.getElementById('modalBg').classList.add('open');
}
function openEdit(id){
  const t = data[cur].find(x => x.id === id);
  if(!t) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('fTitle').value = t.title;
  document.getElementById('fNotes').value = t.notes || '';
  document.getElementById('fPri').value = t.pri;
  document.getElementById('fDue').value = t.due || '';
  document.getElementById('fNozzle').value = t.nozzle || '0.4';
  document.getElementById('modalBg').classList.add('open');
}
function closeM(e){
  if(e && e.target !== document.getElementById('modalBg')) return;
  document.getElementById('modalBg').classList.remove('open');
}
function saveTask(){
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ toast('Title is required'); return; }
  const obj = {
    id: editId || uid(),
    title,
    notes: document.getElementById('fNotes').value.trim(),
    pri: document.getElementById('fPri').value,
    due: document.getElementById('fDue').value || null,
    done: false
  };
  if(cur === 'td') obj.nozzle = document.getElementById('fNozzle').value;
  if(editId){
    const idx = data[cur].findIndex(x => x.id === editId);
    if(idx > -1){ obj.done = data[cur][idx].done; data[cur][idx] = obj; }
  } else {
    data[cur].push(obj);
  }
  persist();
  closeM();
  render();
  toast(editId ? 'Task updated' : 'Task added');
}

/* ── TOGGLE / DELETE ── */
function tog(id){
  const t = data[cur].find(x => x.id === id);
  if(t){ t.done = !t.done; persist(); render(); }
}
function del(id){
  data[cur] = data[cur].filter(x => x.id !== id);
  persist();
  render();
  toast('Task deleted');
}


/* ── INIT ── */
load();
render();
</script>
</body>
</html>
