<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://script.google.com; frame-src 'none';">
<title>AZCK Command Centre — Dashboard</title>
<link rel="stylesheet" href="cc-shell.css">
<style>
  /* Page-scoped dashboard styles — no shell overrides */
  .dash-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 20px;
    margin: 24px;
  }
  .dash-tile {
    background: var(--cc-bg-card);
    border: 1px solid var(--cc-border);
    border-radius: var(--cc-r-lg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }
  .dash-tile-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--cc-border-soft);
  }
  .dash-tile-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--cc-text-muted);
    text-transform: uppercase;
  }
  .dash-tile-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--cc-bg-raised);
    color: var(--cc-text-muted);
  }
  .dash-tile-pill.ok     { color: var(--cc-success); background: #3fb95018; }
  .dash-tile-pill.warn   { color: var(--cc-warn);    background: #d2992218; }
  .dash-tile-pill.danger { color: var(--cc-danger);  background: #f8514918; }

  .dash-row {
    padding: 8px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    border-bottom: 1px dashed var(--cc-border-soft);
    font-size: 13px;
  }
  .dash-row:last-child { border-bottom: 0; }
  .dash-row .label { color: var(--cc-text-body); flex: 1; min-width: 0; }
  .dash-row .value { color: var(--cc-text-muted); white-space: nowrap; font-size: 12px; }
  .dash-row .value.accent  { color: var(--cc-accent); }
  .dash-row .value.success { color: var(--cc-success); }
  .dash-row .value.warn    { color: var(--cc-warn); }
  .dash-row .value.danger  { color: var(--cc-danger); }

  .dash-hero {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .dash-stat {
    background: var(--cc-bg-card);
    border: 1px solid var(--cc-border);
    border-radius: var(--cc-r-md);
    padding: 14px 16px;
  }
  .dash-stat .n {
    font-size: 26px;
    font-weight: 800;
    color: var(--cc-text);
    line-height: 1.1;
  }
  .dash-stat .l {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--cc-text-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .dash-stat .n.success { color: var(--cc-success); }
  .dash-stat .n.warn    { color: var(--cc-warn); }
  .dash-stat .n.danger  { color: var(--cc-danger); }

  .dash-empty { color: var(--cc-text-dim); font-size: 12px; padding: 12px 0; font-style: italic; }

  /* Login (kept from v1) */
  .login-container { text-align: center; max-width: 400px; width: 100%; margin: 80px auto; padding: 0 20px; }
  .login-logo { font-size: 48px; margin-bottom: 16px; }
  .login-title { font-size: 28px; font-weight: 800; color: var(--cc-text); margin-bottom: 4px; }
  .login-subtitle { font-size: 14px; color: var(--cc-text-muted); margin-bottom: 32px; }
  .login-form { background: var(--cc-bg-card); border: 1px solid var(--cc-border); border-radius: 12px; padding: 32px; text-align: left; }
  .login-form label { font-size: 13px; font-weight: 600; color: var(--cc-text-muted); display: block; margin-bottom: 8px; }
  .login-form input { width: 100%; padding: 12px 16px; border: 1px solid var(--cc-border); border-radius: 8px; background: var(--cc-bg); color: var(--cc-text); font-size: 16px; outline: none; transition: border-color 0.2s; }
  .login-form input:focus { border-color: var(--cc-accent); }
  .login-btn { width: 100%; padding: 12px; margin-top: 16px; border: none; border-radius: 8px; background: var(--cc-accent); color: var(--cc-bg); font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .login-btn:hover { filter: brightness(1.1); }
  .login-error { color: var(--cc-danger); font-size: 13px; margin-top: 12px; display: none; text-align: center; }
  .login-footer { font-size: 11px; color: var(--cc-text-dim); margin-top: 24px; }
  .hidden { display: none !important; }
</style>
<script src="auth.js"></script>
</head>
<body>

<!-- ── Login Screen (pre-auth) ── -->
<div class="login-container" id="loginScreen">
  <div class="login-logo">⚒️</div>
  <div class="login-title">Command Centre</div>
  <div class="login-subtitle">AZ Custom Knives Ltd</div>
  <div class="login-form">
    <label for="password">Access Code</label>
    <input type="password" id="password" placeholder="Enter access code" autocomplete="off" autofocus>
    <button class="login-btn" id="loginBtn">Enter</button>
    <div class="login-error" id="loginError">Incorrect access code. Try again.</div>
  </div>
  <div class="login-footer">Protected workspace · Forge-powered</div>
</div>

<!-- ── Dashboard (post-auth) ── -->
<main id="cc-content" class="hidden">
  <div class="dash-grid" id="dashGrid"></div>
</main>

<!-- ═══════════════════════════════════════════════════════════════

};

var DASH = {

    { label: 'Revenue streams active',         value: '4 of 25' },

<!-- ── ENGINE (static — never changes) ── -->
<script>
(function(){
  'use strict';

  // ── Auth gate ──
  if (typeof ccIsAuthenticated === 'function' && ccIsAuthenticated()) {
    showDashboard();
    var redirect = sessionStorage.getItem('azck_cc_redirect');
    if (redirect) {
      sessionStorage.removeItem('azck_cc_redirect');
      window.location.href = redirect;
      return;
    }
  }

  var pwInput   = document.getElementById('password');
  var loginBtn  = document.getElementById('loginBtn');
  var loginErr  = document.getElementById('loginError');

  async function attemptLogin() {
    var pw = pwInput.value.trim();
    if (!pw) return;
    loginBtn.textContent = 'Checking...';
    loginBtn.disabled = true;
    var ok = await ccVerifyPassword(pw);
    if (ok) {
      loginErr.style.display = 'none';
      showDashboard();
      var r = sessionStorage.getItem('azck_cc_redirect');
      if (r) { sessionStorage.removeItem('azck_cc_redirect'); window.location.href = r; }
    } else {
      loginErr.style.display = 'block';
      pwInput.value = '';
      pwInput.focus();
      loginBtn.textContent = 'Enter';
      loginBtn.disabled = false;
    }
  }
  loginBtn.addEventListener('click', attemptLogin);
  pwInput.addEventListener('keydown', function(e){ if(e.key==='Enter') attemptLogin(); });

  function showDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('cc-content').classList.remove('hidden');
    renderDashboard();
    // Load cc-shell AFTER login so it doesn't show the banner on login screen.
    var s = document.createElement('script');
    s.src = 'cc-shell.js';
    document.body.appendChild(s);
  }

  // ── Tile helpers ──
  function tileRow(r) {
    var tone = r.tone ? (' ' + r.tone) : '';
    return '<div class="dash-row"><span class="label">' + escapeHTML(r.label) +
           '</span><span class="value' + tone + '">' + escapeHTML(r.value) + '</span></div>';
  }
  function tile(title, rows, pill) {
    var pillHTML = pill ? ('<span class="dash-tile-pill ' + (pill.tone||'') + '">' + escapeHTML(pill.text) + '</span>') : '';
    var body = (rows && rows.length) ? rows.map(tileRow).join('') : '<div class="dash-empty">Nothing today</div>';
    return '<section class="dash-tile"><div class="dash-tile-head">' +
           '<span class="dash-tile-title">' + escapeHTML(title) + '</span>' + pillHTML + '</div>' +
           body + '</section>';
  }
  function escapeHTML(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function renderDashboard() {
    var out = '';
    // Hero stats strip
    if (DASH.hero && DASH.hero.length) {
      out += '<div class="dash-hero">';
      DASH.hero.forEach(function(h){
        out += '<div class="dash-stat"><div class="n ' + (h.tone||'') + '">' +
               escapeHTML(h.n) + '</div><div class="l">' + escapeHTML(h.l) + '</div></div>';
      });
      out += '</div>';
    }
    out += tile('Today / Knife Sprint', DASH.today, { text: 'DUE APR 22', tone: 'warn' });
    out += tile('Calendar',             DASH.calendar);
    out += tile('Roadmap · Active',     DASH.roadmap,  { text: 'Live', tone: 'ok' });
    out += tile('Finance · Snapshot',   DASH.finance,  { text: 'Projected', tone: '' });
    out += tile('Pending Messages',     DASH.pending,  DASH.pending && DASH.pending.length ? { text: String(DASH.pending.length), tone: 'warn' } : null);

    document.getElementById('dashGrid').innerHTML = out;
  }
})();
</script>

</body>
</html>
