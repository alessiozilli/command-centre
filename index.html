<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://twrlvnfszohyrmivdhre.supabase.co wss://twrlvnfszohyrmivdhre.supabase.co; img-src 'self' data: https:;">
  <title>AZCK Command Centre</title>
  <link rel="icon" type="image/svg+xml" href="assets/az-sigil.svg">
  <!-- Supabase must load before auth.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script defer src="auth.js"></script>
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --danger: #f85149; --success: #238636;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 2.5rem 2rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
    }
    .sigil-wrap {
      width: 140px; height: 140px; margin: 0 auto 1.25rem;
      display: flex; align-items: center; justify-content: center;
    }
    .sigil-wrap img { width: 100%; height: 100%; }
    h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: 0.04em; margin: 0 0 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.03em; margin: 0 0 1.75rem; }
    .field { text-align: left; margin-bottom: 1rem; }
    .field label {
      display: block; font-size: 0.78rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 0.9rem; font-size: 1rem; transition: border-color 0.15s;
    }
    .field input:focus { outline: 0; border-color: var(--accent); }
    .submit {
      width: 100%; background: var(--success); color: #fff; border: 0;
      border-radius: 8px; padding: 0.8rem 1rem; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem;
    }
    .submit:hover { background: #2ea043; }
    .submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { margin-top: 1rem; color: var(--danger); font-size: 0.88rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <form class="login-card" id="login-form" autocomplete="on">
    <div class="sigil-wrap">
      <img src="assets/az-sigil.svg" alt="AZ Custom Knives">
    </div>
    <h1>AZCK COMMAND CENTRE</h1>
    <p class="subtitle">A Slice of Excellence</p>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" autofocus required
             placeholder="you@azcustomknives.com">
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input type="password" id="pw" autocomplete="current-password" required>
    </div>

    <button type="submit" class="submit" id="submit">Sign in</button>
    <div class="error" id="error" role="alert"></div>
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form  = document.getElementById('login-form');
      const email = document.getElementById('email');
      const pw    = document.getElementById('pw');
      const btn   = document.getElementById('submit');
      const err   = document.getElementById('error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.textContent = '';
        btn.disabled = true; btn.textContent = 'Signing in…';
        try {
          await window.ccLogin(email.value.trim(), pw.value);
          const target = sessionStorage.getItem(window.CC_AUTH.REDIRECT_KEY)
                      || window.CC_AUTH.HOME_PAGE;
          sessionStorage.removeItem(window.CC_AUTH.REDIRECT_KEY);
          window.location.replace(target);
        } catch (ex) {
          err.textContent = ex.message || 'Sign-in failed. Check your email and password.';
          pw.select();
          btn.disabled = false; btn.textContent = 'Sign in';
        }
      });
    });
  </script>
</body>
</html>
