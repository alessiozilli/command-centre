<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reanna's Command Centre</title>
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            line-height: 1.6;
            font-size: 16px;
        }

        /* ===== HEADER ===== */
        header {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 2rem 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            flex: 1;
            min-width: 200px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .header-date {
            font-size: 0.95rem;
            color: #8b949e;
            font-weight: 500;
        }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-label {
            color: #8b949e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .status-count {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .status-item.done .status-count {
            color: #3fb950;
        }

        .status-item.synced .status-count {
            color: #8b949e;
            font-size: 0.8rem;
        }

        /* ===== SUMMARY STATS ===== */
        .summary-stats {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 1.5rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            align-items: center;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-block.done .stat-value {
            color: #3fb950;
        }

        .stat-block.synced .stat-value {
            font-size: 0.9rem;
            color: #8b949e;
        }

        /* ===== GRANT TRACKER ===== */
        .grant-tracker {
            background: linear-gradient(135deg, rgba(240, 136, 62, 0.08), rgba(153, 0, 0, 0.05));
            border-bottom: 1px solid #30363d;
            padding: 1.25rem 2rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .grant-tracker-title {
            font-size: 0.85rem;
            color: #f0883e;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .grant-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .grant-stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f0883e;
        }

        .grant-stat-label {
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ===== CATEGORY TABS ===== */
        .category-tabs {
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-tab {
            padding: 0.5rem 1rem;
            border: 2px solid #30363d;
            border-radius: 6px;
            background-color: transparent;
            color: #e6edf3;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
            user-select: none;
            font-family: inherit;
        }

        .category-tab:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .category-tab.active {
            border-color: #f0883e;
            background-color: rgba(240, 136, 62, 0.12);
            color: #f0883e;
        }

        .category-count {
            font-size: 0.8rem;
            color: #8b949e;
            margin-left: 0.5rem;
        }

        .category-tab.active .category-count {
            color: #f0883e;
        }

        .btn-add-category {
            padding: 0.5rem 0.75rem;
            border: 1px dashed #30363d;
            border-radius: 6px;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-add-category:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* ===== MAIN CONTENT ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        .filter-btn.active {
            background-color: #58a6ff;
            color: #0d1117;
            border-color: #58a6ff;
            font-weight: 600;
        }

        .btn-add-task {
            padding: 0.75rem 1.5rem;
            background-color: #f0883e;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-add-task:hover {
            background-color: #f4a261;
        }

        /* ===== TASK LIST ===== */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-row {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.25rem;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 1rem;
            align-items: center;
            transition: all 0.2s;
        }

        .task-row:hover {
            border-color: #58a6ff;
            background-color: #0d1117;
        }

        .task-row.done {
            opacity: 0.6;
        }

        .task-row.done .task-title {
            text-decoration: line-through;
            color: #8b949e;
        }

        .task-row.overdue {
            border-left: 3px solid #f85149;
        }

        .task-row.due-soon {
            border-left: 3px solid #f0883e;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3fb950;
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            color: #e6edf3;
            font-size: 0.95rem;
        }

        .task-notes {
            font-size: 0.85rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .priority-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .priority-badge.high {
            background-color: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }

        .priority-badge.medium {
            background-color: rgba(240, 136, 62, 0.15);
            color: #f0883e;
        }

        .priority-badge.low {
            background-color: rgba(139, 148, 158, 0.15);
            color: #8b949e;
        }

        .task-date {
            font-size: 0.85rem;
            color: #8b949e;
        }

        .task-date.overdue {
            color: #f85149;
            font-weight: 600;
        }

        .task-date.due-soon {
            color: #f0883e;
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-task-action {
            padding: 0.4rem 0.8rem;
            border: 1px solid #30363d;
            border-radius: 4px;
            background-color: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-task-action:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        .btn-task-action.delete:hover {
            color: #f85149;
            border-color: #f85149;
        }

        /* ===== EDIT FORM (INLINE) ===== */
        .task-edit-form {
            grid-column: 1 / -1;
            background-color: #0d1117;
            border: 1px solid #58a6ff;
            border-radius: 6px;
            padding: 1rem;
            display: grid;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #e6edf3;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #58a6ff;
            outline: none;
            background-color: #0d1117;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn-save, .btn-cancel {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-save {
            background-color: #58a6ff;
            color: #0d1117;
        }

        .btn-save:hover {
            background-color: #79c0ff;
        }

        .btn-cancel {
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .btn-cancel:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #e6edf3;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn-confirm {
            padding: 0.75rem 1.5rem;
            background-color: #f0883e;
            color: #0d1117;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-confirm:hover {
            background-color: #f4a261;
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            color: #e6edf3;
            border-color: #58a6ff;
        }

        /* ===== ADD CATEGORY FORM ===== */
        .category-form {
            display: grid;
            gap: 1rem;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .color-picker-input {
            width: 50px;
            height: 50px;
            border: 2px solid #30363d;
            border-radius: 4px;
            cursor: pointer;
        }

        /* ===== CONTEXT MENU ===== */
        .context-menu {
            display: none;
            position: fixed;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            min-width: 150px;
        }

        .context-menu.active {
            display: block;
        }

        .context-menu-item {
            padding: 0.75rem 1rem;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #30363d;
        }

        .context-menu-item:last-child {
            border-bottom: none;
        }

        .context-menu-item:hover {
            background-color: #0d1117;
            color: #e6edf3;
        }

        .context-menu-item.delete:hover {
            color: #f85149;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #8b949e;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state-text {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .status-bar {
                justify-content: space-around;
                width: 100%;
                gap: 0.75rem;
            }

            .status-item {
                flex-direction: row;
                gap: 0.5rem;
            }

            .status-label {
                font-size: 0.7rem;
            }

            .task-row {
                grid-template-columns: auto 1fr;
                gap: 0.75rem;
            }

            .task-meta {
                grid-column: 1 / -1;
                gap: 0.75rem;
            }

            .task-actions {
                grid-column: 1 / -1;
            }

            .priority-badge {
                font-size: 0.75rem;
                padding: 0.2rem 0.6rem;
            }

            .category-tabs {
                padding: 1rem;
                overflow-x: auto;
            }

            .container {
                padding: 1rem;
            }

            .grant-tracker {
                padding: 1rem;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            .summary-stats {
                padding: 1rem;
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .filter-bar {
                gap: 0.5rem;
            }

            .filter-btn {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }

            .btn-add-task {
                width: 100%;
            }
        }

        /* Login gate removed — gateway handles all auth */

        /* User bar in header */
        .user-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .user-name {
            color: #8b949e;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .user-role {
            color: #f0883e;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            border-color: #f0883e;
            color: #e6edf3;
        }

        #appContent { display: block; }

        /* Week label badges */
        .week-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: rgba(88, 166, 255, 0.12);
            color: #58a6ff;
            margin-left: 0.5rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

    <!-- ===== APP CONTENT ===== -->
    <div id="appContent">

    <header>
        <h1>Reanna's Command Centre</h1>
        <div class="header-right">
            <div class="header-date" id="headerDate"></div>
            <div class="user-bar">
                <span class="user-name" id="userName"></span>
                <span class="user-role" id="userRole"></span>
                <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-label">Open</div>
                    <div class="status-count" id="statusOpen">0</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Today</div>
                    <div class="status-count" id="statusToday">0</div>
                </div>
                <div class="status-item done">
                    <div class="status-label">Done</div>
                    <div class="status-count" id="statusDone">0</div>
                </div>
                <div class="status-item synced">
                    <div class="status-label">Synced</div>
                    <div class="status-count" id="statusSynced">-</div>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== GRANT TRACKER BAR ===== -->
    <div class="grant-tracker" id="grantTracker">
        <div class="grant-tracker-title">Grant Tracker</div>
        <div class="grant-stat">
            <div class="grant-stat-value" id="grantTotal">0</div>
            <div class="grant-stat-label">Programs</div>
        </div>
        <div class="grant-stat">
            <div class="grant-stat-value" id="grantThisWeek">0</div>
            <div class="grant-stat-label">This Week</div>
        </div>
        <div class="grant-stat">
            <div class="grant-stat-value" id="grantApplied">0</div>
            <div class="grant-stat-label">Applied</div>
        </div>
        <div class="grant-stat">
            <div class="grant-stat-value" id="grantOverdue">0</div>
            <div class="grant-stat-label">Overdue</div>
        </div>
    </div>

    <!-- ===== SUMMARY STATS ===== -->
    <div class="summary-stats">
        <div class="stat-block">
            <div class="stat-label">Total Open</div>
            <div class="stat-value" id="statTotalOpen">0</div>
        </div>
        <div class="stat-block">
            <div class="stat-label">Due This Week</div>
            <div class="stat-value" id="statDueWeek">0</div>
        </div>
        <div class="stat-block done">
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="statCompleted">0</div>
        </div>
        <div class="stat-block synced">
            <div class="stat-label">Last Updated</div>
            <div class="stat-value" id="statLastUpdated">Never</div>
        </div>
    </div>

    <!-- ===== CATEGORY TABS ===== -->
    <div class="category-tabs" id="categoryTabs">
        <!-- Generated by JS -->
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <div style="margin-bottom: 2rem;">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All Tasks</button>
                <button class="filter-btn" data-filter="open">Open Only</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
                <button class="filter-btn" data-filter="due-soon">Due Soon</button>
                <button class="filter-btn" data-filter="done">Done Only</button>
            </div>
            <button class="btn-add-task" id="btnAddTask">+ Add Task</button>
        </div>

        <div class="task-list" id="taskList">
            <!-- Generated by JS -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">&#128203;</div>
            <div class="empty-state-text">No tasks here yet. Add one to get started!</div>
        </div>
    </div>

    <!-- ===== MODALS ===== -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2 class="modal-title" id="confirmTitle">Confirm Action</h2>
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button class="btn-secondary" id="btnConfirmCancel">Cancel</button>
                <button class="btn-confirm" id="btnConfirmOK">Confirm</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <h2 class="modal-title" id="categoryModalTitle">Add Category</h2>
            <form class="category-form" id="categoryForm">
                <div class="form-group">
                    <label for="categoryName">Category Name</label>
                    <input type="text" id="categoryName" required placeholder="e.g., Grants, Office">
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="categoryColor" class="color-picker-input" value="#f0883e">
                        <span id="colorValue">#f0883e</span>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" id="btnCategoryCancel">Cancel</button>
                    <button type="submit" class="btn-confirm">Create Category</button>
                </div>

        // ===== UTILITY =====
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            if (date.getTime() === today.getTime()) return 'Today';
            if (date.getTime() === tomorrow.getTime()) return 'Tomorrow';

            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function getDateStatus(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const threeDays = new Date(today);
            threeDays.setDate(threeDays.getDate() + 3);

            if (date < today) return 'overdue';
            if (date < threeDays) return 'due-soon';
            return '';
        }

                priority: task.priority || 'medium', status: task.status || 'open',

                completed_at: task.completedAt || null

            if (task._isNew) {
                const { data, error } = await sb.from('tasks').insert(payload).select().single();
                if (error) { console.error('Task insert error:', error); return null; }
                return data;
            } else {
                const { data, error } = await sb.from('tasks').update(payload).eq('id', task.id).select().single();
                if (error) { console.error('Task update error:', error); return null; }
                return data;

        function updateHeaderDate() {

        function updateGrantTracker() {
            // Find the Grants category
            const grantsCat = appState.categories.find(c => c.name === 'Grants');
            if (!grantsCat) {
                document.getElementById('grantTracker').style.display = 'none';
                return;
            }

            const grantTasks = appState.tasks.filter(t => t.categoryId === grantsCat.id);
            const total = grantTasks.length;
            const applied = grantTasks.filter(t => t.status === 'done').length;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const nextWeek = new Date(today);
            nextWeek.setDate(nextWeek.getDate() + 7);

            const thisWeek = grantTasks.filter(t => {
                if (!t.dueDate || t.status === 'done') return false;
                const d = new Date(t.dueDate + 'T00:00:00');
                return d >= today && d < nextWeek;
            }).length;

            const overdue = grantTasks.filter(t => {
                if (!t.dueDate || t.status === 'done') return false;
                return new Date(t.dueDate + 'T00:00:00') < today;
            }).length;

            document.getElementById('grantTotal').textContent = total;
            document.getElementById('grantThisWeek').textContent = thisWeek;
            document.getElementById('grantApplied').textContent = applied;
            document.getElementById('grantOverdue').textContent = overdue;

            const overdueEl = document.getElementById('grantOverdue');
            overdueEl.style.color = overdue > 0 ? '#f85149' : '#f0883e';
        }

        function updateStatusBar() {
            const openTasks = appState.tasks.filter(t => t.status === 'open').length;

            const today = new Date();

            const todayTasks = appState.tasks.filter(t => {
                if (!t.dueDate) return false;
                const dueDate = new Date(t.dueDate + 'T00:00:00');
                return dueDate.getTime() === today.getTime();
            }).length;

            document.getElementById('statusOpen').textContent = openTasks;
            document.getElementById('statusToday').textContent = todayTasks;
            document.getElementById('statusDone').textContent = doneTasks;

            updateSyncDisplay();
            updateSummaryStats();
            updateGrantTracker();
        }

        function updateSyncDisplay() {
            if (!appState.lastSynced) {
                document.getElementById('statusSynced').textContent = '-';
                document.getElementById('statLastUpdated').textContent = 'Never';
            } else {
                const diffMinutes = Math.floor((new Date() - new Date(appState.lastSynced)) / 60000);
                let timeStr = 'just now';
                if (diffMinutes > 0 && diffMinutes < 60) timeStr = diffMinutes + 'm ago';
                else if (diffMinutes >= 60) timeStr = Math.floor(diffMinutes / 60) + 'h ago';

                document.getElementById('statusSynced').textContent = timeStr;
                document.getElementById('statLastUpdated').textContent = timeStr;
            }
        }

        function updateSummaryStats() {

            const today = new Date();

        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = '';

            appState.categories.forEach(cat => {
                const button = document.createElement('button');
                button.className = 'category-tab' + (cat.id === appState.activeCategory ? ' active' : '');
                button.dataset.categoryId = cat.id;

            container.appendChild(addBtn);

        function renderTasks() {
            const container = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            let filteredTasks = appState.tasks.filter(t => t.categoryId === appState.activeCategory);

            if (appState.activeFilter === 'open') {
                filteredTasks = filteredTasks.filter(t => t.status === 'open');
            } else if (appState.activeFilter === 'high') {
                filteredTasks = filteredTasks.filter(t => t.priority === 'high' && t.status === 'open');
            } else if (appState.activeFilter === 'due-soon') {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const nextWeek = new Date(today);
                nextWeek.setDate(nextWeek.getDate() + 7);
                filteredTasks = filteredTasks.filter(t => {
                    if (!t.dueDate || t.status === 'done') return false;
                    const d = new Date(t.dueDate + 'T00:00:00');
                    return d < nextWeek;
                });
            } else if (appState.activeFilter === 'done') {
                filteredTasks = filteredTasks.filter(t => t.status === 'done');
            }

            // Sort: overdue first, then by due date, then by priority
            filteredTasks.sort((a, b) => {
                if (a.status === 'done' && b.status !== 'done') return 1;
                if (a.status !== 'done' && b.status === 'done') return -1;

                const priorityOrder = { high: 0, medium: 1, low: 2 };
                const aDate = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
                const bDate = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;

                if (aDate !== bDate) return aDate - bDate;
                return (priorityOrder[a.priority] || 1) - (priorityOrder[b.priority] || 1);
            });

            if (filteredTasks.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            filteredTasks.forEach(task => {
                const dateStatus = task.status !== 'done' ? getDateStatus(task.dueDate) : '';
                const row = document.createElement('div');
                row.className = 'task-row' + (task.status === 'done' ? ' done' : '') + (dateStatus ? ' ' + dateStatus : '');
                row.dataset.taskId = task.id;

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.status === 'done';
                checkbox.addEventListener('change', async () => {
                    task.status = checkbox.checked ? 'done' : 'open';
                    task.completedAt = checkbox.checked ? new Date().toISOString() : null;
                    if (USE_SUPABASE && currentUser) await saveTaskToSupabase(task);
                    saveData();
                    updateStatusBar();
                    renderTasks();
                });

                const content = document.createElement('div');
                content.className = 'task-content';

                const title = document.createElement('div');
                title.className = 'task-title';
                title.textContent = task.title;
                content.appendChild(title);

                if (task.notes) {
                    const notes = document.createElement('div');
                    notes.className = 'task-notes';
                    notes.textContent = task.notes;
                    content.appendChild(notes);
                }

                const meta = document.createElement('div');
                meta.className = 'task-meta';

                const priorityBadge = document.createElement('span');
                priorityBadge.className = 'priority-badge ' + task.priority;
                priorityBadge.textContent = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);
                meta.appendChild(priorityBadge);

                if (task.dueDate) {
                    const dateSpan = document.createElement('span');
                    dateSpan.className = 'task-date' + (dateStatus ? ' ' + dateStatus : '');
                    dateSpan.textContent = formatDate(task.dueDate);
                    if (dateStatus === 'overdue') dateSpan.textContent += ' (overdue)';
                    meta.appendChild(dateSpan);
                }

                const actions = document.createElement('div');
                actions.className = 'task-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'btn-task-action';
                editBtn.textContent = 'Edit';
                editBtn.addEventListener('click', () => showEditForm(task.id));
                actions.appendChild(editBtn);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-task-action delete';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', () => confirmDelete(task.id));
                actions.appendChild(deleteBtn);

                row.appendChild(checkbox);
                row.appendChild(content);
                row.appendChild(meta);
                row.appendChild(actions);
                container.appendChild(row);

                if (appState.editingTaskId === task.id) {
                    const editForm = createEditForm(task);
                    const formRow = document.createElement('div');
                    formRow.className = 'task-row';
                    formRow.appendChild(editForm);
                    container.appendChild(formRow);
                }
            });
        }

        function createEditForm(task) {
            const form = document.createElement('div');
            form.className = 'task-edit-form';

            form.innerHTML = '<div class="form-group"><label>Task Title</label></div>' +
                '<div class="form-group"><label>Notes</label></div>' +
                '<div class="form-group"><label>Priority</label></div>' +
                '<div class="form-group"><label>Due Date</label></div>' +
                '<div class="form-buttons"></div>';

            const groups = form.querySelectorAll('.form-group');

            const titleInput = document.createElement('input');
            titleInput.type = 'text';
            titleInput.value = task.title;
            groups[0].appendChild(titleInput);

            const notesInput = document.createElement('textarea');
            notesInput.value = task.notes || '';
            groups[1].appendChild(notesInput);

            const prioritySelect = document.createElement('select');
            ['low', 'medium', 'high'].forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p.charAt(0).toUpperCase() + p.slice(1);
                opt.selected = p === task.priority;
                prioritySelect.appendChild(opt);
            });
            groups[2].appendChild(prioritySelect);

            const dueDateInput = document.createElement('input');
            dueDateInput.type = 'date';
            dueDateInput.value = task.dueDate || '';
            groups[3].appendChild(dueDateInput);

            const buttonGroup = form.querySelector('.form-buttons');

            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn-save';
            saveBtn.textContent = 'Save';
            saveBtn.addEventListener('click', async () => {
                task.title = titleInput.value || 'Untitled Task';
                task.notes = notesInput.value;
                task.priority = prioritySelect.value;
                task.dueDate = dueDateInput.value || null;
                appState.editingTaskId = null;

                if (USE_SUPABASE && currentUser) {
                    const saved = await saveTaskToSupabase(task);
                    if (saved && task._isNew) {
                        const idx = appState.tasks.findIndex(t => t.id === task.id);
                        if (idx >= 0) { appState.tasks[idx].id = saved.id; appState.tasks[idx]._isNew = false; }
                    }
                }
                saveData();
                updateStatusBar();
                renderTasks();
            });
            buttonGroup.appendChild(saveBtn);

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'btn-cancel';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.addEventListener('click', () => { appState.editingTaskId = null; renderTasks(); });
            buttonGroup.appendChild(cancelBtn);

            return form;
        }

        function showEditForm(taskId) {
            appState.editingTaskId = taskId;
            renderTasks();
        }

        function confirmDelete(taskId) {
            const task = appState.tasks.find(t => t.id === taskId);
            if (!task) return;
            showConfirmModal('Delete Task', 'Are you sure you want to delete "' + task.title + '"?', async () => {
                if (USE_SUPABASE && currentUser) await deleteTaskFromSupabase(taskId);
                appState.tasks = appState.tasks.filter(t => t.id !== taskId);
                saveData();
                updateStatusBar();
                renderTasks();
            });
        }

        // ===== MODALS =====
        function showConfirmModal(title, message, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('btnConfirmCancel').onclick = () => modal.classList.remove('active');
            document.getElementById('btnConfirmOK').onclick = () => { modal.classList.remove('active'); onConfirm(); };
            modal.classList.add('active');
        }

        function showAddCategoryModal() {
            const modal = document.getElementById('categoryModal');
            document.getElementById('categoryModalTitle').textContent = 'Add Category';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryColor').value = '#f0883e';
            document.getElementById('colorValue').textContent = '#f0883e';

            document.getElementById('categoryForm').onsubmit = async (e) => {
                e.preventDefault();
                const name = document.getElementById('categoryName').value.trim();
                const color = document.getElementById('categoryColor').value;
                if (!name) return;

                const newCat = { name, color, sortOrder: appState.categories.length + 1, _isNew: true };

                if (USE_SUPABASE && currentUser) {
                    const saved = await saveCategoryToSupabase(newCat);
                    if (saved) {
                        appState.categories.push({
                            id: saved.id, name: saved.name, color: saved.color,
                            sortOrder: saved.sort_order, ownerId: saved.owner_id
                        });
                    }
                } else {
                    newCat.id = appState.nextId++;
                    appState.categories.push(newCat);
                }

                saveData();
                renderCategoryTabs();
                modal.classList.remove('active');
            };

            document.getElementById('btnCategoryCancel').onclick = () => modal.classList.remove('active');
            document.getElementById('categoryColor').addEventListener('input', (e) => {
                document.getElementById('colorValue').textContent = e.target.value;
            });

            modal.classList.add('active');
            document.getElementById('categoryName').focus();
        }

        function showCategoryContextMenu(e, categoryId) {
            const menu = document.getElementById('contextMenu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.add('active');

            const category = appState.categories.find(c => c.id === categoryId);
            if (!category) return;

            document.getElementById('contextRename').onclick = async () => {
                menu.classList.remove('active');
                const newName = prompt('Rename category:', category.name);
                if (newName && newName.trim()) {
                    category.name = newName.trim();
                    if (USE_SUPABASE && currentUser) await saveCategoryToSupabase(category);
                    saveData();
                    renderCategoryTabs();
                }
            };

            document.getElementById('contextDelete').onclick = () => {
                menu.classList.remove('active');
                showConfirmModal('Delete Category', 'Delete "' + category.name + '"? All tasks in this category will be deleted.', async () => {
                    if (USE_SUPABASE && currentUser) await deleteCategoryFromSupabase(categoryId);
                    appState.categories = appState.categories.filter(c => c.id !== categoryId);
                    appState.tasks = appState.tasks.filter(t => t.categoryId !== categoryId);
                    if (appState.activeCategory === categoryId) {
                        appState.activeCategory = appState.categories[0]?.id || null;
                    }
                    saveData();
                    updateStatusBar();
                    renderCategoryTabs();
                    renderTasks();
                });
            };

            document.addEventListener('click', (e) => {
                if (e.target !== menu && !menu.contains(e.target)) menu.classList.remove('active');
            }, { once: true });
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === appState.activeFilter);
            });
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', async () => {
            sb.auth.onAuthStateChange(async (event, session) => {
                if (session?.user) {
                    const profile = await loadUserProfile(session.user.id, session.user.email);
                    currentUser = {
                        id: session.user.id, email: session.user.email,
                        display_name: profile?.display_name || session.user.email.split('@')[0],
                        role: profile?.role || 'viewer'
                    };
                    showUserInfo();
                    unlockApp();
                    await initializeData();
                    updateHeaderDate();
                    updateStatusBar();
                    renderCategoryTabs();
                    renderTasks();
                    subscribeToRealtime();
                } else {
                    // Not logged in — redirect to gateway
                    window.location.href = 'index.html';
                }
            });

            updateHeaderDate();

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    appState.activeFilter = btn.dataset.filter;
                    updateFilterButtons();
                    renderTasks();
                });
            });

            document.getElementById('btnAddTask').addEventListener('click', () => {
                const tempId = 'temp-' + Date.now();
                appState.tasks.push({
                    id: tempId, categoryId: appState.activeCategory,
                    title: '', notes: '', priority: 'medium', status: 'open',
                    dueDate: null, createdAt: new Date().toISOString(),
                    completedAt: null, _isNew: true
                });
                appState.editingTaskId = tempId;
                saveData();
                renderTasks();
                updateStatusBar();
            });

            setInterval(updateSyncDisplay, 60000);
        });

        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target.id === 'confirmModal') e.target.classList.remove('active');
        });
        document.getElementById('categoryModal').addEventListener('click', (e) => {
            if (e.target.id === 'categoryModal') e.target.classList.remove('active');
        });
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('contextMenu');
            if (!menu.contains(e.target)) menu.classList.remove('active');
        });
    </script>

    </div><!-- end #appContent -->

</body>
</html>
