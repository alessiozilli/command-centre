<script>
(function(){
  'use strict';
  function esc(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function renderPlays(tiers) {
    if (!tiers || !tiers.length) return '<div class="rm-placeholder">No plays defined yet.</div>';
    return tiers.map(function(t){
      var plays = (t.plays || []).map(function(p){
        return '<div class="rm-play">' +
          '<div class="rm-play-head">' +
            '<span class="rm-play-title">' + esc(p.title) + '</span>' +
            (p.target ? '<span class="rm-play-target">' + esc(p.target) + '</span>' : '') +
          '</div>' +
          (p.note ? '<div class="rm-play-note">' + esc(p.note) + '</div>' : '') +
          '<div class="rm-play-meta">' +
            (p.status ? '<span class="rm-chip status-' + esc(p.status) + '">' + esc(p.status) + '</span>' : '') +
          '</div>' +
        '</div>';
      }).join('');
      return '<section class="rm-tier">' +
        '<div class="rm-tier-head">' +
          '<span class="rm-tier-label">' + esc(t.label) + '</span>' +
          (t.tagline ? '<span class="rm-tier-subtitle">' + esc(t.tagline) + '</span>' : '') +
        '</div>' +
        plays +
      '</section>';
    }).join('');
  }
  function renderRejects(list) {
    if (!list || !list.length) return '';
    return '<h3 class="rm-rejects-head">Rejected outright (do not revisit)</h3>' +
           '<ul class="rm-rejects">' + list.map(function(x){ return '<li>' + esc(x) + '</li>'; }).join('') + '</ul>';
  }

  document.getElementById('rmTitle').textContent    = window.PAGE.title || 'Roadmap';
  document.getElementById('rmSubtitle').textContent = window.PAGE.subtitle || '';

  document.getElementById('rmCommercial').innerHTML =
    renderPlays(ROADMAP.commercial && ROADMAP.commercial.tiers) +
    renderRejects(ROADMAP.commercial && ROADMAP.commercial.rejects);

  document.getElementById('rmKnifebiz').innerHTML = renderPlays(ROADMAP.knifebiz && ROADMAP.knifebiz.tiers);
  document.getElementById('rmQuadfang').innerHTML = renderPlays(ROADMAP.quadfang && ROADMAP.quadfang.tiers);
  document.getElementById('rmReanna').innerHTML =
    '<div class="rm-placeholder">' +
      '<strong style="color:var(--cc-text-muted);">Reanna roadmap â€” deferred</strong><br>' +
      'Full tab build deferred until Reanna has seen the roadmap page and can shape her own subtab.<br>' +
      'Current open items for Reanna are mirrored in <a href="alessio.html">Tasks</a> and <a href="shared.html">Shared</a>.' +
    '</div>';
})();
</script>
