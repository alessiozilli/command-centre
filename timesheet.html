/* Layout + typography come from cc-shell.css. Page-specific styling only. */
h2 { margin: 32px 0 16px; }
.highlight{color:var(--cc-accent);font-weight:600}
.warn{color:var(--cc-warn);font-weight:600}
.danger{color:var(--cc-danger);font-weight:600}
.green{color:var(--cc-success);font-weight:600}
.card{background:var(--cc-bg-card);border:1px solid var(--cc-border);border-radius:var(--cc-r-lg);padding:24px;margin-bottom:20px}

/* Stats &mdash; match cc-shell visual idiom */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:20px}
.stat-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:#58a6ff}
.stat-value.green{color:#3fb950}.stat-value.warn{color:#d29922}.stat-value.danger{color:#f85149}
.stat-label{font-size:12px;color:#8b949e;margin-top:4px}

/* Progress bar &mdash; EXACT match to usage.html */
.progress-track{width:100%;height:28px;background:#21262d;border-radius:14px;overflow:hidden;position:relative;margin:12px 0}
.progress-fill{height:100%;border-radius:14px;transition:width 1s ease;background:linear-gradient(90deg,#3fb950,#58a6ff)}
.progress-fill.warn-bg{background:linear-gradient(90deg,#d29922,#f0883e)}
.progress-fill.danger-bg{background:linear-gradient(90deg,#f85149,#da3633)}
.progress-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:700;color:#e6edf3;text-shadow:0 1px 3px #000}

/* Project bars */
.bar-wrap{margin-bottom:12px}
.bar-header{display:flex;justify-content:space-between;margin-bottom:3px}
.bar-name{font-size:13px;font-weight:600}
.bar-hours{font-size:13px;font-weight:700;color:#58a6ff}
.bar-track{height:24px;background:#21262d;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width 0.8s ease}

/* Chart */
.chart-wrap{position:relative;height:280px;margin-top:12px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#8b949e;font-weight:600;border-bottom:1px solid #30363d}
td{padding:8px 10px;border-bottom:1px solid #21262d;color:#c9d1d9}
tr:hover td{background:#1c2128}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}

/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.filter-btn:hover,.filter-btn.active{background:#58a6ff;color:#0d1117;border-color:#58a6ff}

/* Form */
.form-row{display:grid;grid-template-columns:120px 180px 80px 140px 1fr auto;gap:10px;align-items:end;margin-bottom:16px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;color:#8b949e;margin-bottom:4px;font-weight:600}
.form-group input,.form-group select{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#e6edf3;font-size:13px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#58a6ff}
.btn{padding:8px 16px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:#58a6ff;color:#0d1117}
.btn-primary:hover{background:#79c0ff}
.btn-danger{background:#f8514922;color:#f85149;border:1px solid #f8514944}
.btn-danger:hover{background:#f8514944}
.btn-sm{padding:4px 10px;font-size:11px}

/* Team split */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}

/* Responsive */
@media(max-width:768px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr 1fr}
  .team-grid{grid-template-columns:1fr}
}
</style>

<script>
(function(){

  // â”€â”€ Helpers â”€â”€

  function colorFor(p){return ALL_COLORS[p]||'#58a6ff'}
  function fmt(n){return n.toLocaleString('en-CA',{minimumFractionDigits:1,maximumFractionDigits:1})}

  // â”€â”€ Billable category (first match wins) â”€â”€
  function billableCategory(e){
    var p = e.project || '';
    var c = (e.client || '').toLowerCase();
    if (c === 'kyran' || p === 'QuadFang R&D' || p === 'QuadFang Prototyping' || p === 'QuadFang Website') return 'kyran';
    if (p === 'Grants') return 'sred';
    if (e.client && c !== 'walk-in' && c !== 'internal' && c !== 'avalon') return 'custom';
    if (p === 'Clients') return 'custom';
    return 'internal';
  }

  // â”€â”€ Date range helpers â”€â”€
  function isoToday(){ return new Date().toISOString().slice(0,10); }
  function daysAgo(n){ var d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0,10); }
  function startOfMonth(){ var d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0,10); }
  function startOfYear(){ return new Date().getFullYear() + '-01-01'; }
  function inRange(dateStr, from, to){ return dateStr >= from && dateStr <= to; }

  // â”€â”€ Billable aggregator â”€â”€
  function billableBreakdown(entries, from, to){
    var buckets = { kyran:{hrs:0,dollars:0}, custom:{hrs:0,dollars:0}, sred:{hrs:0,dollars:0}, internal:{hrs:0,dollars:0} };
    var t = to || isoToday();
    entries.forEach(function(e){
      if (from && !inRange(e.date, from, t)) return;
      var cat = billableCategory(e);
      buckets[cat].hrs += e.hours;
      buckets[cat].dollars += e.hours * (BILLABLE_RATES[cat] || 0);
    });
    return buckets;
  }

  function aggregate(entries){
    var byProject={},byDate={},byUser={},total=0,dates=[];
    entries.forEach(function(e){
      byProject[e.project]=(byProject[e.project]||0)+e.hours;
      byUser[e.user]=(byUser[e.user]||0)+e.hours;
      total+=e.hours;
      if(!byDate[e.date]) byDate[e.date]={};
      byDate[e.date][e.project]=(byDate[e.date][e.project]||0)+e.hours;
      if(dates.indexOf(e.date)===-1) dates.push(e.date);
    });
    dates.sort();
    var projects=Object.keys(byProject).sort(function(a,b){return byProject[b]-byProject[a]});
    return {byProject:byProject,byDate:byDate,byUser:byUser,total:total,dates:dates,projects:projects,count:entries.length,days:dates.length};
  }

  H+='<div id="invCustomWrap" style="display:none;margin-top:8px;"><input type="text" id="invCustomName" placeholder="Client name (e.g. Avalon Research)" style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#e6edf3;font-size:13px;width:240px;"></div>';

    h+='<div class="stat-box"><div class="stat-value">'+agg.count+'</div><div class="stat-label">Entries</div></div>';

    var forgeH=0,shopH=0;

    var datasets=agg.projects.map(function(p){
      return {label:p,data:agg.dates.map(function(d){return(agg.byDate[d]&&agg.byDate[d][p])||0}),backgroundColor:colorFor(p),borderRadius:3};
    });
    new Chart($(canvasId),{
      type:'bar',data:{labels:agg.dates.map(function(d){return d.replace('2026-','')}),datasets:datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},
        scales:{x:{stacked:true,ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{stacked:true,ticks:{color:'#8b949e'},grid:{color:'#21262d'},title:{display:true,text:'Hours',color:'#8b949e'}}}}
    });
  }

  function renderTeam(id,agg,entries){
    var h='';
    Object.keys(agg.byUser).sort().forEach(function(u){
      h+='<div><h3 style="color:#58a6ff;margin-bottom:8px;">'+u+'</h3>';
      h+='<div class="stat-value" style="font-size:28px;">'+fmt(agg.byUser[u])+' hrs</div>';
      h+='<div class="stat-label" style="margin-bottom:12px;">'+((agg.byUser[u]/agg.total)*100).toFixed(0)+'% of total</div>';
      var up={};entries.forEach(function(e){if(e.user===u)up[e.project]=(up[e.project]||0)+e.hours});
      var sorted=Object.keys(up).sort(function(a,b){return up[b]-up[a]});
      sorted.forEach(function(p){
        h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #21262d;">';
        h+='<span style="color:'+colorFor(p)+';">'+p+'</span><span style="color:#8b949e;">'+fmt(up[p])+'h</span></div>';
      });
      h+='</div>';
    });
    $(id).innerHTML=h;
  }

  function renderFilterTable(filterId,tableId,entries,showDelete){
    var projects={};entries.forEach(function(e){projects[e.project]=true});
    var sorted=Object.keys(projects).sort();
    var fh='<button class="filter-btn active" data-f="all">All</button>';
    sorted.forEach(function(p){fh+='<button class="filter-btn" data-f="'+p+'" style="border-color:'+colorFor(p)+'">'+p+'</button>'});
    $(filterId).innerHTML=fh;

    function render(filter){
      var tbody=document.querySelector('#'+tableId+' tbody');
      var rows='';
      var list=entries.slice().sort(function(a,b){return b.date.localeCompare(a.date)||b.hours-a.hours});
      list.forEach(function(e){
        if(filter!=='all'&&e.project!==filter)return;
        var c=colorFor(e.project);
        rows+='<tr>';
        rows+='<td style="white-space:nowrap;">'+e.date+'</td>';
        if(!showDelete) rows+='<td>'+e.user+'</td>';
        rows+='<td><span class="tag" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44;">'+e.project+'</span></td>';
        rows+='<td style="font-weight:700;color:#58a6ff;">'+parseFloat(e.hours).toFixed(1)+'</td>';
        if(showDelete) rows+='<td>'+(e.client||'&mdash;')+'</td>';
        rows+='<td style="max-width:300px;">'+(e.desc||e.description||'')+'</td>';
        if(showDelete) rows+='<td><button class="btn btn-danger btn-sm" data-del="'+e.id+'">âœ•</button></td>';
        rows+='</tr>';
      });
      tbody.innerHTML=rows||'<tr><td colspan="6" style="text-align:center;color:#8b949e;padding:24px;">No entries yet &mdash; add your first shop entry above!</td></tr>';

      if(showDelete){
        tbody.querySelectorAll('[data-del]').forEach(function(btn){
          btn.addEventListener('click',async function(){
            if(!confirm('Delete this entry?'))return;
            await sb.from('time_log').delete().eq('id',btn.dataset.del);
            loadShop();
          });
        });
      }
    }
    render('all');
    $(filterId).addEventListener('click',function(ev){
      if(!ev.target.classList.contains('filter-btn'))return;
      document.querySelectorAll('#'+filterId+' .filter-btn').forEach(function(b){b.classList.remove('active')});
      ev.target.classList.add('active');
      render(ev.target.dataset.f);
    });
  }

  // â”€â”€ Billable Summary (3 time windows) â”€â”€
  function renderBillableSummary(id, allEntries){
    var wk  = billableBreakdown(allEntries, daysAgo(7));
    var mo  = billableBreakdown(allEntries, startOfMonth());
    var ytd = billableBreakdown(allEntries, startOfYear());
    function sumHrs(b){ return b.kyran.hrs + b.custom.hrs + b.sred.hrs + b.internal.hrs; }
    function sumDol(b){ return b.kyran.dollars + b.custom.dollars; }
    function block(label,b){
      return '<div class="stat-box" style="text-align:left;padding:16px;">'+
        '<div style="font-size:11px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">'+label+'</div>'+
        '<div style="font-size:24px;font-weight:700;color:#58a6ff;margin-top:6px;">'+fmt(sumHrs(b))+' <span style="font-size:12px;color:#8b949e;font-weight:400;">hrs</span></div>'+
        '<div style="font-size:16px;font-weight:700;color:#3fb950;margin-top:2px;">$'+sumDol(b).toFixed(0)+' <span style="font-size:11px;color:#8b949e;font-weight:400;">billable</span></div>'+
        '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #21262d;font-size:11px;line-height:1.6;">'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#f85149;">â&mdash; Kyran</span><span style="color:#c9d1d9;">'+fmt(b.kyran.hrs)+'h &middot; $'+b.kyran.dollars.toFixed(0)+'</span></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#f778ba;">â&mdash; Custom</span><span style="color:#c9d1d9;">'+fmt(b.custom.hrs)+'h &middot; $'+b.custom.dollars.toFixed(0)+'</span></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#d29922;">â&mdash; SR&amp;ED</span><span style="color:#c9d1d9;">'+fmt(b.sred.hrs)+'h</span></div>'+
          '<div style="display:flex;justify-content:space-between;"><span style="color:#79c0ff;">â&mdash; Internal</span><span style="color:#c9d1d9;">'+fmt(b.internal.hrs)+'h</span></div>'+
        '</div>'+
      '</div>';
    }
    $(id).innerHTML = '<div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));">'+
      block('Last 7 Days', wk) + block('This Month', mo) + block('Year-to-Date', ytd) + '</div>'+
      '<div style="font-size:11px;color:#8b949e;margin-top:12px;text-align:right;">Rates: Kyran $'+BILLABLE_RATES.kyran+'/hr &middot; Custom $'+BILLABLE_RATES.custom+'/hr &middot; edit in DATA BLOCK</div>';
  }

  // â”€â”€ Weekly Digest (project breakdown, last 7 days) â”€â”€
  function renderWeeklyDigest(id, allEntries){
    var from = daysAgo(7);
    var byProj = {}, byUser = {}, total = 0;
    allEntries.forEach(function(e){
      if (e.date < from) return;
      byProj[e.project] = (byProj[e.project]||0) + e.hours;
      byUser[e.user]    = (byUser[e.user]||0)    + e.hours;
      total += e.hours;
    });
    var projects = Object.keys(byProj).sort(function(a,b){return byProj[b]-byProj[a]});
    if (!projects.length){ $(id).innerHTML = '<div style="color:#8b949e;text-align:center;padding:24px;">No entries in the last 7 days.</div>'; return; }
    var h = '<div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:baseline;">';
    h += '<strong style="color:#e6edf3;font-size:16px;">'+fmt(total)+' hours logged</strong>';
    var userParts = Object.keys(byUser).map(function(u){return u+' '+fmt(byUser[u])+'h';});
    h += '<span style="color:#8b949e;font-size:12px;">'+userParts.join(' &middot; ')+'</span></div>';
    projects.forEach(function(p){
      var c = colorFor(p);
      var pct = (byProj[p]/total*100).toFixed(0);
      h += '<div class="bar-wrap"><div class="bar-header"><span class="bar-name" style="color:'+c+'">'+p+'</span><span class="bar-hours">'+fmt(byProj[p])+' hrs &middot; '+pct+'%</span></div>';
      h += '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+c+';"></div></div></div>';
    });
    $(id).innerHTML = h;
  }

  // â”€â”€ Quick-Add Template bar (Shop tab) â”€â”€
  function wireQuickAdd(){
    var row = $('quickAddRow');
    var h = '';
    QUICK_TEMPLATES.forEach(function(t,i){
      h += '<button class="filter-btn" data-qa="'+i+'" style="border-color:#58a6ff22;background:#58a6ff11;color:#58a6ff;">'+t.label+'</button>';
    });
    row.innerHTML = h;
    row.addEventListener('click', function(ev){
      var idx = ev.target.dataset && ev.target.dataset.qa;
      if (idx === undefined) return;
      var t = QUICK_TEMPLATES[parseInt(idx,10)];
      $('shopProject').value = t.project;
      $('shopHours').value   = t.hours;
      $('shopClient').value  = t.client;
      $('shopDesc').value    = t.desc;
      $('shopHours').focus();
    });
  }

  // â”€â”€ Invoice Generator (Shop tab) â”€â”€
  function wireInvoice(){
    var invMonth = $('invMonth');
    invMonth.value = (new Date().toISOString()).slice(0,7);
    $('invClient').addEventListener('change', function(){
      $('invCustomWrap').style.display = (this.value === 'custom') ? 'block' : 'none';
      $('invRate').value = (this.value === 'Kyran') ? BILLABLE_RATES.kyran : BILLABLE_RATES.custom;
    });
    $('invGen').addEventListener('click', renderInvoice);
  }

  function renderInvoice(){
    var clientSel = $('invClient').value;
    var clientName = (clientSel === 'custom') ? ($('invCustomName').value || '').trim() : clientSel;
    if (!clientName){ alert('Enter a client name.'); return; }
    var month = $('invMonth').value;
    if (!month){ alert('Pick a month.'); return; }
    var rate = parseFloat($('invRate').value) || 0;
    var from = month + '-01';
    var to   = month + '-31';

    var allCombined = shopEntries.concat(FORGE_LOG);

    var matches = allCombined.filter(function(e){
      if (!inRange(e.date, from, to)) return false;
      var c = (e.client||'').toLowerCase();
      if (clientSel === 'Kyran'){
        return c === 'kyran' || e.project === 'QuadFang R&D' || e.project === 'QuadFang Prototyping' || e.project === 'QuadFang Website';
      }
      return c === clientName.toLowerCase();
    }).sort(function(a,b){return a.date.localeCompare(b.date);});

    if (!matches.length){
      $('invPreview').innerHTML = '<div style="background:#f8514922;border:1px solid #f85149;padding:16px;border-radius:8px;color:#f85149;">No entries found for '+clientName+' in '+month+'.</div>';
      return;
    }

    var totalHrs = 0, totalDol = 0;
    var rows = matches.map(function(e){
      var sub = e.hours * rate;
      totalHrs += e.hours;
      totalDol += sub;
      return '<tr>'+
        '<td style="padding:6px 8px;border-bottom:1px solid #eee;">'+e.date+'</td>'+
        '<td style="padding:6px 8px;border-bottom:1px solid #eee;">'+e.project+'</td>'+
        '<td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;color:#555;">'+(e.desc||'').replace(/</g,'&lt;')+'</td>'+
        '<td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right;">'+fmt(e.hours)+'</td>'+
        '<td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right;">$'+sub.toFixed(2)+'</td>'+
      '</tr>';
    }).join('');

    var today = isoToday();
    var invNum = 'AZ-' + month.replace('-','') + '-' + clientName.toUpperCase().replace(/\s/g,'').slice(0,4);

    var html = '<div id="invDoc" style="background:#fff;color:#222;padding:32px;border-radius:8px;font-family:Arial,Helvetica,sans-serif;max-width:900px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #990000;padding-bottom:16px;margin-bottom:24px;">'+
        '<div>'+
          '<h1 style="margin:0;color:#990000;font-size:28px;letter-spacing:1px;">AZ CUSTOM KNIVES LTD.</h1>'+
          '<div style="color:#555;font-size:12px;margin-top:4px;line-height:1.6;">#104, 9602 115 Street, Grande Prairie, AB T8V 5W2<br>1-780-831-2987 &middot; alessio.zilli@azcustomknives.com<br>A Slice of Excellence</div>'+
        '</div>'+
        '<div style="text-align:right;">'+
          '<h2 style="margin:0;color:#333;font-size:22px;">INVOICE DRAFT</h2>'+
          '<div style="font-size:12px;color:#666;margin-top:4px;line-height:1.6;"><strong>'+invNum+'</strong><br>Issued: '+today+'<br>Period: '+month+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="margin-bottom:20px;font-size:13px;"><strong style="color:#990000;">Bill To:</strong> '+clientName+'</div>'+
      '<table style="width:100%;border-collapse:collapse;font-size:13px;">'+
        '<thead><tr style="background:#f5f5f5;color:#333;">'+
          '<th style="text-align:left;padding:8px;border-bottom:2px solid #990000;">Date</th>'+
          '<th style="text-align:left;padding:8px;border-bottom:2px solid #990000;">Project</th>'+
          '<th style="text-align:left;padding:8px;border-bottom:2px solid #990000;">Description</th>'+
          '<th style="text-align:right;padding:8px;border-bottom:2px solid #990000;">Hours</th>'+
          '<th style="text-align:right;padding:8px;border-bottom:2px solid #990000;">Amount</th>'+
        '</tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
        '<tfoot><tr>'+
          '<td colspan="3" style="padding:12px 8px;text-align:right;font-weight:700;border-top:2px solid #990000;">Total (@ $'+rate+'/hr):</td>'+
          '<td style="padding:12px 8px;text-align:right;font-weight:700;border-top:2px solid #990000;">'+fmt(totalHrs)+'</td>'+
          '<td style="padding:12px 8px;text-align:right;font-weight:700;border-top:2px solid #990000;color:#990000;font-size:17px;">$'+totalDol.toFixed(2)+'</td>'+
        '</tr></tfoot>'+
      '</table>'+
      '<div style="margin-top:28px;font-size:11px;color:#777;border-top:1px solid #ddd;padding-top:12px;"><em>DRAFT &mdash; review line items, rate, and client details before sending. Generated from AZCK Timesheet.</em></div>'+
      '</div>'+
      '<div style="margin-top:12px;display:flex;gap:8px;">'+
        '<button class="btn btn-primary" onclick="(function(){var w=window.open(\'\',\'_blank\');w.document.write(document.getElementById(\'invDoc\').outerHTML);w.document.close();setTimeout(function(){w.print();},250);})();">Print / Save PDF</button>'+
        '<button class="btn" style="background:#30363d;color:#e6edf3;" onclick="document.getElementById(\'invPreview\').innerHTML=\'\';">Clear</button>'+
      '</div>';

    $('invPreview').innerHTML = html;
  }

  // -- FORGE TAB + SHOP TAB -- both load from time_log --
    // â”€â”€ SHOP TAB &mdash; load from Supabase â”€â”€
  async function loadShop(){
    var {data,error}=await sb.from('time_log').select('*').in('project',SHOP_PROJECTS_TL).order('start_time',{ascending:false});
    if(error){console.error(error);return}
    shopEntries=(data||[]).map(mapTL);

    var shopAgg=aggregate(shopEntries);
    renderStats('shopStats',shopAgg);
    renderBars('shopBars',shopAgg);
    renderFilterTable('shopFilter','shopTable',shopEntries,true);
    renderOverview();
  }

  function renderOverview(){
    var combined=FORGE_LOG.concat(shopEntries);
    renderBillableSummary('billableSummary', combined);
    renderWeeklyDigest('weeklyDigest', combined);
    var allAgg=aggregate(combined);
    renderStats('overviewStats',allAgg);
    renderProgress('overviewProgress',allAgg);
    renderBars('overviewBars',allAgg);
    renderChart('overviewChart',allAgg);
    renderTeam('overviewTeam',allAgg,combined);
  }

  // â”€â”€ Add shop entry â”€â”€
  $('shopAdd').addEventListener('click',async function(){
    var date=$('shopDate').value;
    var project=$('shopProject').value;
    var hours=parseFloat($('shopHours').value);
    var client=$('shopClient').value.trim();
    var desc=$('shopDesc').value.trim();

    if(!date||!project||!hours||hours<=0){
      var msg=$('shopFormMsg');
      msg.textContent='Please fill in date, project, and hours.';
      msg.style.color='#f85149';msg.style.display='block';
      setTimeout(function(){msg.style.display='none'},3000);
      return;
    }

    var {error}=await sb.from('time_log').insert({
      start_time:date+'T00:00:00+00:00',minutes:Math.round(hours*60),source:'shop',project:project,topic:desc||null,notes:client||null
    });

    if(error){console.error(error);return}

    var msg=$('shopFormMsg');
    msg.textContent='âœ“ Logged '+hours+'h to '+project;
    msg.style.color='#3fb950';msg.style.display='block';
    setTimeout(function(){msg.style.display='none'},3000);

    $('shopHours').value='';
    $('shopClient').value='';
    $('shopDesc').value='';
    $('shopDate').valueAsDate=new Date();

    loadShop();
  });

  // â”€â”€ Wire quick-add + invoice â”€â”€
  wireQuickAdd();
  wireInvoice();

  // -- Initial load --
  loadForge();
  loadShop();

})();
/* Tab switching is handled by cc-shell.js via [data-subtab] &mdash; no page-level logic needed. */
</script>
</body>
