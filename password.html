<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co; frame-src 'none';">
<title>Finance · AZCK Command Centre</title>
<link rel="stylesheet" href="cc-shell.css">
<style>
  /* Page-scoped finance styles — no shell overrides */
  .fin-wrap { padding: 24px; max-width: var(--cc-max-w); margin: 0 auto; }
  .fin-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; color: var(--cc-text); }
  .fin-subtitle { font-size: 13px; color: var(--cc-text-muted); margin-bottom: 24px; }

  .fin-hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .fin-stat { background: var(--cc-bg-card); border: 1px solid var(--cc-border); border-radius: var(--cc-r-md); padding: 14px 16px; }
  .fin-stat .n { font-size: 26px; font-weight: 800; line-height: 1.1; color: var(--cc-text); }
  .fin-stat .l { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: var(--cc-text-muted); text-transform: uppercase; margin-top: 4px; }
  .fin-stat .n.ok { color: var(--cc-success); }
  .fin-stat .n.warn { color: var(--cc-warn); }
  .fin-stat .n.danger { color: var(--cc-danger); }
  .fin-stat .n.accent { color: var(--cc-accent); }

  .fin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
  .fin-tile { background: var(--cc-bg-card); border: 1px solid var(--cc-border); border-radius: var(--cc-r-lg); padding: 20px; display: flex; flex-direction: column; }
  .fin-tile-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--cc-border-soft); }
  .fin-tile-title { font-size: 13px; font-weight: 700; letter-spacing: 0.8px; color: var(--cc-text-muted); text-transform: uppercase; }
  .fin-tile-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--cc-bg-raised); color: var(--cc-text-muted); }
  .fin-tile-pill.ok { color: var(--cc-success); background: #3fb95018; }
  .fin-tile-pill.warn { color: var(--cc-warn); background: #d2992218; }
  .fin-tile-pill.danger { color: var(--cc-danger); background: #f8514918; }

  .fin-row { padding: 8px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; border-bottom: 1px dashed var(--cc-border-soft); font-size: 13px; }
  .fin-row:last-child { border-bottom: 0; }
  .fin-row .label { color: var(--cc-text-body); flex: 1; min-width: 0; }
  .fin-row .value { color: var(--cc-text-muted); white-space: nowrap; font-size: 12px; }
  .fin-row .value.accent { color: var(--cc-accent); }
  .fin-row .value.success { color: var(--cc-success); }
  .fin-row .value.warn { color: var(--cc-warn); }
  .fin-row .value.danger { color: var(--cc-danger); }

  .fin-banner { background: var(--cc-bg-card); border: 1px solid var(--cc-border); border-radius: var(--cc-r-md); padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: var(--cc-text-muted); }
  .fin-banner strong { color: var(--cc-text-body); }
  .fin-banner a { color: var(--cc-accent); text-decoration: none; }
  .fin-banner a:hover { text-decoration: underline; }
</style>
<script src="auth.js"></script>
</head>
<body>

<main id="cc-content" class="fin-wrap">
  <h1 class="fin-title">Finance</h1>
  <div class="fin-subtitle">Projections snapshot · source of truth: <span id="fin-source"></span></div>

  <div class="fin-banner">
    <strong>Phase 1 snapshot</strong> — this page mirrors the latest manual projection from the Financial Projections Spec. Live Supabase-driven projections land in Phase B8. Update the DATA BLOCK during Save All to refresh values.
  </div>

  <div class="fin-hero" id="finHero"></div>
  <div class="fin-grid" id="finGrid"></div>
</main>

<!-- ═══════════════════════ DATA BLOCK ═══════════════════════ -->
<script>

  subtabs: []

    { n: '4 of 25', l: 'Revenue streams active', tone: 'accent' },

  ],
  revenue: [
    { label: 'Custom knife orders',           value: 'Active · irregular', tone: 'accent' },
    { label: 'Sharpening (walk-in + subs)',   value: 'Active · low volume', tone: 'accent' },
    { label: 'Classes / team-building',       value: 'Active · seasonal',   tone: 'accent' },

    { label: 'Software subs (Autodesk, Adobe, Claude)', value: '~$400/mo',    tone: 'warn' },
    { label: 'Shop rent + utilities',          value: '~$1,200/mo',           tone: 'warn' },
    { label: 'Steel + handle materials',       value: 'Variable',             tone: '' },
    { label: 'Marketing / shows / fuel',       value: 'Variable',             tone: '' }
  ],
  projections: [
    { label: 'Q2 2026 net',        value: '—$2.4K May · +$162 Aug', tone: 'warn' },
    { label: 'Q3 2026 net (est)',  value: 'Break-even with QuadFang soft launch', tone: '' },
    { label: 'Q4 2026 net (est)',  value: '+$3–6K with holiday retail', tone: 'ok' },

</script>
<!-- ═══════════════ END DATA BLOCK ═══════════════ -->

<script src="cc-shell.js"></script>
<script>
(function(){
  'use strict';
  function esc(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function heroStat(h){
    return '<div class="fin-stat"><div class="n ' + (h.tone||'') + '">' +
           esc(h.n) + '</div><div class="l">' + esc(h.l) + '</div></div>';
  }
  function tileRow(r){
    var tone = r.tone ? (' ' + r.tone) : '';
    return '<div class="fin-row"><span class="label">' + esc(r.label) +
           '</span><span class="value' + tone + '">' + esc(r.value) + '</span></div>';
  }
  function tile(title, rows, pill){
    var pillHTML = pill ? ('<span class="fin-tile-pill ' + (pill.tone||'') + '">' + esc(pill.text) + '</span>') : '';
    var body = (rows && rows.length) ? rows.map(tileRow).join('') : '<div class="fin-row"><span class="label">Nothing yet</span></div>';
    return '<section class="fin-tile"><div class="fin-tile-head">' +
           '<span class="fin-tile-title">' + esc(title) + '</span>' + pillHTML + '</div>' +
           body + '</section>';
  }

  document.getElementById('fin-source').textContent = FIN.source || '—';

  var heroOut = (FIN.hero || []).map(heroStat).join('');
  document.getElementById('finHero').innerHTML = heroOut;

  var gridOut = '';
  gridOut += tile('Revenue Streams',        FIN.revenue,     { text: String((FIN.revenue||[]).length) + ' streams', tone: 'ok' });
  gridOut += tile('Expense Streams',        FIN.expenses,    { text: String((FIN.expenses||[]).length) + ' streams', tone: 'warn' });
  gridOut += tile('Quarterly Projections',  FIN.projections, { text: 'Est.', tone: '' });
  gridOut += tile('Grants in Flight',       FIN.grants,      { text: String((FIN.grants||[]).length), tone: 'accent' });
  document.getElementById('finGrid').innerHTML = gridOut;
})();
</script>

</body>
</html>
