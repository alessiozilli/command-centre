<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Centre — Alessio</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Lexend+Mega:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --az:#990000;--qf:#c4922a;--per:#3a7fbf;--td:#2a9e8f;--fam:#9b72cf;
  --bg:#0f0f0f;--surf:#1a1a1a;--surf2:#242424;--surf3:#2e2e2e;
  --text:#f0ede8;--text2:#a09c96;--text3:#6a6762;--border:#2e2e2e;
  --r:10px;--font:'Lexend',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.75;letter-spacing:0.02em;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surf);flex-wrap:wrap;gap:12px}
.hdr-left{display:flex;flex-direction:column}
.brand{font-family:'Lexend Mega',sans-serif;font-size:15px;letter-spacing:0.07em;color:var(--text)}
.datelbl{font-size:11px;color:var(--text3);font-weight:300;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:20px}
.hdr-stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-n{font-size:20px;font-weight:600;line-height:1}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px}
.s-open{color:var(--text)}.s-today{color:var(--qf)}.s-done{color:#6ec06e}
.sync-btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.sync-btn:hover{background:var(--surf2);border-color:var(--text3);color:var(--text)}
.sync-icon{font-size:14px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.dot.live{background:#6ec06e}
.dot.err{background:#e07070}
.dot.busy{background:var(--qf);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--border);padding:0 24px;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;color:var(--text3);transition:color .15s,border-color .15s;font-family:var(--font);background:none;border-top:none;border-left:none;border-right:none;letter-spacing:0.03em;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text2)}
.tab.a-per{color:var(--per);border-bottom-color:var(--per)}
.tab.a-az{color:var(--az);border-bottom-color:var(--az)}
.tab.a-qf{color:var(--qf);border-bottom-color:var(--qf)}
.tab.a-td{color:var(--td);border-bottom-color:var(--td)}
.tab.a-fam{color:var(--fam);border-bottom-color:var(--fam)}
.tc{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;padding:0 5px;font-size:10px;font-weight:700;margin-left:5px}
.tc-per{background:rgba(58,127,191,.18);color:var(--per)}
.tc-az{background:rgba(153,0,0,.2);color:var(--az)}
.tc-qf{background:rgba(196,146,42,.18);color:var(--qf)}
.tc-td{background:rgba(42,158,143,.18);color:var(--td)}
.tc-fam{background:rgba(155,114,207,.18);color:var(--fam)}
.main{flex:1;padding:20px 24px}
.loading-main{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:14px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--per);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.pt{font-size:20px;font-weight:600}
.pt small{font-weight:300;font-size:13px;color:var(--text3);margin-left:8px}
.add-btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);letter-spacing:0.02em;display:flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.85}
.ab-per{background:var(--per);color:#fff}.ab-az{background:var(--az);color:#fff}
.ab-qf{background:var(--qf);color:#1a0e00}.ab-td{background:var(--td);color:#fff}.ab-fam{background:var(--fam);color:#fff}
.sr{display:flex;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.sr span{font-size:12px;color:var(--text3)}
.sr strong{color:var(--text2);font-weight:500}
.pb-wrap{height:3px;background:var(--surf3);border-radius:2px;margin-bottom:14px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pb-per{background:var(--per)}.pb-az{background:var(--az)}.pb-qf{background:var(--qf)}.pb-td{background:var(--td)}.pb-fam{background:var(--fam)}
.fb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb-btn{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.fb-btn:hover{border-color:var(--text3);color:var(--text2)}
.fb-btn.on{border-color:transparent;color:#fff}
.fb-per.on{background:var(--per)}.fb-az.on{background:var(--az)}.fb-qf.on{background:var(--qf)}
.fb-td.on{background:var(--td)}.fb-fam.on{background:var(--fam)}
.nozh{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--td);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.nozh::after{content:'';flex:1;height:1px;background:var(--border)}
.nozh:first-child{margin-top:0}
.tg{display:flex;flex-direction:column;gap:8px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;display:flex;align-items:flex-start;gap:11px;transition:border-color .15s,transform .1s;border-left-width:3px}
.card:hover{transform:translateY(-1px);border-color:var(--surf3)}
.card.done{opacity:.38}
.bl-per{border-left-color:var(--per)}.bl-az{border-left-color:var(--az)}.bl-qf{border-left-color:var(--qf)}.bl-td{border-left-color:var(--td)}.bl-fam{border-left-color:var(--fam)}
.chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;margin-top:1px;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:11px;background:transparent;color:transparent}
.chk:hover{border-color:var(--text2)}
.ck-per{background:var(--per);border-color:var(--per);color:#fff}
.ck-az{background:var(--az);border-color:var(--az);color:#fff}
.ck-qf{background:var(--qf);border-color:var(--qf);color:#1a0e00}
.ck-td{background:var(--td);border-color:var(--td);color:#fff}
.ck-fam{background:var(--fam);border-color:var(--fam);color:#fff}
.tb{flex:1;min-width:0}
.tt{font-size:14px;font-weight:500;line-height:1.45}
.done .tt{text-decoration:line-through}
.tn{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.tm{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap}
.pbadge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em}
.ph-b{background:rgba(220,60,60,.13);color:#e07070}
.pm-b{background:rgba(196,146,42,.13);color:var(--qf)}
.pl-b{background:rgba(80,180,80,.1);color:#6ec06e}
.due{font-size:11px;color:var(--text3)}
.due.ov{color:#e07070}.due.tod{color:var(--qf)}
.ntag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;background:rgba(42,158,143,.15);color:var(--td);letter-spacing:0.06em}
.ta{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.ib{width:27px;height:27px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--font)}
.ib:hover{background:var(--surf2);color:var(--text);border-color:var(--border)}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-i{font-size:28px;margin-bottom:10px;opacity:.3}
.empty-m{font-size:14px;font-weight:300}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mo.open{display:flex}
.md{background:var(--surf);border:1px solid var(--surf3);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.md-title{font-size:17px;font-weight:600;margin-bottom:20px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.fi,.fta,.fsl{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;outline:none;transition:border-color .15s}
.fi:focus,.fta:focus,.fsl:focus{border-color:var(--text3)}
.fta{resize:vertical;min-height:70px}
.fsl{appearance:none;cursor:pointer}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ma{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.bc{padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font)}
.bc:hover{background:var(--surf2)}
.bs{padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font)}
.bs-per{background:var(--per);color:#fff}.bs-az{background:var(--az);color:#fff}
.bs-qf{background:var(--qf);color:#1a0e00}.bs-td{background:var(--td);color:#fff}.bs-fam{background:var(--fam);color:#fff}
.sync-mo{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.sync-mo.open{display:flex}
.sync-md{background:var(--surf);border:1px solid var(--surf3);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.sync-md h2{font-size:17px;font-weight:600;margin-bottom:6px}
.sync-md p{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:18px}
.sync-status-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.stabs{display:flex;gap:4px;margin-bottom:20px}
.stab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.stab.son{background:var(--surf3);color:var(--text);border-color:var(--surf3)}
.sync-section h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:10px}
.code-box{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-family:monospace;font-size:11px;color:var(--text2);word-break:break-all;max-height:80px;overflow-y:auto;margin-bottom:10px}
.copy-btn{padding:7px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s}
.copy-btn:hover{background:var(--surf2);color:var(--text)}
.fta-sm{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:monospace;font-size:12px;line-height:1.5;outline:none;resize:vertical;min-height:80px;transition:border-color .15s}
.fta-sm:focus{border-color:var(--text3)}
.import-btn{padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);background:var(--per);color:#fff;margin-top:10px;transition:opacity .15s}
.import-btn:hover{opacity:.85}
.sync-close{padding:9px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);margin-top:14px;width:100%}
.sync-close:hover{background:var(--surf2)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surf3);border:1px solid var(--border);border-radius:var(--r);padding:9px 18px;font-size:13px;font-weight:500;color:var(--text);z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){
  .hdr{padding:11px 16px}
  .main{padding:14px 16px}
  .tabs{padding:0 16px}
  .fr{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app" id="main-app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="brand">COMMAND CENTRE</div>
      <div class="datelbl" id="datelbl"></div>
    </div>
    <div class="hdr-right">
      <div class="hdr-stats">
        <div class="stat"><div class="stat-n s-open" id="s-open">0</div><div class="stat-l">Open</div></div>
        <div class="stat"><div class="stat-n s-today" id="s-today">0</div><div class="stat-l">Today</div></div>
        <div class="stat"><div class="stat-n s-done" id="s-done">0</div><div class="stat-l">Done</div></div>
      </div>
      <button class="sync-btn" onclick="openSync()"><span class="sync-icon">⇄</span> Sync / Export</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-per" onclick="go('per')">Personal <span class="tc tc-per" id="tc-per">0</span></button>
    <button class="tab" id="tab-az" onclick="go('az')">AZ Custom Knives <span class="tc tc-az" id="tc-az">0</span></button>
    <button class="tab" id="tab-qf" onclick="go('qf')">Quad Fang <span class="tc tc-qf" id="tc-qf">0</span></button>
    <button class="tab" id="tab-td" onclick="go('td')">3D Printing <span class="tc tc-td" id="tc-td">0</span></button>
    <button class="tab" id="tab-fam" onclick="go('fam')">Family <span class="tc tc-fam" id="tc-fam">0</span></button>
  </div>
  <div class="main" id="main"><div class="loading-main"><div class="spinner"></div>Loading tasks…</div></div>
</div>

<div class="mo" id="mo">
  <div class="md">
    <div class="md-title" id="md-title">Add Task</div>
    <div class="fg"><label class="fl">Task Title</label><input class="fi" id="i-title" placeholder="What needs to get done?"></div>
    <div class="fg"><label class="fl">Notes (optional)</label><textarea class="fta" id="i-notes" placeholder="Details, context, next steps…"></textarea></div>
    <div class="fr">
      <div class="fg"><label class="fl">Priority</label>
        <select class="fsl" id="i-pri"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
      </div>
      <div class="fg"><label class="fl">Due Date</label><input type="date" class="fi" id="i-due"></div>
    </div>
    <div class="fg" id="nozzle-row" style="display:none">
      <label class="fl">Nozzle Size</label>
      <select class="fsl" id="i-nozzle"><option value="0.4">0.4 mm — standard</option><option value="0.2">0.2 mm — fine detail</option></select>
    </div>
    <div class="ma">
      <button class="bc" onclick="closeM()">Cancel</button>
      <button class="bs" id="bs-main" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="sync-mo" id="sync-mo">
  <div class="sync-md">
    <h2>Sync / Database</h2>
    <p>Your tasks are stored in Supabase and sync live across all your devices automatically. Use Export Backup to save a copy of your data.</p>
    <div class="sync-status-row">
      <div class="dot" id="sync-dot"></div>
      <span id="sync-lbl">connecting…</span>
    </div>
    <div class="stabs">
      <button class="stab son" id="stab-exp" onclick="switchSync('export')">Export Backup</button>
      <button class="stab" id="stab-imp" onclick="switchSync('import')">Import / Restore</button>
    </div>
    <div id="sync-export">
      <div class="sync-section">
        <h3>Export your data</h3>
        <div class="code-box" id="export-code"></div>
        <button class="copy-btn" onclick="copyCode()">Copy Backup JSON</button>
      </div>
    </div>
    <div id="sync-import" style="display:none">
      <div class="sync-section">
        <h3>Restore from backup</h3>
        <textarea class="fta-sm" id="import-ta" placeholder="Paste your backup JSON here…"></textarea>
        <button class="import-btn" onclick="importCode()">Restore Tasks</button>
      </div>
    </div>
    <button class="sync-close" onclick="closeSyncM()">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

const today=()=>new Date().toISOString().split('T')[0];
function fmtDate(d){if(!d)return'';const[y,m,dy]=d.split('-');const dt=new Date(+y,+m-1,+dy);const diff=Math.round((dt-new Date(today()))/86400000);if(diff===0)return'Today';if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';if(diff<0)return Math.abs(diff)+'d overdue';if(diff<=7)return'In '+diff+'d';return dt.toLocaleDateString('en-CA',{month:'short',day:'numeric'});}
function dueCls(d){if(!d)return'';const diff=Math.round((new Date(d)-new Date(today()))/86400000);return diff<0?'ov':diff===0?'tod':'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function syncStatus(state,lbl){const d=document.getElementById('sync-dot');const l=document.getElementById('sync-lbl');if(d)d.className='dot'+(state?' '+state:'');if(l)l.textContent=lbl;}
async function boot(){document.getElementById('datelbl').textContent=new Date().toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('i-due').min=today();syncStatus('busy','connecting…');await load();go('per');}
async function load(){try{const{data,error}=await sb.from('cc_tasks').select('*');if(error)throw error;tasks={per:[],az:[],qf:[],td:[],fam:[]};if(!data||data.length===0){syncStatus('busy','seeding…');const{error:e2}=await sb.from('cc_tasks').insert(SEED);if(e2)throw e2;SEED.forEach(t=>{if(tasks[t.pillar])tasks[t.pillar].push(t);});}else{data.forEach(t=>{if(tasks[t.pillar])tasks[t.pillar].push(t);});}syncStatus('live','live sync');}catch(e){syncStatus('err','sync error');toast('Could not load tasks',3000);}}
async function saveTask(){const title=document.getElementById('i-title').value.trim();if(!title)return;const notes=document.getElementById('i-notes').value.trim();const priority=document.getElementById('i-pri').value;const due=document.getElementById('i-due').value;const nozzle=tab==='td'?document.getElementById('i-nozzle').value:'';syncStatus('busy','saving…');try{if(editId){const{error}=await sb.from('cc_tasks').update({title,notes,priority,due,nozzle}).eq('id',editId);if(error)throw error;const i=tasks[tab].findIndex(x=>x.id===editId);if(i>-1)tasks[tab][i]={...tasks[tab][i],title,notes,priority,due,nozzle};toast('Task updated');}else{const id=Date.now().toString(36)+Math.random().toString(36).slice(2);const task={id,pillar:tab,title,notes,priority,due,nozzle,done:false};const{error}=await sb.from('cc_tasks').insert(task);if(error)throw error;tasks[tab].push(task);toast('Task saved');}syncStatus('live','live sync');}catch(e){syncStatus('err','sync error');toast('Save failed',3000);}closeM();render();}
async function tog(id){const t=tasks[tab].find(x=>x.id===id);if(!t)return;const nd=!t.done;syncStatus('busy','saving…');try{const{error}=await sb.from('cc_tasks').update({done:nd}).eq('id',id);if(error)throw error;t.done=nd;syncStatus('live','live sync');}catch(e){syncStatus('err','sync error');}render();}
async function del(id){if(!confirm('Delete this task?'))return;syncStatus('busy','deleting…');try{const{error}=await sb.from('cc_tasks').delete().eq('id',id);if(error)throw error;tasks[tab]=tasks[tab].filter(x=>x.id!==id);syncStatus('live','live sync');toast('Deleted');}catch(e){syncStatus('err','sync error');toast('Delete failed',3000);}render();}
function stats(){let o=0,td=0,dn=0;const t=today();['per','az','qf','td','fam'].forEach(k=>tasks[k].forEach(x=>{if(x.done)dn++;else{o++;if(x.due===t)td++;}}));document.getElementById('s-open').textContent=o;document.getElementById('s-today').textContent=td;document.getElementById('s-done').textContent=dn;['per','az','qf','td','fam'].forEach(k=>document.getElementById('tc-'+k).textContent=tasks[k].filter(x=>!x.done).length);}
function go(t){tab=t;filter='all';['per','az','qf','td','fam'].forEach(k=>document.getElementById('tab-'+k).className='tab'+(k===t?' a-'+k:''));render();}
function setF(f){filter=f;render();}
function cardHTML(x,cls){const dl=x.due?fmtDate(x.due):'';const dc=x.due?dueCls(x.due):'';const ck=x.done?`chk ck-${cls}`:'chk';const noz=cls==='td'&&x.nozzle?`<span class="ntag">${x.nozzle}mm</span>`:'';const pb=`p${x.priority[0]}-b`;return`<div class="card bl-${cls}${x.done?' done':''}"><button class="${ck}" onclick="tog('${x.id}')">${x.done?'✓':''}</button><div class="tb"><div class="tt">${esc(x.title)}</div>${x.notes?`<div class="tn">${esc(x.notes)}</div>`:''}<div class="tm"><span class="pbadge ${pb}">${x.priority}</span>${noz}${dl?`<span class="due ${dc}">${dl}</span>`:''}</div></div><div class="ta"><button class="ib" onclick="openEdit('${x.id}')">✎</button><button class="ib" onclick="del('${x.id}')">✕</button></div></div>`;}
function render(){const cls=tab,list=tasks[tab]||[];const dn=list.filter(x=>x.done).length;const pct=list.length?Math.round(dn/list.length*100):0;const t=today();const srt=(a,b)=>{if(a.done!==b.done)return a.done?1:-1;const p={high:0,medium:1,low:2};if(p[a.priority]!==p[b.priority])return p[a.priority]-p[b.priority];if(a.due&&b.due)return a.due.localeCompare(b.due);if(a.due)return-1;if(b.due)return 1;return 0;};let fl=[...list];if(filter==='active')fl=fl.filter(x=>!x.done);else if(filter==='done')fl=fl.filter(x=>x.done);else if(filter==='high')fl=fl.filter(x=>!x.done&&x.priority==='high');fl.sort(srt);let cards='';if(tab==='td'){const f4=fl.filter(x=>!x.nozzle||x.nozzle==='0.4'),f2=fl.filter(x=>x.nozzle==='0.2');if(f4.length){cards+=`<div class="nozh">0.4 mm — standard nozzle</div>`;f4.forEach(x=>{cards+=cardHTML(x,cls);});}if(f2.length){cards+=`<div class="nozh">0.2 mm — fine detail nozzle</div>`;f2.forEach(x=>{cards+=cardHTML(x,cls);});}if(!f4.length&&!f2.length)cards=`<div class="empty"><div class="empty-i">◯</div><div class="empty-m">Nothing here right now</div></div>`;}else if(fl.length){fl.forEach(x=>{cards+=cardHTML(x,cls);});}else cards=`<div class="empty"><div class="empty-i">◯</div><div class="empty-m">${filter==='all'?'No tasks yet — hit Add Task':'Nothing here right now'}</div></div>`;document.getElementById('main').innerHTML=`<div class="ph"><div class="pt" style="color:var(--${cls})">${LABELS[tab]}<small>${list.length} task${list.length!==1?'s':''}</small></div><button class="add-btn ab-${cls}" onclick="openAdd()">+ Add Task</button></div><div class="sr"><span><strong>${list.filter(x=>!x.done).length}</strong> open</span><span><strong>${dn}</strong> done</span><span><strong>${list.filter(x=>!x.done&&x.due===t).length}</strong> due today</span></div><div class="pb-wrap"><div class="pb pb-${cls}" style="width:${pct}%"></div></div><div class="fb"><button class="fb-btn fb-${cls}${filter==='all'?' on':''}" onclick="setF('all')">All</button><button class="fb-btn fb-${cls}${filter==='active'?' on':''}" onclick="setF('active')">Open</button><button class="fb-btn fb-${cls}${filter==='high'?' on':''}" onclick="setF('high')">High Priority</button><button class="fb-btn fb-${cls}${filter==='done'?' on':''}" onclick="setF('done')">Done</button></div><div class="tg">${cards}</div>`;stats();}
function openAdd(){editId=null;document.getElementById('md-title').textContent='Add Task — '+LABELS[tab];['i-title','i-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('i-pri').value='medium';document.getElementById('i-due').value='';document.getElementById('nozzle-row').style.display=tab==='td'?'block':'none';document.getElementById('i-nozzle').value='0.4';document.getElementById('bs-main').className='bs bs-'+tab;document.getElementById('mo').classList.add('open');setTimeout(()=>document.getElementById('i-title').focus(),60);}
function openEdit(id){const x=tasks[tab].find(t=>t.id===id);if(!x)return;editId=id;document.getElementById('md-title').textContent='Edit Task';document.getElementById('i-title').value=x.title;document.getElementById('i-notes').value=x.notes||'';document.getElementById('i-pri').value=x.priority;document.getElementById('i-due').value=x.due||'';document.getElementById('nozzle-row').style.display=tab==='td'?'block':'none';document.getElementById('i-nozzle').value=x.nozzle||'0.4';document.getElementById('bs-main').className='bs bs-'+tab;document.getElementById('mo').classList.add('open');setTimeout(()=>document.getElementById('i-title').focus(),60);}
function closeM(){document.getElementById('mo').classList.remove('open');editId=null;}
function openSync(){document.getElementById('stab-exp').className='stab son';document.getElementById('stab-imp').className='stab';document.getElementById('sync-export').style.display='block';document.getElementById('sync-import').style.display='none';document.getElementById('export-code').textContent=JSON.stringify(tasks,null,2);document.getElementById('sync-mo').classList.add('open');}
function switchSync(mode){document.getElementById('stab-exp').className='stab'+(mode==='export'?' son':'');document.getElementById('stab-imp').className='stab'+(mode==='import'?' son':'');document.getElementById('sync-export').style.display=mode==='export'?'block':'none';document.getElementById('sync-import').style.display=mode==='import'?'block':'none';if(mode==='export')document.getElementById('export-code').textContent=JSON.stringify(tasks,null,2);else document.getElementById('import-ta').value='';}
function closeSyncM(){document.getElementById('sync-mo').classList.remove('open');}
function copyCode(){navigator.clipboard.writeText(document.getElementById('export-code').textContent).then(()=>toast('Backup copied to clipboard')).catch(()=>{});}
async function importCode(){const raw=document.getElementById('import-ta').value.trim();if(!raw){toast('Paste backup JSON first');return;}try{const parsed=JSON.parse(raw);if(!parsed.per&&!parsed.az&&!parsed.qf)throw new Error('Invalid');if(!confirm('This will replace all tasks in your database. Continue?'))return;syncStatus('busy','importing…');const allTasks=[];['per','az','qf','td','fam'].forEach(k=>{if(parsed[k])parsed[k].forEach(t=>allTasks.push({...t,pillar:k}));});await sb.from('cc_tasks').delete().neq('id','__never__');const{error}=await sb.from('cc_tasks').insert(allTasks);if(error)throw error;tasks=parsed;['per','az','qf','td','fam'].forEach(k=>{if(!tasks[k])tasks[k]=[];});syncStatus('live','live sync');closeSyncM();go(tab);toast('Tasks restored successfully');}catch(e){toast('Invalid backup — check you copied it fully');}}
