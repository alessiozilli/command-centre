<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devices — AZCK Command Centre</title>
  <link rel="stylesheet" href="cc-shell.css">
  <script defer src="auth.js"></script>
  <script>
    window.PAGE = { id: 'devices', title: 'Devices', group: 'REFERENCE' };
  </script>
  <script defer src="cc-shell.js"></script>
  <style>
    .devices-wrap { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .device-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .device-card h3 { margin: 0 0 0.75rem; color: #e6edf3; font-size: 1.1rem; }
    .device-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0.5rem 1rem;
      font-size: 0.92rem;
      color: #c9d1d9;
      padding: 0.35rem 0;
      border-bottom: 1px dashed #30363d;
    }
    .device-row:last-of-type { border-bottom: 0; }
    .device-row .lbl { color: #8b949e; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.78rem; }
    .device-row .val { font-family: ui-monospace, monospace; word-break: break-all; }
    .rename {
      display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center;
    }
    .rename input {
      flex: 1; background: #0d1117; color: #e6edf3;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 0.55rem 0.75rem; font-size: 0.95rem;
    }
    .rename button {
      background: #238636; color: #fff; border: 0; border-radius: 6px;
      padding: 0.6rem 1.1rem; cursor: pointer; font-weight: 600;
    }
    .rename button:hover { background: #2ea043; }
    .placeholder-card {
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      color: #8b949e;
    }
    .placeholder-card h3 { color: #c9d1d9; margin: 0 0 0.5rem; font-size: 1rem; }
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #238636; color: #fff; padding: 0.75rem 1.25rem;
      border-radius: 8px; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="devices-wrap">
    <h1 style="color:#e6edf3;margin-bottom:1.5rem;">Devices</h1>

    <div class="device-card" id="current-device">
      <h3>This device</h3>
      <div class="device-row"><span class="lbl">Label</span><span class="val" id="dv-label">—</span></div>
      <div class="device-row"><span class="lbl">Device ID</span><span class="val" id="dv-id">—</span></div>
      <div class="device-row"><span class="lbl">First seen</span><span class="val" id="dv-first">—</span></div>
      <div class="device-row"><span class="lbl">Last seen</span><span class="val" id="dv-last">—</span></div>
      <div class="device-row"><span class="lbl">Session kind</span><span class="val" id="dv-session">—</span></div>
      <div class="device-row"><span class="lbl">User agent</span><span class="val" id="dv-ua">—</span></div>

      <div class="rename">
        <input type="text" id="dv-rename" maxlength="40" placeholder="Rename this device (40 chars max)">
        <button id="dv-save">Save</button>
      </div>
    </div>

    <div class="placeholder-card">
      <h3>Cross-device registry</h3>
      <p style="margin:0;line-height:1.5;">Coming in Pass 5 with Supabase Auth. You'll see every device signed into this account here, not just the one you're on — with one-click remote logout for any of them.</p>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script>
    function fmt(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }
    function paint() {
      const i = window.ccGetDeviceInfo();
      document.getElementById('dv-label').textContent = i.label || '—';
      document.getElementById('dv-id').textContent = i.id || '—';
      document.getElementById('dv-first').textContent = fmt(i.firstSeen);
      document.getElementById('dv-last').textContent = fmt(i.lastSeen);
      document.getElementById('dv-session').textContent = i.sessionKind;
      document.getElementById('dv-ua').textContent = i.userAgent;
      document.getElementById('dv-rename').value = i.label || '';
    }
    document.addEventListener('DOMContentLoaded', () => {
      // Wait for auth.js guard + ccTouchDevice to settle
      setTimeout(paint, 50);
      document.getElementById('dv-save').addEventListener('click', () => {
        const v = document.getElementById('dv-rename').value.trim();
        if (!v) return;
        try { window.ccSetDeviceLabel(v); paint(); toast('Renamed'); }
        catch (e) { toast(e.message || 'Error'); }
      });
    });
  </script>
</body>
</html>
