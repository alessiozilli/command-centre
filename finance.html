  function curvePoints(row){
    const c = row && row.curve_json;

    return c.points;
  }
  function sumCurve(row){
    return curvePoints(row).reduce((s,p)=>s+Number(p.v||0),0);
  }
  function monthlyTotals(rows, type){
    // returns { labels:[...], totals:[...] } summed across active rows of given type
    const filtered = rows.filter(r => r.stream_type===type && r.active);
    const bucket = {};
    let labels = [];
    filtered.forEach(r => {
      curvePoints(r).forEach(p => {
        if (bucket[p.m] == null) { bucket[p.m] = 0; labels.push(p.m); }
        bucket[p.m] += Number(p.v||0);
      });
    });
    labels = Array.from(new Set(labels)).sort();
    return { labels, totals: labels.map(l => bucket[l] || 0) };
  }

  function wireInsuranceForm(uid, allPolicies){
    const form      = document.getElementById('ins-form');
    const addBtn    = document.getElementById('ins-add-btn');
    const cancelBtn = document.getElementById('ins-cancel');
    const saveBtn   = document.getElementById('ins-save');
    const dropZone  = document.getElementById('ins-drop');
    const fileInput = document.getElementById('ins-file');
    const dropLabel = document.getElementById('ins-drop-label');
    const msg       = document.getElementById('ins-msg');
    const list      = document.getElementById('ins-list');

    addBtn.addEventListener('click', function(){ form.classList.add('open'); addBtn.disabled=true; });
    cancelBtn.addEventListener('click', function(){ form.classList.remove('open'); addBtn.disabled=false; msg.textContent=''; fileInput.value=''; dropZone.className='ins-drop-zone'; dropLabel.textContent='Drop PDF here or click to browse (max 10 MB)'; });
    dropZone.addEventListener('click', function(){ fileInput.click(); });
    dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function(e){ e.preventDefault(); dropZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', function(){ handleFile(fileInput.files[0]); });

    function handleFile(f){
      if(!f) return;
      if(f.type!=='application/pdf'){ msg.textContent='PDF files only.'; return; }
      if(f.size>10*1024*1024){ msg.textContent='Max file size is 10 MB.'; return; }
      dropZone.className='ins-drop-zone has-file';
      dropLabel.textContent=f.name;
      fileInput._file=f;
      msg.textContent='';
    }

    saveBtn.addEventListener('click', async function(){
      const label = document.getElementById('ins-label').value.trim();
      if(!label){ msg.textContent='Policy label is required.'; return; }
      const insurer  = document.getElementById('ins-insurer').value.trim();
      const covType  = document.getElementById('ins-cov-type').value;
      const renewal  = document.getElementById('ins-renewal').value||null;
      const premium  = parseFloat(document.getElementById('ins-premium').value)||null;
      const limit    = parseFloat(document.getElementById('ins-limit').value)||null;
      const file     = fileInput._file||null;

      saveBtn.disabled=true; msg.style.color='#f85149'; msg.textContent='Saving├бРѓг┬д';

      const { data:row, error:insErr } = await supa.from('insurance_policies').insert({
        user_id:uid, policy_label:label, insurer, coverage_type:covType,
        renewal_date:renewal, annual_premium:premium, coverage_limit:limit, active:true
      }).select().single();
      if(insErr){ msg.textContent='Error: '+insErr.message; saveBtn.disabled=false; return; }

      if(file){
        msg.textContent='Uploading PDF├бРѓг┬д';
        const storagePath = uid+'/'+row.id+'.pdf';
        const { error:upErr } = await supa.storage.from('insurance-policies').upload(storagePath, file, { contentType:'application/pdf', upsert:false });
        if(upErr){ msg.textContent='PDF upload failed: '+upErr.message+' (policy saved without PDF)'; saveBtn.disabled=false; return; }
        const { error:updErr } = await supa.from('insurance_policies').update({ storage_path:storagePath, storage_bytes:file.size }).eq('id', row.id);
        if(updErr){ msg.textContent='Policy saved; PDF stored but path not linked: '+updErr.message; saveBtn.disabled=false; return; }
      }

      msg.style.color='#3fb950'; msg.textContent='Policy saved.';
      setTimeout(function(){ renderInsurance(); }, 1200);
    });

    list.addEventListener('click', async function(e){
      const btn = e.target.closest('[data-action]');
      if(btn){
        const action = btn.dataset.action;
        if(action==='open'){
          const { data, error } = await supa.storage.from('insurance-policies').createSignedUrl(btn.dataset.path, 60);
          if(error){ alert('Could not open PDF: '+error.message); return; }
          window.open(data.signedUrl, '_blank');
        }
        if(action==='archive'){
          await supa.from('insurance_policies').update({ active: btn.dataset.active==='false' }).eq('id', btn.dataset.id);
          renderInsurance();
        }
        if(action==='delete'){ showDeleteModal(btn.dataset.id, btn.dataset.label); }
      }
      if(e.target.id==='ins-show-archived'){
        const arc = document.getElementById('ins-archived-list');
        if(arc){
          const showing = arc.style.display!=='none';
          arc.style.display = showing ? 'none' : 'block';
          e.target.textContent = showing ? e.target.textContent.replace('Hide','Show') : e.target.textContent.replace('Show','Hide');
        }
      }
    });
  }

  function showDeleteModal(policyId, label){
    const overlay = document.createElement('div');
    overlay.className='ins-modal-overlay';
    overlay.innerHTML='<div class="ins-modal">'
      +'<h3>Delete Policy</h3>'
      +'<p>Permanently delete <strong>'+esc(label)+'</strong>? This also removes the uploaded PDF. This cannot be undone.</p>'
      +'<label><input type="checkbox" id="ins-del-chk"> I understand this is permanent</label>'
      +'<div class="ins-modal-btns">'
      +'<button class="ins-cancel-btn" id="ins-del-cancel">Cancel</button>'
      +'<button class="ins-save-btn" id="ins-del-confirm" style="background:#b62324;" disabled>Delete</button>'
      +'</div>'
      +'</div>';
    document.body.appendChild(overlay);
    overlay.querySelector('#ins-del-chk').addEventListener('change', function(){ overlay.querySelector('#ins-del-confirm').disabled=!this.checked; });
    overlay.querySelector('#ins-del-cancel').addEventListener('click', function(){ overlay.remove(); });
    overlay.querySelector('#ins-del-confirm').addEventListener('click', async function(){
      this.disabled=true; this.textContent='Deleting├бРѓг┬д';
      const { data:pol } = await supa.from('insurance_policies').select('storage_path').eq('id',policyId).single();
      const { error:delErr } = await supa.from('insurance_policies').delete().eq('id',policyId);
      if(delErr){ alert('Delete failed: '+delErr.message); overlay.remove(); return; }
      if(pol&&pol.storage_path){ await supa.storage.from('insurance-policies').remove([pol.storage_path]); }
      overlay.remove();
      renderInsurance();
    });
  }

  function renderLogin(){
    app.innerHTML = `
      <div class="login-shell">
        <h2>Sign in to Command Centre</h2>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" autocomplete="username" required>
          <input type="password" id="pw" placeholder="Password" autocomplete="current-password" required>
          <button type="submit">Sign in</button>
          <div class="login-msg" id="login-msg"></div>
        </form>
      </div>`;
    document.getElementById('login-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pw').value;
      const msg = document.getElementById('login-msg');
      msg.textContent = 'Signing in├бРѓг┬д';
      const { error } = await supa.auth.signInWithPassword({ email, password });
      if (error) { msg.textContent = error.message; return; }
      location.reload();
    });
  }

  boot();
})();
