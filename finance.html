<script>
(function(){
  'use strict';

  const SUPABASE_URL = 'https://twrlvnfszohyrmivdhre.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmx2bmZzem9oeXJtaXZkaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjkxMTMsImV4cCI6MjA5MDE0NTExM30.o96DFNbBObst0EAmX51rnRFXzu8oTN1o-HNAxN7MY8A';

  const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      storageKey: 'sb-twrlvnfszohyrmivdhre-auth-token',
      persistSession: true,
      autoRefreshToken: true
    }
  });
  window.supa = supa;

  const D = window.FINANCE_DATA;
  const app = document.getElementById('app');
  let projections = null;     // cached rows from supabase.projections
  let chartInstance = null;

  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  const fail = (msg) => `<div class="error">${esc(msg)}</div>`;
  const fmt$ = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n)).toLocaleString();
  const fmtPct = n => Math.round(n*100)+'%';

  const banner = `
    <div class="privacy-banner">
      <span class="dot"></span>
      <div><strong>Private Net mode</strong> â€” projections only. No dollar actuals are stored in Supabase.
        <span style="color:#8b949e;"> Ratios to cloud, dollars local. Updated ${esc(D.updated)}.</span>
      </div>
    </div>`;

  // â”€â”€â”€ BOOT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  async function boot(){
    const { data:{ session } } = await supa.auth.getSession();
    if (!session) return renderLogin();

    if (window.CC && window.CC.onSubtabChange) {
      wireSubtabs();
    } else {
      document.addEventListener('cc-shell-ready', wireSubtabs, { once:true });
    }
  }

  function wireSubtabs(){
    window.CC.onSubtabChange(id => renderSubtab(id));
    renderSubtab(window.CC.getSubtab() || 'net');
  }

  async function ensureProjections(){
    if (projections) return projections;
    const { data, error } = await supa.from('projections')
      .select('stream_id, stream_type, category, curve_json, confidence, active, notes_ratio')
      .order('stream_type', { ascending:true })
      .order('category', { ascending:true })
      .order('stream_id', { ascending:true });
    if (error) throw error;
    projections = data || [];
    return projections;
  }

  // â”€â”€â”€ helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function curvePoints(row){
    const c = row && row.curve_json;
    if (!c || !Array.isArray(c.points)) return [];
    return c.points;
  }
  function sumCurve(row){
    return curvePoints(row).reduce((s,p)=>s+Number(p.v||0),0);
  }
  function monthlyTotals(rows, type){
    // returns { labels:[...], totals:[...] } summed across active rows of given type
    const filtered = rows.filter(r => r.stream_type===type && r.active);
    const bucket = {};
    let labels = [];
    filtered.forEach(r => {
      curvePoints(r).forEach(p => {
        if (bucket[p.m] == null) { bucket[p.m] = 0; labels.push(p.m); }
        bucket[p.m] += Number(p.v||0);
      });
    });
    labels = Array.from(new Set(labels)).sort();
    return { labels, totals: labels.map(l => bucket[l] || 0) };
  }

  function renderSubtab(id){
    if (id==='net')       return renderNet();
    if (id==='revenue')   return renderStreams('revenue');
    if (id==='expenses')  return renderStreams('expense');
    if (id==='insurance') return renderInsurance();
    app.innerHTML = fail('Unknown subtab: '+id);
  }

  // â”€â”€â”€ NET TAB â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  async function renderNet(){
    app.innerHTML = banner + '<div class="loading">Loading projectionsâ€¦</div>';
    let rows;
    try { rows = await ensureProjections(); }
    catch(e){ return app.innerHTML = banner + fail(e.message); }

    const rev = monthlyTotals(rows, 'revenue');
    const exp = monthlyTotals(rows, 'expense');
    const labels = Array.from(new Set([...rev.labels, ...exp.labels])).sort();
    const revMap = Object.fromEntries(rev.labels.map((l,i)=>[l, rev.totals[i]]));
    const expMap = Object.fromEntries(exp.labels.map((l,i)=>[l, exp.totals[i]]));
    const revSeries = labels.map(l => revMap[l] || 0);
    const expSeries = labels.map(l => expMap[l] || 0);
    const netSeries = labels.map((l,i) => revSeries[i] - expSeries[i]);

    const totalRev = revSeries.reduce((a,b)=>a+b,0);
    const totalExp = expSeries.reduce((a,b)=>a+b,0);
    const totalNet = totalRev - totalExp;
    const activeCount = rows.filter(r => r.active).length;

    app.innerHTML = banner + `
      <div class="hero-row">
        <div class="hero-card">
          <div class="lbl">12-mo Projected Revenue</div>
          <div class="val pos">${fmt$(totalRev)}</div>
          <div class="sub">active streams only</div>
        </div>
        <div class="hero-card">
          <div class="lbl">12-mo Projected Expenses</div>
          <div class="val neg">${fmt$(totalExp)}</div>
          <div class="sub">active streams only</div>
        </div>
        <div class="hero-card">
          <div class="lbl">12-mo Projected Net</div>
          <div class="val ${totalNet>=0?'pos':'neg'}">${fmt$(totalNet)}</div>
          <div class="sub">${labels[0]||'â€”'} â†’ ${labels[labels.length-1]||'â€”'}</div>
        </div>
        <div class="hero-card">
          <div class="lbl">Active Streams</div>
          <div class="val">${activeCount}<span style="color:#8b949e;font-size:1rem;font-weight:400;"> / ${rows.length}</span></div>
          <div class="sub">dormant streams excluded from totals</div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <h2>Monthly Cashflow â€” Projected</h2>
          <span class="meta">Revenue (green) Â· Expenses (red) Â· Net (blue line)</span>
        </div>
        <div class="chart-wrap"><canvas id="net-chart"></canvas></div>
      </div>

      <div class="todo">
        TODO (future session): confirmation workflow Â· drill-down modal per stream Â· ratio-mode toggle Â· quarterly breakdown table.
        See <code>AI/Business/Projects/Command-Centre/Financial_Projections_Spec_v1_2026-04-18.md</code>.
      </div>`;

    // Chart render
    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('net-chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { type:'bar', label:'Revenue', data: revSeries, backgroundColor:'rgba(63,185,80,0.55)', borderColor:'#3fb950', borderWidth:1, order:2 },
          { type:'bar', label:'Expenses', data: expSeries.map(v=>-v), backgroundColor:'rgba(248,81,73,0.55)', borderColor:'#f85149', borderWidth:1, order:2 },
          { type:'line', label:'Net', data: netSeries, borderColor:'#58a6ff', backgroundColor:'rgba(88,166,255,0.1)', borderWidth:2, tension:.25, pointRadius:3, order:1 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ labels:{ color:'#adbac7' } },
          tooltip:{ callbacks:{ label: ctx => ctx.dataset.label+': '+fmt$(Math.abs(ctx.parsed.y)) } }
        },
        scales:{
          x:{ stacked:true, ticks:{ color:'#8b949e' }, grid:{ color:'#21262d' } },
          y:{ stacked:true, ticks:{ color:'#8b949e', callback:v=>fmt$(v) }, grid:{ color:'#21262d' } }
        }
      }
    });
  }

  // â”€â”€â”€ REVENUE / EXPENSES TAB â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  async function renderStreams(type){
    app.innerHTML = banner + '<div class="loading">Loadingâ€¦</div>';
    let rows;
    try { rows = await ensureProjections(); }
    catch(e){ return app.innerHTML = banner + fail(e.message); }

    const typeRows = rows.filter(r => r.stream_type===type);
    const order = D.categoryOrder[type] || [];
    const grouped = {};
    typeRows.forEach(r => {
      const k = r.category || 'uncategorized';
      (grouped[k] = grouped[k] || []).push(r);
    });

    // Categories in defined order, then any stragglers alphabetically
    const allCats = Array.from(new Set([...order, ...Object.keys(grouped).sort()]));

    const totalActive = typeRows.filter(r=>r.active).reduce((s,r)=>s+sumCurve(r),0);
    const totalAll    = typeRows.reduce((s,r)=>s+sumCurve(r),0);
    const typeLabel = type==='revenue' ? 'Revenue' : 'Expenses';
    const heroClass = type==='revenue' ? 'pos' : 'neg';

    let html = banner + `
      <div class="hero-row">
        <div class="hero-card">
          <div class="lbl">12-mo Active ${esc(typeLabel)}</div>
          <div class="val ${heroClass}">${fmt$(totalActive)}</div>
          <div class="sub">${typeRows.filter(r=>r.active).length} active streams</div>
        </div>
        <div class="hero-card">
          <div class="lbl">Including Dormant</div>
          <div class="val">${fmt$(totalAll)}</div>
          <div class="sub">${typeRows.length} total streams (if all fired)</div>
        </div>
      </div>`;

    allCats.forEach(cat => {
      const list = grouped[cat]; if (!list || !list.length) return;
      const label = D.categoryLabels[cat] || cat;
      const catActive = list.filter(r=>r.active).reduce((s,r)=>s+sumCurve(r),0);
      html += `
        <div class="section">
          <div class="section-header">
            <h2>${esc(label)} <span class="badge" style="background:#21262d;color:#8b949e;font-size:0.7rem;padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:500;">${list.length}</span></h2>
            <span class="meta">12-mo active: ${fmt$(catActive)}</span>
          </div>
          ${list.map(rowStream).join('')}
        </div>`;
    });

    app.innerHTML = html + `
      <div class="todo">
        TODO: click a row to drill into its 12-point curve, confidence rationale, and last-confirmed date.
      </div>`;
  }

  function rowStream(r){
    const total = sumCurve(r);
    const numClass = r.stream_type==='revenue' ? 'pos' : 'neg';
    const note = r.notes_ratio ? `<span class="note">${esc(r.notes_ratio)}</span>` : '';
    return `
      <div class="stream-row ${r.active?'':'inactive'}">
        <div class="name">${esc(r.stream_id)}${note}</div>
        <div class="num ${numClass}">${fmt$(r.stream_type==='expense'?-total:total)}</div>
        <div class="conf">${fmtPct(Number(r.confidence||0))}</div>
        <div class="status ${r.active?'on':'off'}">${r.active?'ACTIVE':'DORMANT'}</div>
      </div>`;
  }

  // â”€â”€â”€ COMBINED INSURANCE TAB â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    const B = D.insurance2025;

    app.innerHTML = banner + `

          <div class="hero-card"><div class="lbl">Premium / Year</div><div class="val neg">${fmt$(B.premiumAnnual)}</div><div class="sub">2025 outflow</div></div>
          <div class="hero-card"><div class="lbl">2025 Payouts Received</div><div class="val pos">${fmt$(B.payoutsReceived)}+</div><div class="sub">${B.surgeries} minor surgeries</div></div>
          <div class="hero-card"><div class="lbl">Net 2025 Position</div><div class="val pos">+${fmt$(B.netPosition)}</div><div class="sub">payouts âˆ’ premiums</div></div>
        </div>
        <div class="ins-note">
          Payout schedule per cut: <strong>${fmt$(B.payoutPerCut.suture)}</strong> (modern suture) / <strong>${fmt$(B.payoutPerCut.stitches)}</strong> (actual stitches).
          Alessio frames insurance as an <strong>EV-positive investment category</strong>, not a cost category â€”
          premiums paired with expected-payout curves, not sunk.
        </div>
        <div class="ins-note" style="font-style:italic;color:#8b949e;">&ldquo;${esc(B.quote)}&rdquo;</div>
