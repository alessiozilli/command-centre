<script>
(function(){
  'use strict';

  const SUPABASE_URL = 'https://twrlvnfszohyrmivdhre.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmx2bmZzem9oeXJtaXZkaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjkxMTMsImV4cCI6MjA5MDE0NTExM30.o96DFNbBObst0EAmX51rnRFXzu8oTN1o-HNAxN7MY8A';

  const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      storageKey: 'sb-twrlvnfszohyrmivdhre-auth-token',
      persistSession: true,
      autoRefreshToken: true
    }
  });
  window.supa = supa;

  const D = window.FINANCE_DATA;
  const app = document.getElementById('app');
  let projections = null;     // cached rows from supabase.projections
  let chartInstance = null;
  let _drillRows  = null;     // most recent rows available for click delegation
  let _ratioMode  = false;    // Net tab: toggle ratio view

  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  const fail = (msg) => `<div class="error">${esc(msg)}</div>`;
  const fmt$ = n => (n<0?'-':'') + '$' + Math.abs(Math.round(n)).toLocaleString();
  const fmtPct = n => Math.round(n*100)+'%';

  const banner = `
    <div class="privacy-banner">
      <span class="dot"></span>
      <div><strong>Private Net mode</strong> — projections only. No dollar actuals are stored in Supabase.
        <span style="color:#8b949e;"> Ratios to cloud, dollars local. Updated ${esc(D.updated)}.</span>
      </div>
    </div>`;

  // ─── BOOT ───────────────────────────────────────────────────────────────
  async function boot(){
    const { data:{ session } } = await supa.auth.getSession();
    if (!session) return renderLogin();

    if (window.CC && window.CC.onSubtabChange) {
      wireSubtabs();
    } else {
      document.addEventListener('cc-shell-ready', wireSubtabs, { once:true });
    }
  }

  function wireSubtabs(){
    window.CC.onSubtabChange(id => renderSubtab(id));
    renderSubtab(window.CC.getSubtab() || 'net');
    // Global drill-down delegation — persists across subtab renders since #app element stays
    app.addEventListener('click', e => {
      const row = e.target.closest('[data-stream-id]');
      if (!row || !_drillRows) return;
      const sr = _drillRows.find(r => r.stream_id === row.dataset.streamId);
      if (sr) openDrillModal(sr);
    });
  }

  async function ensureProjections(){
    if (projections) return projections;
    const { data, error } = await supa.from('projections')
      .select('stream_id, stream_type, category, curve_json, confidence, active, notes_ratio')
      .order('stream_type', { ascending:true })
      .order('category', { ascending:true })
      .order('stream_id', { ascending:true });
    if (error) throw error;
    projections = data || [];
    return projections;
  }

  // ─── helpers ────────────────────────────────────────────────────────────
  function curvePoints(row){
    const c = row && row.curve_json;
    if (!c || !Array.isArray(c.points)) return [];
    return c.points;
  }
  function sumCurve(row){
    return curvePoints(row).reduce((s,p)=>s+Number(p.v||0),0);
  }
  function monthlyTotals(rows, type){
    // returns { labels:[...], totals:[...] } summed across active rows of given type
    const filtered = rows.filter(r => r.stream_type===type && r.active);
    const bucket = {};
    let labels = [];
    filtered.forEach(r => {
      curvePoints(r).forEach(p => {
        if (bucket[p.m] == null) { bucket[p.m] = 0; labels.push(p.m); }
        bucket[p.m] += Number(p.v||0);
      });
    });
    labels = Array.from(new Set(labels)).sort();
    return { labels, totals: labels.map(l => bucket[l] || 0) };
  }

  function renderSubtab(id){
    if (id==='net')       return renderNet();
    if (id==='revenue')   return renderStreams('revenue');
    if (id==='expenses')  return renderStreams('expense');
    if (id==='insurance') return renderInsurance();
    app.innerHTML = fail('Unknown subtab: '+id);
  }

  // ─── NET TAB ────────────────────────────────────────────────────────────
  async function renderNet(){
    app.innerHTML = banner + '<div class="loading">Loading projections…</div>';
    let rows;
    try { rows = await ensureProjections(); }
    catch(e){ return app.innerHTML = banner + fail(e.message); }

    _drillRows = rows;
    const rev = monthlyTotals(rows, 'revenue');
    const exp = monthlyTotals(rows, 'expense');
    const labels = Array.from(new Set([...rev.labels, ...exp.labels])).sort();
    const revMap = Object.fromEntries(rev.labels.map((l,i)=>[l, rev.totals[i]]));
    const expMap = Object.fromEntries(exp.labels.map((l,i)=>[l, exp.totals[i]]));
    const revSeries = labels.map(l => revMap[l] || 0);
    const expSeries = labels.map(l => expMap[l] || 0);
    const netSeries = labels.map((l,i) => revSeries[i] - expSeries[i]);

    const totalRev = revSeries.reduce((a,b)=>a+b,0);
    const totalExp = expSeries.reduce((a,b)=>a+b,0);
    const totalNet = totalRev - totalExp;
    const activeCount = rows.filter(r => r.active).length;

    app.innerHTML = banner + `
      <div class="hero-row">
        <div class="hero-card">
          <div class="lbl">12-mo Projected Revenue</div>
          <div class="val pos">${fmt$(totalRev)}</div>
          <div class="sub">active streams only</div>
        </div>
        <div class="hero-card">
          <div class="lbl">12-mo Projected Expenses</div>
          <div class="val neg">${fmt$(totalExp)}</div>
          <div class="sub">active streams only</div>
        </div>
        <div class="hero-card">
          <div class="lbl">12-mo Projected Net</div>
          <div class="val ${totalNet>=0?'pos':'neg'}">${fmt$(totalNet)}</div>
          <div class="sub">${labels[0]||'—'} → ${labels[labels.length-1]||'—'}</div>
        </div>
        <div class="hero-card">
          <div class="lbl">Active Streams</div>
          <div class="val">${activeCount}<span style="color:#8b949e;font-size:1rem;font-weight:400;"> / ${rows.length}</span></div>
          <div class="sub">dormant streams excluded from totals</div>
        </div>
      </div>

      <div class="ratio-toggle-bar">
        <button class="ratio-btn${_ratioMode?'':' active'}" id="btn-dollar-mode">Dollar view</button>
        <button class="ratio-btn${_ratioMode?' active':''}" id="btn-ratio-mode">Ratio mode</button>
      </div>

      <div id="net-ratio-section"></div>

      <div class="section" id="net-chart-section" style="${_ratioMode?'display:none':''}">
        <div class="section-header">
          <h2>Monthly Cashflow — Projected</h2>
          <span class="meta">Revenue (green) · Expenses (red) · Net (blue line)</span>
        </div>
        <div class="chart-wrap"><canvas id="net-chart"></canvas></div>
      </div>`;

    // Toggle buttons
    document.getElementById('btn-dollar-mode').addEventListener('click', () => {
      _ratioMode = false; renderNet();
    });
    document.getElementById('btn-ratio-mode').addEventListener('click', () => {
      _ratioMode = true; renderNet();
    });

    // Ratio section
    if (_ratioMode) {
      renderRatioSection(rows);
    }

    // Chart render (hidden in ratio mode — canvas won't exist if section hidden)

  async function renderStreams(type){

      (grouped[k] = grouped[k] || []).push(r);

  // ─── RATIO SECTION (Net tab) ───────────────────────────────────────────────
  async function renderRatioSection(rows){
    const el = document.getElementById('net-ratio-section');
    if (!el) return;
    el.innerHTML = '<div class="loading">Loading confirmation ratios…</div>';

    // Find most-recently confirmed quarter
    const { data: latest } = await supa.from('confirmations')
      .select('quarter')
      .order('quarter', { ascending: false })
      .limit(1);
    if (!latest || !latest.length){
      el.innerHTML = `<div class="section" style="color:#8b949e;font-size:0.88rem;padding:16px">
        No quarterly confirmations yet — ratio comparison will appear after the first confirmation cycle.
      </div>`;
      return;
    }
    const qtr = latest[0].quarter;

    const { data: confs } = await supa.from('confirmations')
      .select('stream_id, ratio_vs_projection, direction')
      .eq('quarter', qtr);
    if (!confs || !confs.length){
      el.innerHTML = `<div class="section" style="color:#8b949e;font-size:0.88rem;padding:16px">No data for ${esc(qtr)}.</div>`;
      return;
    }

    // Average ratio by stream_type
    const avg = (type) => {
      const ids = rows.filter(r=>r.stream_type===type && r.active).map(r=>r.stream_id);
      const hits = confs.filter(c => ids.includes(c.stream_id));
      if (!hits.length) return null;
      return hits.reduce((s,c)=>s+Number(c.ratio_vs_projection||1),0) / hits.length;
    };
    const revRatio = avg('revenue');
    const expRatio = avg('expense');
    const netRatio = (revRatio != null && expRatio != null) ? ((revRatio + (2 - expRatio)) / 2) : null;

    const fmt_ratio = r => {
      if (r == null) return { str:'—', cls:'neutral' };
      const pct = Math.round((r - 1) * 100);
      return { str: (pct>=0?'+':'')+pct+'%', cls: pct>0?'up':pct<0?'down':'neutral' };
    };
    const rr = fmt_ratio(revRatio);
    const er = fmt_ratio(expRatio ? (2 - expRatio) : null); // invert: under-spend = good
    const nr = fmt_ratio(netRatio);

    el.innerHTML = `
      <div class="section">
        <div class="section-header">
          <h2>Ratio Mode — ${esc(qtr)} vs projection</h2>
          <span class="meta">avg confirmed / projected across active streams</span>
        </div>
        <div class="ratio-section">
          <div class="ratio-row"><span class="ratio-lbl">Revenue pace</span><span class="ratio-val ${rr.cls}">${rr.str}</span></div>
          <div class="ratio-row"><span class="ratio-lbl">Expense pace (under = good)</span><span class="ratio-val ${er.cls}">${er.str}</span></div>
          <div class="ratio-row"><span class="ratio-lbl">Net trend</span><span class="ratio-val ${nr.cls}">${nr.str}</span></div>
          <div class="ratio-row"><span class="ratio-lbl">Streams confirmed</span><span class="ratio-val neutral">${confs.length} / ${rows.filter(r=>r.active).length} active</span></div>
        </div>
        <div style="color:#6e7681;font-size:0.8rem;margin-top:4px">Ratios from ${esc(qtr)} confirmations · Switch to Dollar view for full cashflow chart</div>
      </div>`;
  }

  function insDaysUntil(dateStr){
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.ceil((new Date(dateStr + 'T12:00:00') - today) / 86400000);
  }

  function insRenewalBadge(dateStr){
    const d = insDaysUntil(dateStr);
    if (d === null || d > 60) return '';
    return `<span class="ins-badge ${d <= 30 ? 'red' : 'amber'}">Renews in ${d}d</span>`;
  }

  function insFmt$k(n){
    if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
    if (n >= 1000)    return '$' + Math.round(n/1000) + 'K';
    return fmt$(n);
  }

    if (!d) return '—';

      if (!formMsg) return;
      formMsg.textContent = msg;
      formMsg.className = 'ins-form-msg' + (isErr ? ' err' : msg ? ' ok' : '');
    }

    function setFile(f){
      if (f.type !== 'application/pdf'){ showMsg('PDF files only.', true); return; }

      if (cancelBtn) cancelBtn.style.display = 'none';

    function getFormValues(){
      return {
        policy_label:       (document.getElementById('ins-label')?.value || '').trim(),
        carrier:            (document.getElementById('ins-carrier')?.value || '').trim() || null,
        policy_number:      (document.getElementById('ins-policy-num')?.value || '').trim() || null,
        coverage_type:      document.getElementById('ins-coverage')?.value || null,
        effective_date:     document.getElementById('ins-effective')?.value || null,
        renewal_date:       document.getElementById('ins-renewal')?.value || null,
        premium_annual_cad: parseFloat(document.getElementById('ins-premium')?.value) || null,
        deductible_cad:     parseFloat(document.getElementById('ins-deductible')?.value) || null,
        coverage_limit_cad: parseFloat(document.getElementById('ins-limit')?.value) || null,
        notes:              (document.getElementById('ins-notes')?.value || '').trim() || null,
      };
    }

    // Drop zone wiring
    if (dropZone && fileInput) {
      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f) setFile(f);
      });
      fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) setFile(fileInput.files[0]);
      });
    }

    // Save / Update
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      const vals = getFormValues();
      if (!vals.policy_label){ showMsg('Label is required.', true); return; }

      const editId = document.getElementById('ins-edit-id')?.value || '';
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';
      showMsg('');

      try {
        if (editId) {
          // Update existing row
          const patch = { ...vals, updated_at: new Date().toISOString() };
          if (selectedFile) {
            const { data: { user } } = await supa.auth.getUser();
            const path = `${user.id}/${editId}.pdf`;
            const { error: upErr } = await supa.storage
              .from('insurance-policies').upload(path, selectedFile, { upsert: true });
            if (upErr) throw upErr;
            patch.storage_path  = path;
            patch.storage_bytes = selectedFile.size;
          }
          const { error } = await supa.from('insurance_policies')
            .update(patch).eq('id', editId);
          if (error) throw error;

        } else {
          // 3-step honest write: INSERT (path=null) → upload → UPDATE path
          const { data: row, error: insErr } = await supa.from('insurance_policies')
            .insert({ ...vals }).select('id, user_id').single();
          if (insErr) throw insErr;

          if (selectedFile) {
            const path = `${row.user_id}/${row.id}.pdf`;
            const { error: upErr } = await supa.storage
              .from('insurance-policies').upload(path, selectedFile);
            if (upErr) {
              showMsg('Saved — PDF upload failed. Edit the policy to re-upload.', true);
              saveBtn.disabled = false; saveBtn.textContent = 'Save →';
              return;
            }
            await supa.from('insurance_policies')
              .update({ storage_path: path, storage_bytes: selectedFile.size,
                        updated_at: new Date().toISOString() })
              .eq('id', row.id);
          }
        }

        showMsg(editId ? 'Updated.' : 'Saved.');
        clearForm();
        await renderInsurance();
      } catch(e) {
        showMsg(e.message || 'Error saving policy.', true);
        saveBtn.disabled = false;
        saveBtn.textContent = editId ? 'Update →' : 'Save →';
      }
    });

    // Cancel edit
    if (cancelBtn) cancelBtn.addEventListener('click', clearForm);

    // Archived toggle
    if (toggleBtn) toggleBtn.addEventListener('click', () => {
      showArchived = !showArchived;
      toggleBtn.textContent = showArchived
        ? `Hide archived`
        : `Show archived (${archived.length})`;
      if (!policyList) return;
      const display = showArchived
        ? allPolicies.filter(p => p.active).concat(archived)
        : allPolicies.filter(p => p.active);
      policyList.innerHTML = insPoliciesListHTML(display);
    });

    // Policy card actions (event delegation)
    if (policyList) policyList.addEventListener('click', async e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const id     = btn.dataset.id;

      if (action === 'open-pdf') {
        const { data, error } = await supa.storage
          .from('insurance-policies').createSignedUrl(btn.dataset.path, 300);
        if (error){ alert('Could not get PDF link: ' + error.message); return; }
        window.open(data.signedUrl, '_blank');
      }

      if (action === 'edit') {
        const p = allPolicies.find(x => x.id === id);
        if (!p) return;
        const editIdEl = document.getElementById('ins-edit-id');
        if (editIdEl) editIdEl.value = p.id;
        const title = document.getElementById('ins-form-title');
        if (title) title.textContent = 'Edit Policy';
        if (saveBtn){ saveBtn.textContent = 'Update →'; saveBtn.disabled = false; }
        if (cancelBtn) cancelBtn.style.display = 'inline-block';

        const fields = {
          'ins-label': p.policy_label,       'ins-carrier': p.carrier || '',
          'ins-policy-num': p.policy_number || '', 'ins-effective': p.effective_date || '',
          'ins-renewal': p.renewal_date || '', 'ins-premium': p.premium_annual_cad || '',
          'ins-deductible': p.deductible_cad || '', 'ins-limit': p.coverage_limit_cad || '',
          'ins-notes': p.notes || ''
        };
        Object.entries(fields).forEach(([fid, val]) => {
          const el = document.getElementById(fid);
          if (el) el.value = val;
        });
        const cov = document.getElementById('ins-coverage');
        if (cov) cov.value = p.coverage_type || '';

        const formEl = document.getElementById('ins-upload-form');
        if (formEl) formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        showMsg('Editing — update fields then click Update.', false);
      }

      if (action === 'archive') {
        btn.disabled = true; btn.textContent = '…';
        const { error } = await supa.from('insurance_policies')
          .update({ active: false, updated_at: new Date().toISOString() }).eq('id', id);
        if (error){ alert('Archive failed: ' + error.message); btn.disabled=false; btn.textContent='Archive'; return; }
        await renderInsurance();
      }

      if (action === 'delete') {
        showDeleteModal(id, btn.dataset.label || 'this policy');
      }
    });
  }

  function showDeleteModal(policyId, label){
    const overlay = document.createElement('div');
    overlay.className = 'ins-modal-overlay';
    overlay.innerHTML = `
      <div class="ins-modal">
        <h3>Permanently delete this policy?</h3>
        <p><strong>${esc(label)}</strong><br>This deletes the policy record and any attached PDF. Cannot be undone.</p>
        <label><input type="checkbox" id="ins-del-chk"> I understand this permanently deletes the policy and PDF.</label>
        <div class="ins-modal-btns">
          <button class="ins-btn" id="ins-del-cancel">Cancel</button>
          <button class="ins-btn danger" id="ins-del-btn" disabled>Delete permanently</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const chk    = overlay.querySelector('#ins-del-chk');
    const delBtn = overlay.querySelector('#ins-del-btn');
    chk.addEventListener('change', () => { delBtn.disabled = !chk.checked; });
    overlay.querySelector('#ins-del-cancel').addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

    delBtn.addEventListener('click', async () => {
      delBtn.disabled = true; delBtn.textContent = 'Deleting…';
      try {
        const { data: row } = await supa.from('insurance_policies')
          .select('storage_path').eq('id', policyId).single();
        if (row?.storage_path) {
          await supa.storage.from('insurance-policies').remove([row.storage_path]);
        }
        const { error } = await supa.from('insurance_policies').delete().eq('id', policyId);
        if (error) throw error;
        overlay.remove();
        await renderInsurance();
      } catch(e) {
        delBtn.textContent = 'Error — try again';
        delBtn.disabled = false;
      }
    });
  }

  // ─── LOGIN ─────────────────────────────────────────────────────────────
  function renderLogin(){
    app.innerHTML = `
      <div class="login-shell">
        <h2>Sign in to Command Centre</h2>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" autocomplete="username" required>
          <input type="password" id="pw" placeholder="Password" autocomplete="current-password" required>
          <button type="submit">Sign in</button>
          <div class="login-msg" id="login-msg"></div>
        </form>
      </div>`;
    document.getElementById('login-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pw').value;
      const msg = document.getElementById('login-msg');
      msg.textContent = 'Signing in…';
      const { error } = await supa.auth.signInWithPassword({ email, password });
      if (error) { msg.textContent = error.message; return; }
      location.reload();
    });
  }

  boot();
})();
</script>
</body>
</html>
