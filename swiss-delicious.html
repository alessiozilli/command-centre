<head>
  <meta charset="UTF-8">

  <title>Swiss Delicious — AZCK Command Centre</title>
  <link rel="stylesheet" href="cc-shell.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Layout comes from cc-shell.css. Keep only component styles. */
    .section-title { font-size:1.3rem; font-weight:700; color:var(--cc-text); margin:2rem 0 1rem; }
    .section-title:first-child { margin-top:0; }

    /* Product cards */
    .product-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-bottom:16px; }
    .product-card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:24px; position:relative; overflow:hidden; transition:border-color 0.2s; }
    .product-card:hover { border-color:#990000; }
    .product-card-icon { font-size:40px; margin-bottom:12px; }
    .product-card-name { font-size:1.1rem; font-weight:700; color:var(--cc-text); margin-bottom:4px; }
    .product-card-origin { font-size:0.72rem; color:#990000; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
    .product-card-desc { font-size:0.85rem; color:var(--cc-text-dim); line-height:1.75; margin-bottom:14px; }
    .product-card-note { font-size:0.75rem; color:var(--cc-text-dim); border-top:1px solid var(--cc-border-soft); padding-top:10px; }
    .product-badge { position:absolute; top:16px; right:16px; padding:4px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; background:rgba(153,0,0,0.12); color:#cc3333; border:1px solid rgba(153,0,0,0.3); }

    /* Payment strip */
    .payment-strip { background:rgba(153,0,0,0.06); border:1px solid rgba(153,0,0,0.18); border-radius:var(--cc-r-lg); padding:14px 20px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
    .payment-strip-icon { font-size:20px; flex-shrink:0; }
    .payment-strip-text { font-size:0.85rem; color:var(--cc-text-dim); }
    .payment-strip-text strong { color:var(--cc-text); }

    /* Order channel cards */
    .order-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:16px; }
    .order-card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:20px; text-decoration:none; color:var(--cc-text); transition:all 0.2s; display:block; }
    .order-card:hover { border-color:#990000; background:#1c1222; transform:translateY(-2px); }
    .order-card-icon { font-size:28px; margin-bottom:10px; }
    .order-card-channel { font-size:1rem; font-weight:700; margin-bottom:6px; }
    .order-card-detail { font-size:0.82rem; color:var(--cc-text-dim); line-height:1.65; }
    .order-card-cta { margin-top:12px; font-size:0.75rem; color:#cc3333; font-weight:700; }

    /* Event card */
    .event-card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:24px; margin-bottom:20px; }
    .event-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:14px; }
    .event-icon { font-size:36px; flex-shrink:0; }
    .event-title { font-size:1.15rem; font-weight:700; color:var(--cc-text); margin-bottom:4px; }
    .event-recurrence { font-size:0.78rem; color:#990000; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; }
    .event-body { font-size:0.85rem; color:var(--cc-text-dim); line-height:1.75; }
    .event-next { display:inline-block; margin-top:14px; padding:6px 14px; background:rgba(153,0,0,0.1); border:1px solid rgba(153,0,0,0.28); border-radius:8px; font-size:0.8rem; color:#cc3333; font-weight:700; }

    /* Media / TV card */
    .media-card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:24px; margin-bottom:20px; display:flex; align-items:flex-start; gap:16px; }
    .media-icon { font-size:32px; flex-shrink:0; }
    .media-title { font-size:1rem; font-weight:700; color:var(--cc-text); margin-bottom:4px; }
    .media-channel { font-size:0.78rem; color:var(--cc-text-dim); font-weight:600; margin-bottom:8px; }
    .media-detail { font-size:0.82rem; color:var(--cc-text-dim); line-height:1.7; }
    .media-badge { display:inline-block; margin-top:10px; padding:4px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; background:rgba(88,166,255,0.1); color:var(--cc-accent); border:1px solid rgba(88,166,255,0.25); }

    /* Sign-out button injected into banner */
    .cc-banner-actions .btn-signout { padding:6px 10px; border:1px solid var(--cc-border); border-radius:6px; background:transparent; color:var(--cc-text-dim); cursor:pointer; font-size:0.75rem; font-family:inherit; }
    .cc-banner-actions .btn-signout:hover { color:var(--cc-danger); border-color:var(--cc-danger); }

    #loadingMsg { padding:40px; text-align:center; color:var(--cc-text-dim); }
    /* NOTE: subtab visibility handled natively by cc-shell.js (applySubtabVisibility).
       Do NOT add [data-subtab] { display:none; } — cc-shell uses inline style. */
  </style>
</head>

  });

  var authResolved = false;

  function bootDashboard(session){
    if (authResolved) return;
    authResolved = true;
    document.getElementById('loadingMsg').style.display = 'none';
    attachSignOut(session.user.email);
    renderAll();
  }

  function attachSignOut(email){
    var actions = document.querySelector('.cc-banner-actions');
    if (!actions) { setTimeout(function(){ attachSignOut(email); }, 50); return; }
    var emailSpan = document.createElement('span');
    emailSpan.style.cssText = 'font-size:0.75rem;color:var(--cc-text-dim);margin-right:8px;';
    emailSpan.textContent = email;
    var btn = document.createElement('button');
    btn.className = 'btn-signout';
    btn.textContent = 'Sign out';
    btn.addEventListener('click', async function(){
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });
    actions.appendChild(emailSpan);
    actions.appendChild(btn);
  }

  sb.auth.onAuthStateChange(function(event, session){
    if (session && session.user) bootDashboard(session);
    else if (event === 'SIGNED_OUT') window.location.href = 'index.html';
  });

  (async function(){
    var r = await sb.auth.getSession();
    if (r.data.session && r.data.session.user) { bootDashboard(r.data.session); return; }
    setTimeout(async function(){
      if (authResolved) return;
      var r2 = await sb.auth.getSession();
      if (r2.data.session && r2.data.session.user) bootDashboard(r2.data.session);
      else window.location.href = 'index.html';
    }, 2000);
  })();

  /* Last Friday of the given year/month (0-indexed month) */
  function lastFriday(year, month) {
    var d = new Date(year, month + 1, 0);
    var dow = d.getDay();
    d.setDate(d.getDate() - ((dow - 5 + 7) % 7));
    return d;
  }

  function nextGuysNight() {
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var candidate = lastFriday(now.getFullYear(), now.getMonth());
    if (candidate < today) {
      var m = now.getMonth() + 1, y = now.getFullYear();
      if (m > 11) { m = 0; y++; }
      candidate = lastFriday(y, m);
    }
    return candidate;
  }

  function fmtDate(d) {
    var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mo[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function renderAll(){
    var D = DATA;

    var nextGN = nextGuysNight();
    var msLeft = nextGN - new Date();
    var daysLeft = Math.ceil(msLeft / 864e5);
    var daysLabel = daysLeft <= 0 ? 'Tonight!' : 'in ' + daysLeft + (daysLeft === 1 ? ' day' : ' days');

    if (window.CC && window.CC.updateStats) {
      window.CC.updateStats([
        { label:'Products',        value: String(D.products.length) },
        { label:'Order Channels',  value: String(D.orderChannels.length) },
        { label:'Events',          value: String(D.events.length) },
        { label:'Next Guys Night', value: fmtDate(nextGN), tone: daysLeft <= 7 ? 'warn' : 'good' }
      ]);
    }

    /* Products */

      prodHTML += '<div class="product-card-name">'+p.name+'</div>';
      prodHTML += '<div class="product-card-origin">'+p.origin+'</div>';
      prodHTML += '<div class="product-card-desc">'+p.desc+'</div>';
      prodHTML += '<div class="product-card-note">'+p.note+'</div>';
      prodHTML += '</div>';
    });
    document.getElementById('productGrid').innerHTML = prodHTML;

    /* Payment */
    document.getElementById('paymentStrip').innerHTML =
      '<span class="payment-strip-icon">'+D.payment.icon+'</span>' +
      '<span class="payment-strip-text">'+D.payment.detail+'</span>';

    /* Order channels */
    var orderHTML = '';
    D.orderChannels.forEach(function(c){
      orderHTML += '<a class="order-card" href="'+c.href+'" target="_blank" rel="noopener">';
      orderHTML += '<div class="order-card-icon">'+c.icon+'</div>';
      orderHTML += '<div class="order-card-channel">'+c.channel+'</div>';
      orderHTML += '<div class="order-card-detail">'+c.detail+'</div>';
      orderHTML += '<div class="order-card-cta">'+c.cta+'</div>';
      orderHTML += '</a>';
    });
    document.getElementById('orderGrid').innerHTML = orderHTML;

    /* Events */
    var eventsHTML = '';
    D.events.forEach(function(e){
      eventsHTML += '<div class="event-card">';
      eventsHTML += '<div class="event-header">';
      eventsHTML += '<div class="event-icon">'+e.icon+'</div>';
      eventsHTML += '<div><div class="event-title">'+e.name+'</div>';
      eventsHTML += '<div class="event-recurrence">'+e.recurrence+'</div></div>';
      eventsHTML += '</div>';
      eventsHTML += '<div class="event-body">'+e.desc+'</div>';
      eventsHTML += '<div class="event-next">Next: '+fmtDate(nextGN)+' · '+daysLabel+'</div>';
      eventsHTML += '</div>';
    });
    document.getElementById('eventsContainer').innerHTML = eventsHTML;

    /* Media */
    var mediaHTML = '';
    D.media.forEach(function(m){
      mediaHTML += '<div class="media-card">';
      mediaHTML += '<div class="media-icon">'+m.icon+'</div>';
      mediaHTML += '<div><div class="media-title">'+m.title+'</div>';

      mediaHTML += '<span class="media-badge">'+m.badge+'</span></div>';
      mediaHTML += '</div>';
    });
    document.getElementById('mediaContainer').innerHTML = mediaHTML;
  }

})();
