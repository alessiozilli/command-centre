<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data:;">

  <link rel="stylesheet" href="cc-shell.css">

  <style>
    /* Layout comes from cc-shell.css. Keep only component styles. */
    .section-title { font-size:1.3rem; font-weight:700; color:var(--cc-text); margin:2rem 0 1rem; }
    .section-title:first-child { margin-top:0; }
    .card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:24px; margin-bottom:20px; }
    .section-divider { border:none; border-top:1px solid var(--cc-border-soft); margin:2rem 0; }

    /* Auth cards */
    .auth-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-bottom:2rem; }
    .auth-card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:24px; position:relative; overflow:hidden; }
    .auth-card-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .auth-card-icon { font-size:28px; }
    .auth-card-title { font-size:1.1rem; font-weight:700; }
    .auth-card-details { font-size:0.8rem; color:var(--cc-text-dim); line-height:1.8; }
    .auth-card-details code { background:var(--cc-bg); padding:2px 6px; border-radius:4px; font-size:0.7rem; color:#79c0ff; word-break:break-all; }
    .auth-card-details strong { color:var(--cc-text); }
    .auth-card-badge { position:absolute; top:16px; right:16px; padding:4px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; text-transform:uppercase; }
    .badge-pass { background:rgba(63,185,80,0.15); color:var(--cc-success); border:1px solid rgba(63,185,80,0.3); }
    .badge-warn { background:rgba(210,153,34,0.15); color:var(--cc-warn); border:1px solid rgba(210,153,34,0.3); }
    .badge-fail { background:rgba(248,81,73,0.15); color:var(--cc-danger); border:1px solid rgba(248,81,73,0.3); }
    .badge-pending { background:rgba(88,166,255,0.15); color:var(--cc-accent); border:1px solid rgba(88,166,255,0.3); }

    /* DNS table */
    table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    th { text-align:left; padding:10px 12px; background:var(--cc-bg-card); color:var(--cc-text-dim); font-weight:600; border-bottom:2px solid var(--cc-border); text-transform:uppercase; letter-spacing:0.05em; font-size:0.75rem; }
    td { padding:10px 12px; border-bottom:1px solid var(--cc-border-soft); color:#c9d1d9; }
    tr:hover td { background:var(--cc-bg-card); }
    td code { background:var(--cc-bg); padding:2px 6px; border-radius:4px; font-size:0.7rem; color:#79c0ff; word-break:break-all; }
    .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.7rem; font-weight:600; text-transform:uppercase; }

    /* Filter bar */
    .filter-bar { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .filter-btn { padding:0.4rem 0.8rem; border-radius:6px; border:1px solid var(--cc-border); background:transparent; color:var(--cc-text-dim); font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
    .filter-btn:hover { color:var(--cc-text); border-color:var(--cc-accent); }
    .filter-btn.active { background-color:var(--cc-accent); color:var(--cc-bg); border-color:var(--cc-accent); font-weight:600; }

    /* Platform cards */
    .platform-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:16px; margin-bottom:20px; }
    .platform-card { background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); padding:20px; }
    .platform-card-title { font-size:1rem; font-weight:700; color:var(--cc-text); margin-bottom:4px; }
    .platform-card-url { font-size:0.8rem; color:var(--cc-accent); margin-bottom:12px; word-break:break-all; }
    .platform-card-detail { font-size:0.8rem; color:var(--cc-text-dim); line-height:1.8; }
    .platform-card-detail strong { color:#c9d1d9; }
    .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle; }
    .dot-pass { background:var(--cc-success); box-shadow:0 0 6px rgba(63,185,80,0.4); }
    .dot-warn { background:var(--cc-warn); box-shadow:0 0 6px rgba(210,153,34,0.4); }
    .dot-parked { background:#8b949e; }

    /* Toolbox */
    .tool-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:12px; }
    .tool-btn { display:block; padding:16px; background:var(--cc-bg-card); border:1px solid var(--cc-border); border-radius:var(--cc-r-lg); text-decoration:none; color:var(--cc-text); transition:all 0.2s; text-align:center; }
    .tool-btn:hover { border-color:#990000; background:#1c2333; transform:translateY(-2px); }
    .tool-btn-icon { font-size:24px; margin-bottom:8px; }
    .tool-btn-label { font-size:0.9rem; font-weight:600; }
    .tool-btn-desc { font-size:0.7rem; color:var(--cc-text-dim); margin-top:4px; }

    /* Timeline */
    .timeline { position:relative; padding-left:24px; }
    .timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:var(--cc-border); }
    .timeline-item { position:relative; margin-bottom:20px; }
    .timeline-item::before { content:''; position:absolute; left:-20px; top:6px; width:12px; height:12px; border-radius:50%; border:2px solid var(--cc-border); background:var(--cc-bg); }
    .timeline-item.done::before { background:var(--cc-success); border-color:var(--cc-success); }
    .timeline-item.pending::before { background:var(--cc-warn); border-color:var(--cc-warn); }
    .timeline-item.future::before { background:var(--cc-bg); border-color:var(--cc-border); }
    .timeline-date { font-size:0.7rem; color:var(--cc-text-dim); }
    .timeline-text { font-size:0.85rem; color:var(--cc-text); margin-top:2px; }

    /* Sign-out button injected into banner actions */
    .cc-banner-actions .btn-signout { padding:6px 10px; border:1px solid var(--cc-border); border-radius:6px; background:transparent; color:var(--cc-text-dim); cursor:pointer; font-size:0.75rem; font-family:inherit; }
    .cc-banner-actions .btn-signout:hover { color:var(--cc-danger); border-color:var(--cc-danger); }

    /* Loading state */
    #loadingMsg { padding:40px; text-align:center; color:var(--cc-text-dim); }
    [data-subtab] { display:none; }
  </style>
</head>

    var authPass = D.emailAuth.filter(function(a){ return a.status==='pass'; }).length;
    var platformLive = D.platforms.filter(function(p){ return p.status==='live'; }).length;
    var sslCount = D.platforms.filter(function(p){ return p.ssl; }).length;

    if (window.CC && window.CC.updateStats) {
      window.CC.updateStats([
        { label:'Email Auth',  value: authPass + '/' + D.emailAuth.length, tone: authPass===D.emailAuth.length ? 'good' : 'warn' },
        { label:'DNS Records', value: String(D.dnsRecords.length) },
        { label:'Platforms',   value: String(platformLive) },
        { label:'SSL Active',  value: String(sslCount) },
        { label:'Tools',       value: String(D.tools.length) }
      ]);
    }

    // Email auth cards
    var authHTML = '';
    D.emailAuth.forEach(function(a){
      var badgeClass = a.status==='pass'?'badge-pass': a.status==='warn'?'badge-warn': a.status==='fail'?'badge-fail':'badge-pending';
      authHTML += '<div class="auth-card">';
      authHTML += '<span class="auth-card-badge '+badgeClass+'">'+a.badge+'</span>';
      authHTML += '<div class="auth-card-header"><span class="auth-card-icon">'+a.icon+'</span><div><div class="auth-card-title">'+a.name+'</div><div style="font-size:0.7rem;color:var(--cc-text-dim);">'+a.fullName+'</div></div></div>';
      authHTML += '<div class="auth-card-details">';
      authHTML += '<div style="margin-bottom:8px;"><code>'+a.recordType+' @ '+a.host+'</code></div>';
      authHTML += '<div style="margin-bottom:12px;"><code>'+a.record+'</code></div>';
      a.details.forEach(function(d){ authHTML += '<div style="padding:2px 0;">• '+d+'</div>'; });
      authHTML += '<div style="margin-top:8px;font-size:0.7rem;color:#484f58;">Last checked: '+a.lastChecked+'</div>';
      authHTML += '</div></div>';
    });
    document.getElementById('authGrid').innerHTML = authHTML;

    // Roadmap
    var roadHTML = '';
    D.roadmap.forEach(function(r){
      roadHTML += '<div class="timeline-item '+r.status+'"><div class="timeline-date">'+r.date+'</div><div class="timeline-text">'+r.text+'</div></div>';
    });
    document.getElementById('roadmap').innerHTML = roadHTML;

    // Platforms
    var platHTML = '';
    D.platforms.forEach(function(p){
      var dotCls = p.status==='live' ? 'dot-pass' : p.status==='parked' ? 'dot-parked' : 'dot-warn';
      platHTML += '<div class="platform-card">';
      platHTML += '<div class="platform-card-title"><span class="status-dot '+dotCls+'"></span>'+p.name+'</div>';
      platHTML += '<div class="platform-card-url">'+p.url+'</div>';
      platHTML += '<div class="platform-card-detail"><strong>Host:</strong> '+p.host+'<br>';
      if(p.repo) platHTML += '<strong>Repo:</strong> '+p.repo+'<br>';
      platHTML += '<strong>Status:</strong> '+(p.status==='parked'?'<span style="color:#8b949e;">⏸ Parked</span>':'<span style="color:var(--cc-success);">● Live</span>')+'<br>';
      platHTML += '<strong>SSL:</strong> '+(p.ssl?'<span style="color:var(--cc-success);">✓ Active</span>':'<span style="color:var(--cc-danger);">✗ None</span>')+'<br>';
      platHTML += p.notes+'</div></div>';
    });
    document.getElementById('platformGrid').innerHTML = platHTML;

    // DNS table + filters
    var recordTypes = {};
    D.dnsRecords.forEach(function(r){ recordTypes[r.type] = true; });
    var types = Object.keys(recordTypes).sort();
    var TYPE_COLORS = { A:'#58a6ff', AAAA:'#58a6ff', CNAME:'#bc8cff', MX:'#f0883e', TXT:'#3fb950', NS:'#8b949e', SOA:'#8b949e' };

    var filterHTML = '<button class="filter-btn active" data-filter="all">All ('+D.dnsRecords.length+')</button>';
    types.forEach(function(t){
      var count = D.dnsRecords.filter(function(r){return r.type===t;}).length;
      filterHTML += '<button class="filter-btn" data-filter="'+t+'" style="border-color:'+(TYPE_COLORS[t]||'#30363d')+'">'+t+' ('+count+')</button>';
    });
    document.getElementById('dnsFilter').innerHTML = filterHTML;

    function renderDNS(filter){
      var tbody = document.querySelector('#dnsTable tbody');
      var rows = '';
      D.dnsRecords.forEach(function(r){
        if(filter!=='all' && r.type!==filter) return;
        var col = TYPE_COLORS[r.type]||'#8b949e';
        rows += '<tr>';
        rows += '<td><span class="tag" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44;">'+r.type+'</span></td>';
        rows += '<td><code>'+r.host+'</code></td>';
        rows += '<td style="max-width:300px;"><code>'+r.value+'</code></td>';
        rows += '<td>'+r.purpose+'</td>';
        rows += '<td style="color:var(--cc-text-dim);">'+r.managed+'</td>';
        rows += '</tr>';
      });
      tbody.innerHTML = rows;
    }
    renderDNS('all');

    document.getElementById('dnsFilter').addEventListener('click', function(ev){
      if(!ev.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('#dnsFilter .filter-btn').forEach(function(b){b.classList.remove('active');});
      ev.target.classList.add('active');
      renderDNS(ev.target.getAttribute('data-filter'));
    });

    // Toolbox
    var toolHTML = '';
    D.tools.forEach(function(t){
      toolHTML += '<a class="tool-btn" href="'+t.url+'" target="_blank" rel="noopener">';
      toolHTML += '<div class="tool-btn-icon">'+t.icon+'</div>';
      toolHTML += '<div class="tool-btn-label">'+t.name+'</div>';
      toolHTML += '<div class="tool-btn-desc">'+t.desc+'</div>';
      toolHTML += '</a>';
    });
    document.getElementById('toolGrid').innerHTML = toolHTML;
  }
})();
</script>

</body>
</html>
