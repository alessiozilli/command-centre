async function loadRoadmap() {

      .from('roadmap')
      .select('id, category, display_date, sort_date, text, status, sort_order, notes')
      .order('sort_date', { ascending: true, nullsFirst: false })

    html += '<div class="timeline-date">'+escapeHTML(r.display_date)+'<span class="timeline-cat">'+escapeHTML(r.category)+'</span></div>';
    html += '<div class="timeline-text">'+escapeHTML(r.text)+'</div>';
    if (r.notes) html += '<div style="font-size:0.75rem;color:#8b949e;margin-top:4px;">'+escapeHTML(r.notes)+'</div>';
    html += '</div>';
  });
  document.getElementById('roadmap').innerHTML = html;
}

function escapeHTML(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

// === RENDER ===
function renderAll() {
  var D = DATA;
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('lastUpdated').textContent = D.lastUpdated;

  var authPass = D.emailAuth.filter(function(a){ return a.status==='pass'; }).length;
  var authTotal = D.emailAuth.length;
  var dnsCount = D.dnsRecords.length;
  var platformCount = D.platforms.filter(function(p){ return p.status==='live'; }).length;
  var sslCount = D.platforms.filter(function(p){ return p.ssl; }).length;
  var statusColor = authPass === authTotal ? '#3fb950' : (authPass >= 2 ? '#d29922' : '#f85149');
  var summaryHTML = '';
  summaryHTML += '<div class="stat-card"><div class="stat-value" style="color:'+statusColor+';">'+authPass+'/'+authTotal+'</div><div class="stat-label">Email Auth</div></div>';
  summaryHTML += '<div class="stat-card"><div class="stat-value" style="color:#58a6ff;">'+dnsCount+'</div><div class="stat-label">DNS Records</div></div>';
  summaryHTML += '<div class="stat-card"><div class="stat-value" style="color:#3fb950;">'+platformCount+'</div><div class="stat-label">Platforms Live</div></div>';
  summaryHTML += '<div class="stat-card"><div class="stat-value" style="color:#3fb950;">'+sslCount+'</div><div class="stat-label">SSL Active</div></div>';
  summaryHTML += '<div class="stat-card"><div class="stat-value" style="color:#58a6ff;">'+D.tools.length+'</div><div class="stat-label">Tools</div></div>';
  document.getElementById('summaryRow').innerHTML = summaryHTML;

  var authHTML = '';
  D.emailAuth.forEach(function(a){
    var badgeClass = a.status==='pass'?'badge-pass': a.status==='warn'?'badge-warn': a.status==='fail'?'badge-fail':'badge-pending';
    authHTML += '<div class="auth-card">';
    authHTML += '<span class="auth-card-badge '+badgeClass+'">'+a.badge+'</span>';
    authHTML += '<div class="auth-card-header"><span class="auth-card-icon">'+a.icon+'</span><div><div class="auth-card-title">'+a.name+'</div><div style="font-size:0.7rem;color:#8b949e;">'+a.fullName+'</div></div></div>';
    authHTML += '<div class="auth-card-details">';
    authHTML += '<div style="margin-bottom:8px;"><code>'+a.recordType+' @ '+a.host+'</code></div>';
    authHTML += '<div style="margin-bottom:12px;"><code>'+a.record+'</code></div>';
    a.details.forEach(function(d){ authHTML += '<div style="padding:2px 0;">• '+d+'</div>'; });
    authHTML += '<div style="margin-top:8px;font-size:0.7rem;color:#484f58;">Last checked: '+a.lastChecked+'</div>';
    authHTML += '</div></div>';
  });
  document.getElementById('authGrid').innerHTML = authHTML;

  // Roadmap — async from Supabase
  loadRoadmap();

  var platHTML = '';
  D.platforms.forEach(function(p){
    platHTML += '<div class="platform-card">';
    platHTML += '<div class="platform-card-title"><span class="status-dot dot-pass"></span>'+p.name+'</div>';
    platHTML += '<div class="platform-card-url">'+p.url+'</div>';
    platHTML += '<div class="platform-card-detail"><strong>Host:</strong> '+p.host+'<br>';
    if(p.repo) platHTML += '<strong>Repo:</strong> '+p.repo+'<br>';
    platHTML += '<strong>SSL:</strong> '+(p.ssl?'<span style="color:#3fb950;">✓ Active</span>':'<span style="color:#f85149;">✗ None</span>')+'<br>';
    platHTML += p.notes+'</div></div>';
  });
  document.getElementById('platformGrid').innerHTML = platHTML;

  var recordTypes = {};
  D.dnsRecords.forEach(function(r){ recordTypes[r.type] = true; });
  var types = Object.keys(recordTypes).sort();
  var TYPE_COLORS = { A:'#58a6ff', AAAA:'#58a6ff', CNAME:'#bc8cff', MX:'#f0883e', TXT:'#3fb950', NS:'#8b949e', SOA:'#8b949e' };
  var filterHTML = '<button class="filter-btn active" data-filter="all">All ('+D.dnsRecords.length+')</button>';
  types.forEach(function(t){
    var count = D.dnsRecords.filter(function(r){return r.type===t;}).length;
    filterHTML += '<button class="filter-btn" data-filter="'+t+'" style="border-color:'+(TYPE_COLORS[t]||'#30363d')+'">'+t+' ('+count+')</button>';
  });
  document.getElementById('dnsFilter').innerHTML = filterHTML;

  function renderDNS(filter){
    var tbody = document.querySelector('#dnsTable tbody');
    var rows = '';
    D.dnsRecords.forEach(function(r){
      if(filter!=='all' && r.type!==filter) return;
      var col = TYPE_COLORS[r.type]||'#8b949e';
      rows += '<tr>';
      rows += '<td><span class="tag" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44;">'+r.type+'</span></td>';
      rows += '<td><code>'+r.host+'</code></td>';
      rows += '<td style="max-width:300px;"><code>'+r.value+'</code></td>';
      rows += '<td>'+r.purpose+'</td>';
      rows += '<td style="color:#8b949e;">'+r.managed+'</td>';
      rows += '</tr>';
    });
    tbody.innerHTML = rows;
  }
  renderDNS('all');
  document.getElementById('dnsFilter').addEventListener('click', function(ev){
    if(!ev.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('#dnsFilter .filter-btn').forEach(function(b){b.classList.remove('active');});
    ev.target.classList.add('active');
    renderDNS(ev.target.getAttribute('data-filter'));
  });

  var toolHTML = '';
  D.tools.forEach(function(t){
    toolHTML += '<a class="tool-btn" href="'+t.url+'" target="_blank" rel="noopener">';
    toolHTML += '<div class="tool-btn-icon">'+t.icon+'</div>';
    toolHTML += '<div class="tool-btn-label">'+t.name+'</div>';
    toolHTML += '<div class="tool-btn-desc">'+t.desc+'</div>';
    toolHTML += '</a>';
  });
  document.getElementById('toolGrid').innerHTML = toolHTML;
}
</script>
</body>
</html>
