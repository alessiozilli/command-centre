<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZCK Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #0d1117; color: #e6edf3; line-height: 1.6; font-size: 16px; }
    header { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 2rem 2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: 0.05em; flex: 1; min-width: 200px; }
    .header-right { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
    .header-date { font-size: 0.95rem; color: #8b949e; font-weight: 500; }
    .status-bar { display: flex; gap: 1.5rem; font-size: 0.9rem; }
    .status-item { display: flex; flex-direction: column; align-items: center; }
    .status-label { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .status-count { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
    .status-item.done .status-count { color: #3fb950; }
    .status-item.synced .status-count { color: #8b949e; font-size: 0.8rem; }
    nav.pill-nav { background-color: #0d1117; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    nav.pill-nav a, nav.pill-nav button { padding: 0.5rem 1rem; border: 1px solid #30363d; border-radius: 20px; background-color: transparent; color: #8b949e; text-decoration: none; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; font-family: inherit; }
    nav.pill-nav a:hover, nav.pill-nav button:hover { color: #e6edf3; border-color: #58a6ff; }
    nav.pill-nav a.active { background-color: #58a6ff; color: #0d1117; border-color: #58a6ff; font-weight: 600; }
    .summary-stats { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 1.5rem 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1.5rem; align-items: center; }
    .stat-block { display: flex; flex-direction: column; gap: 0.5rem; }
    .stat-label { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: #58a6ff; }
    .stat-block.done .stat-value { color: #3fb950; }
    .stat-block.synced .stat-value { font-size: 0.9rem; color: #8b949e; }
    .category-tabs { background-color: #0d1117; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .category-tab { padding: 0.5rem 1rem; border: 2px solid #30363d; border-radius: 6px; background-color: transparent; color: #e6edf3; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; position: relative; user-select: none; font-family: inherit; }
    .category-tab:hover { border-color: #58a6ff; color: #58a6ff; }
    .category-tab.active { border-color: #990000; background-color: rgba(153, 0, 0, 0.15); color: #ff6b6b; }
    .category-count { font-size: 0.8rem; color: #8b949e; margin-left: 0.5rem; }
    .category-tab.active .category-count { color: #ff6b6b; }
    .btn-add-category { padding: 0.5rem 0.75rem; border: 1px dashed #30363d; border-radius: 6px; background-color: transparent; color: #8b949e; cursor: pointer; font-size: 1rem; transition: all 0.2s; font-family: inherit; }
    .btn-add-category:hover { border-color: #58a6ff; color: #58a6ff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1rem; border: 1px solid #30363d; border-radius: 6px; background-color: transparent; color: #8b949e; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; font-family: inherit; }
    .filter-btn:hover { color: #e6edf3; border-color: #58a6ff; }
    .filter-btn.active { background-color: #58a6ff; color: #0d1117; border-color: #58a6ff; font-weight: 600; }
    .btn-add-task { padding: 0.75rem 1.5rem; background-color: #990000; color: #e6edf3; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; font-family: inherit; }
    .btn-add-task:hover { background-color: #cc0000; }
    .task-list { display: flex; flex-direction: column; gap: 1rem; }
    .task-row { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; display: grid; grid-template-columns: auto 1fr auto auto auto auto; gap: 1rem; align-items: center; transition: all 0.2s; }
    .task-row:hover { border-color: #58a6ff; background-color: #0d1117; }
    .task-row.done { opacity: 0.6; }
    .task-row.done .task-title { text-decoration: line-through; color: #8b949e; }
    .task-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #3fb950; }
    .task-content { display: flex; flex-direction: column; gap: 0.5rem; }
    .task-title { font-weight: 600; color: #e6edf3; font-size: 0.95rem; }
    .task-notes { font-size: 0.85rem; color: #8b949e; line-height: 1.5; }
    .task-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .priority-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .priority-badge.high { background-color: rgba(248, 81, 73, 0.15); color: #f85149; }
    .priority-badge.medium { background-color: rgba(240, 136, 62, 0.15); color: #f0883e; }
    .priority-badge.low { background-color: rgba(139, 148, 158, 0.15); color: #8b949e; }
    .task-date { font-size: 0.85rem; color: #8b949e; }
    .task-actions { display: flex; gap: 0.5rem; }
    .btn-task-action { padding: 0.4rem 0.8rem; border: 1px solid #30363d; border-radius: 4px; background-color: transparent; color: #8b949e; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; font-family: inherit; }
    .btn-task-action:hover { color: #e6edf3; border-color: #58a6ff; }
    .btn-task-action.delete:hover { color: #f85149; border-color: #f85149; }
    .task-edit-form { grid-column: 1 / -1; background-color: #0d1117; border: 1px solid #58a6ff; border-radius: 6px; padding: 1rem; display: grid; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea { padding: 0.75rem; background-color: #161b22; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; font-family: inherit; font-size: 0.95rem; transition: all 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #58a6ff; outline: none; background-color: #0d1117; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-buttons { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .btn-save, .btn-cancel { padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: 600; font-family: inherit; transition: all 0.2s; }
    .btn-save { background-color: #58a6ff; color: #0d1117; }
    .btn-save:hover { background-color: #79c0ff; }
    .btn-cancel { background-color: transparent; color: #8b949e; border: 1px solid #30363d; }
    .btn-cancel:hover { color: #e6edf3; border-color: #58a6ff; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 2rem; max-width: 500px; width: 90%; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: #e6edf3; }
    .modal-buttons { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }
    .btn-confirm { padding: 0.75rem 1.5rem; background-color: #f85149; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-family: inherit; transition: all 0.2s; }
    .btn-confirm:hover { background-color: #fc6d71; }
    .btn-secondary { padding: 0.75rem 1.5rem; background-color: transparent; color: #8b949e; border: 1px solid #30363d; border-radius: 4px; cursor: pointer; font-weight: 600; font-family: inherit; transition: all 0.2s; }
    .btn-secondary:hover { color: #e6edf3; border-color: #58a6ff; }
    .category-form { display: grid; gap: 1rem; }
    .color-picker-wrapper { display: flex; align-items: center; gap: 1rem; }
    .color-picker-input { width: 50px; height: 50px; border: 2px solid #30363d; border-radius: 4px; cursor: pointer; }
    .context-menu { display: none; position: fixed; background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); z-index: 2000; min-width: 150px; }
    .context-menu.active { display: block; }
    .context-menu-item { padding: 0.75rem 1rem; color: #8b949e; cursor: pointer; transition: all 0.2s; border-bottom: 1px solid #30363d; }
    .context-menu-item:last-child { border-bottom: none; }
    .context-menu-item:hover { background-color: #0d1117; color: #e6edf3; }
    .context-menu-item.delete:hover { color: #f85149; }
    .empty-state { text-align: center; padding: 3rem 2rem; color: #8b949e; }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state-text { font-size: 1rem; margin-bottom: 2rem; }
    @media (max-width: 768px) {
      header { flex-direction: column; align-items: flex-start; }
      .header-right { width: 100%; justify-content: space-between; }
      .status-bar { justify-content: space-around; width: 100%; gap: 0.75rem; }
      .status-item { flex-direction: row; gap: 0.5rem; }
      .status-label { font-size: 0.7rem; }
      .task-row { grid-template-columns: auto 1fr; gap: 0.75rem; }
      .task-meta { grid-column: 1 / -1; gap: 0.75rem; }
      .task-actions { grid-column: 1 / -1; }
      .priority-badge { font-size: 0.75rem; padding: 0.2rem 0.6rem; }
      .category-tabs { padding: 1rem; overflow-x: auto; }
      .container { padding: 1rem; }
    }
    @media (max-width: 480px) {
      header h1 { font-size: 1.5rem; }
      .summary-stats { padding: 1rem; grid-template-columns: 1fr; gap: 1rem; }
      .filter-bar { gap: 0.5rem; }
      .filter-btn { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
      .btn-add-task { width: 100%; }
      nav.pill-nav { padding: 0.75rem 1rem; gap: 0.5rem; }
      nav.pill-nav a, nav.pill-nav button { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
    }
    #appContent { display: block; }
    .user-bar { display: flex; align-items: center; gap: 0.75rem; }
    .user-name { color: #8b949e; font-size: 0.9rem; font-weight: 500; }
    .user-role { color: #990000; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-logout { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .btn-logout:hover { border-color: #990000; color: #e6edf3; }
  </style>
</head>
<body>

<div id="appContent">
  <header>
    <h1>AZ COMMAND CENTRE</h1>
    <div class="header-right">
      <div class="user-bar">
        <span class="user-name" id="userName"></span>
        <span class="user-role" id="userRole"></span>
        <button class="btn-logout" id="btnLogout" onclick="handleLogout()">Sign Out</button>
      </div>
      <div class="header-date" id="headerDate"></div>
      <div class="status-bar">
        <div class="status-item">
          <div class="status-label">Open</div>
          <div class="status-count" id="statusOpen">0</div>
        </div>
        <div class="status-item">
          <div class="status-label">Today</div>
          <div class="status-count" id="statusToday">0</div>
        </div>
        <div class="status-item done">
          <div class="status-label">Done</div>
          <div class="status-count" id="statusDone">0</div>
        </div>
        <div class="status-item synced">
          <div class="status-label">Synced</div>
          <div class="status-count" id="statusSynced">—</div>
        </div>
      </div>
    </div>
  </header>

  <nav class="pill-nav">
    <a href="#" class="active">Tasks</a>
    <a href="forge.html">Forge Evolution</a>
    <a href="azck_tech_roadmap.html">Roadmap</a>
  </nav>

  <div class="summary-stats">
    <div class="stat-block">
      <div class="stat-label">Total Open</div>
      <div class="stat-value" id="statTotalOpen">0</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Due This Week</div>
      <div class="stat-value" id="statDueWeek">0</div>
    </div>
    <div class="stat-block done">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="statCompleted">0</div>
    </div>
    <div class="stat-block synced">
      <div class="stat-label">Last Updated</div>
      <div class="stat-value" id="statLastUpdated">Never</div>
    </div>
  </div>

  <div class="category-tabs" id="categoryTabs"></div>

  <div class="container">
    <div style="margin-bottom: 2rem;">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All Tasks</button>
        <button class="filter-btn" data-filter="open">Open Only</button>
        <button class="filter-btn" data-filter="high">High Priority</button>
        <button class="filter-btn" data-filter="done">Done Only</button>
      </div>
      <button class="btn-add-task" id="btnAddTask">+ Add Task</button>
    </div>
    <div class="task-list" id="taskList"></div>
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-text">No tasks in this category. Start by adding one!</div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h2 class="modal-title" id="confirmTitle">Confirm Action</h2>
      <p id="confirmMessage"></p>
      <div class="modal-buttons">
        <button class="btn-secondary" id="btnConfirmCancel">Cancel</button>
        <button class="btn-confirm" id="btnConfirmOK">Confirm</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="categoryModal">
    <div class="modal">
      <h2 class="modal-title" id="categoryModalTitle">Add Category</h2>
      <form class="category-form" id="categoryForm">
        <div class="form-group">
          <label for="categoryName">Category Name</label>
          <input type="text" id="categoryName" required placeholder="e.g., Work, Personal">
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="categoryColor" class="color-picker-input" value="#58a6ff">
            <span id="colorValue">#58a6ff</span>
          </div>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn-secondary" id="btnCategoryCancel">Cancel</button>
          <button type="submit" class="btn-confirm">Create Category</button>
        </div>
      </form>
    </div>
  </div>

  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" id="contextRename">Rename</div>
    <div class="context-menu-item delete" id="contextDelete">Delete</div>
  </div>
</div>
