<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://twrlvnfszohyrmivdhre.supabase.co wss://twrlvnfszohyrmivdhre.supabase.co; img-src 'self' data: https:;">
<title>Tasks â€” AZCK Command Centre</title>
<link rel="stylesheet" href="cc-shell.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  .app-wrap { max-width:1320px; margin:20px auto 80px; padding:0 20px; }
  .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
  .view-toggle { display:flex; gap:4px; background:#0d1117; padding:4px; border:1px solid #30363d; border-radius:8px; }
  .view-toggle button { background:transparent; color:#8b949e; border:none; padding:6px 14px; border-radius:5px; cursor:pointer; font-size:0.9rem; }
  .view-toggle button.active { background:#21262d; color:#e6edf3; }
  .btn { background:#238636; color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-size:0.9rem; font-weight:500; }
  .btn:hover { background:#2ea043; }
  .btn-ghost { background:transparent; border:1px solid #30363d; color:#e6edf3; }
  .btn-ghost:hover { background:#21262d; }
  .btn-danger { background:#da3633; } .btn-danger:hover{ background:#f85149; }
  .actions-group { display:flex; gap:8px; }

  .group { background:#161b22; border:1px solid #30363d; border-radius:8px; margin-bottom:14px; overflow:hidden; }
  .group-head { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; user-select:none; background:#0d1117; }
  .group-head:hover { background:#161b22; }
  .group-head .dot { width:10px; height:10px; border-radius:50%; flex:none; }
  .group-head .name { flex:1; color:#e6edf3; font-weight:600; }
  .group-head .meta { color:#8b949e; font-size:0.85rem; }
  .group-head .chev { color:#8b949e; transition:.2s; }
  .group.collapsed .chev { transform:rotate(-90deg); }
  .group.collapsed .group-body { display:none; }

  /* LIST VIEW */
  .task-row { display:grid; grid-template-columns: 24px 1fr 110px 110px 110px 40px; gap:10px; align-items:center; padding:10px 16px; border-top:1px solid #21262d; }
  .task-row:first-child { border-top:none; }
  .task-row:hover { background:#0d1117; }
  .task-row.done .title { color:#8b949e; text-decoration:line-through; }
  .task-row .cb { width:18px; height:18px; accent-color:#238636; cursor:pointer; }
  .task-row .title { color:#e6edf3; cursor:text; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .task-row .title[contenteditable="true"] { white-space:normal; background:#0d1117; padding:4px 8px; border-radius:4px; outline:1px solid #58a6ff; }
  .task-row select, .task-row input[type="date"] { background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:4px 6px; border-radius:4px; font-size:0.85rem; width:100%; }
  .task-row .delete { background:transparent; border:none; color:#8b949e; cursor:pointer; font-size:1.2rem; }
  .task-row .delete:hover { color:#f85149; }
  .prio-high { color:#f85149; } .prio-medium { color:#d29922; } .prio-low { color:#3fb950; }
  .due-overdue { color:#f85149; font-weight:600; } .due-today { color:#d29922; font-weight:600; }

  /* KANBAN VIEW */
  .kanban { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
  .kanban-col { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:10px; min-height:200px; }
  .kanban-col h3 { margin:0 0 10px; color:#e6edf3; font-size:0.95rem; padding:0 4px; display:flex; justify-content:space-between; }
  .kanban-col h3 .cnt { color:#8b949e; font-weight:400; }
  .kanban-card { background:#161b22; border:1px solid #30363d; border-radius:6px; padding:10px 12px; margin-bottom:8px; cursor:pointer; }
  .kanban-card:hover { border-color:#58a6ff; }
  .kanban-card .t { color:#e6edf3; font-weight:500; margin-bottom:6px; font-size:0.9rem; }
  .kanban-card .meta { display:flex; gap:8px; font-size:0.75rem; color:#8b949e; flex-wrap:wrap; }
  .kanban-card .meta select { background:#0d1117; border:1px solid #30363d; color:#e6edf3; border-radius:4px; padding:1px 4px; font-size:0.75rem; }

  /* DETAIL VIEW */
  .detail-card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px 20px; margin-bottom:10px; }
  .detail-card h3 { margin:0 0 8px; color:#e6edf3; font-size:1.05rem; display:flex; gap:10px; align-items:center; }
  .detail-card h3 input[type=checkbox] { width:18px; height:18px; accent-color:#238636; }
  .detail-card .body { color:#c9d1d9; margin:8px 0 12px; white-space:pre-wrap; min-height:22px; }
  .detail-card .body:focus, .detail-card h3 [contenteditable="true"]:focus { outline:1px solid #58a6ff; background:#0d1117; padding:2px 6px; border-radius:4px; }
  .detail-card .fields { display:flex; gap:10px; flex-wrap:wrap; font-size:0.85rem; }
  .detail-card .fields label { color:#8b949e; display:flex; align-items:center; gap:6px; }
  .detail-card .fields select, .detail-card .fields input { background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:4px 6px; border-radius:4px; font-size:0.85rem; }

  /* MODAL */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:1000; }
  .modal { background:#161b22; padding:24px; border-radius:8px; border:1px solid #30363d; min-width:360px; max-width:520px; width:90%; }
  .modal h3 { margin:0 0 16px; color:#e6edf3; }
  .modal input, .modal select, .modal textarea { width:100%; padding:9px; margin-bottom:10px; background:#0d1117; border:1px solid #30363d; color:#e6edf3; border-radius:6px; box-sizing:border-box; font-family:inherit; }
  .modal textarea { min-height:80px; resize:vertical; }
  .modal .row { display:flex; gap:10px; }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }

  .login-shell { max-width:360px; margin:60px auto; background:#161b22; padding:30px; border:1px solid #30363d; border-radius:8px; }
  .login-shell h2 { margin:0 0 18px; color:#e6edf3; }
  .login-shell input { width:100%; padding:10px; margin-bottom:10px; background:#0d1117; border:1px solid #30363d; color:#e6edf3; border-radius:6px; font-size:0.95rem; box-sizing:border-box; }
  .login-msg { color:#f85149; font-size:0.85rem; margin-top:10px; min-height:1.2em; }
  .loading, .empty { color:#8b949e; padding:20px; text-align:center; }
  .error { background:#5a1d1d; color:#ffb3b3; padding:12px 16px; border-radius:6px; margin-bottom:12px; }
</style>
  <script defer src="auth.js"></script>
</head>
<body>

<div id="app" class="app-wrap"><div class="loading">Loadingâ€¦</div></div>

<script>
  window.PAGE = {
    id: 'tasks',
    title: 'Tasks',
    subtitle: 'Projects + tasks Â· inline edit Â· list / kanban / detail',
    subtabs: [
      { id:'open',      label:'Open' },
      { id:'week',      label:'This Week' },
      { id:'overdue',   label:'Overdue' },
      { id:'done',      label:'Completed' }
    ],
    stats: []
  };
</script>
<script src="cc-shell.js"></script>

<script>
(function(){
  'use strict';

  const SUPABASE_URL = 'https://twrlvnfszohyrmivdhre.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmx2bmZzem9oeXJtaXZkaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjkxMTMsImV4cCI6MjA5MDE0NTExM30.o96DFNbBObst0EAmX51rnRFXzu8oTN1o-HNAxN7MY8A';

  const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      storageKey: 'sb-twrlvnfszohyrmivdhre-auth-token',
      persistSession: true,
      autoRefreshToken: true
    }
  });
  window.supa = supa;

  const STATE = {
    tasks: [],
    projects: [],
    categories: [],
    profile: null,
    view: localStorage.getItem('tasks.view') || 'list',
    subtab: 'open',
    collapsedGroups: JSON.parse(localStorage.getItem('tasks.collapsed') || '{}')
  };

  const app = document.getElementById('app');
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  const todayISO = () => new Date().toISOString().slice(0,10);
  const weekEndISO = () => { const d = new Date(); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); };

  async function boot(){
    const { data:{ session } } = await supa.auth.getSession();
    if (!session) return renderLogin();

    await loadAll();
    if (window.CC && window.CC.onSubtabChange) wireShell();
    else document.addEventListener('cc-shell-ready', wireShell, { once:true });
  }

  function wireShell(){
    window.CC.onSubtabChange(id => { STATE.subtab = id; render(); });
    STATE.subtab = window.CC.getSubtab() || 'open';
    render();
  }

  async function loadAll(){
    const [{ data:tasks }, { data:projects }, { data:categories }, { data:{ user } }] = await Promise.all([
      supa.from('tasks').select('*').order('sort_order').order('created_at', { ascending:false }),
      supa.from('projects').select('*').eq('archived', false).order('sort_order'),
      supa.from('categories').select('*').order('sort_order'),
      supa.auth.getUser()
    ]);
    STATE.tasks = tasks || [];
    STATE.projects = projects || [];
    STATE.categories = categories || [];
    STATE.user = user;
  }

  function filterTasks(){
    const t = STATE.tasks;
    if (STATE.subtab === 'open')    return t.filter(x => x.status !== 'done');
    if (STATE.subtab === 'done')    return t.filter(x => x.status === 'done');
    if (STATE.subtab === 'week')    return t.filter(x => x.status !== 'done' && x.due_date && x.due_date <= weekEndISO());
    if (STATE.subtab === 'overdue') return t.filter(x => x.status !== 'done' && x.due_date && x.due_date < todayISO());
    return t;
  }

  function groupByProject(tasks){
    const groups = { __inbox: { id:'__inbox', name:'Inbox', color:'#8b949e', tasks:[] } };
    STATE.projects.forEach(p => { groups[p.id] = { id:p.id, name:p.name, color:p.color||'#58a6ff', tasks:[] }; });
    tasks.forEach(t => {
      const key = t.project_id || '__inbox';
      if (!groups[key]) groups[key] = { id:key, name:'(unknown)', color:'#8b949e', tasks:[] };
      groups[key].tasks.push(t);
    });
    return Object.values(groups).filter(g => g.tasks.length > 0 || g.id !== '__inbox');
  }

  // â”€â”€â”€ RENDER â”€â”€â”€â”€
  function render(){
    const filtered = filterTasks();
    app.innerHTML = `
      <div class="toolbar">
        <div class="actions-group">
          <button class="btn" onclick="taskAdd()">+ Add Task</button>
          <button class="btn btn-ghost" onclick="projectAdd()">+ Add Project</button>
        </div>
        <div class="view-toggle">
          <button class="${STATE.view==='list'?'active':''}" onclick="setView('list')">List</button>
          <button class="${STATE.view==='kanban'?'active':''}" onclick="setView('kanban')">Kanban</button>
          <button class="${STATE.view==='detail'?'active':''}" onclick="setView('detail')">Detail</button>
        </div>
      </div>
      <div id="view-root"></div>`;
    const root = document.getElementById('view-root');
    if (STATE.view === 'list')   renderList(root, filtered);
    if (STATE.view === 'kanban') renderKanban(root, filtered);
    if (STATE.view === 'detail') renderDetail(root, filtered);
  }

  window.setView = (v) => { STATE.view = v; localStorage.setItem('tasks.view', v); render(); };

  // â”€â”€â”€ LIST VIEW â”€â”€â”€â”€
  function renderList(root, tasks){
    if (!tasks.length) return root.innerHTML = '<div class="empty">No tasks in this view.</div>';
    const groups = groupByProject(tasks);
    root.innerHTML = groups.map(g => {
      const collapsed = STATE.collapsedGroups[g.id] ? 'collapsed' : '';
      return `<div class="group ${collapsed}" data-group="${esc(g.id)}">
        <div class="group-head" onclick="toggleGroup('${esc(g.id)}')">
          <span class="dot" style="background:${esc(g.color)}"></span>
          <span class="name">${esc(g.name)}</span>
          <span class="meta">${g.tasks.length} task${g.tasks.length===1?'':'s'}</span>
          <span class="chev">â–¾</span>
        </div>
        <div class="group-body">${g.tasks.map(rowList).join('')}</div>
      </div>`;
    }).join('');
  }
  function rowList(t){
    const done = t.status === 'done';
    const dueClass = t.due_date && !done ? (t.due_date < todayISO() ? 'due-overdue' : (t.due_date === todayISO() ? 'due-today' : '')) : '';
    const projOpts = ['<option value="">â€” no project â€”</option>']
      .concat(STATE.projects.map(p=>`<option value="${esc(p.id)}"${t.project_id===p.id?' selected':''}>${esc(p.name)}</option>`))
      .join('');
    return `<div class="task-row ${done?'done':''}" data-id="${t.id}">
      <input type="checkbox" class="cb" ${done?'checked':''} onchange="taskToggleDone(${t.id}, this.checked)">
      <span class="title" contenteditable="false"
            onclick="this.setAttribute('contenteditable','true');this.focus()"
            onblur="taskInlineSave(${t.id}, 'title', this.textContent); this.setAttribute('contenteditable','false')"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(t.title||'(untitled)')}</span>
      <select onchange="taskInlineSave(${t.id}, 'priority', this.value)">
        <option value="high"${t.priority==='high'?' selected':''}>High</option>
        <option value="medium"${t.priority==='medium'?' selected':''}>Medium</option>
        <option value="low"${t.priority==='low'?' selected':''}>Low</option>
      </select>
      <input type="date" class="${dueClass}" value="${esc(t.due_date||'')}" onchange="taskInlineSave(${t.id}, 'due_date', this.value||null)">
      <select onchange="taskInlineSave(${t.id}, 'project_id', this.value||null)">${projOpts}</select>
      <button class="delete" onclick="taskDelete(${t.id})" title="Delete">Ã—</button>
    </div>`;
  }

  // â”€â”€â”€ KANBAN VIEW â”€â”€â”€â”€
  function renderKanban(root, tasks){
    const cols = [
      { id:'open',        label:'To Do' },
      { id:'in_progress', label:'In Progress' },
      { id:'done',        label:'Done' }
    ];
    root.innerHTML = `<div class="kanban">${cols.map(c => {
      const bucket = tasks.filter(t => t.status === c.id);
      return `<div class="kanban-col">
        <h3>${esc(c.label)} <span class="cnt">${bucket.length}</span></h3>
        ${bucket.map(t => kanCard(t)).join('') || '<div class="empty" style="padding:10px;font-size:0.85rem;">â€”</div>'}
      </div>`;
    }).join('')}</div>`;
  }
  function kanCard(t){
    const proj = STATE.projects.find(p=>p.id===t.project_id);
    return `<div class="kanban-card" onclick="taskDetail(${t.id})">
      <div class="t">${esc(t.title||'(untitled)')}</div>
      <div class="meta">
        ${proj ? `<span style="color:${esc(proj.color)};">â— ${esc(proj.name)}</span>` : '<span>Inbox</span>'}
        ${t.due_date ? `<span>${esc(t.due_date)}</span>` : ''}
        <span class="prio-${esc(t.priority||'medium')}">${esc((t.priority||'medium').toUpperCase())}</span>
        <select onclick="event.stopPropagation();" onchange="taskInlineSave(${t.id}, 'status', this.value)">
          <option value="open"${t.status==='open'?' selected':''}>To Do</option>
          <option value="in_progress"${t.status==='in_progress'?' selected':''}>In Progress</option>
          <option value="done"${t.status==='done'?' selected':''}>Done</option>
        </select>
      </div>
    </div>`;
  }

  // â”€â”€â”€ DETAIL VIEW â”€â”€â”€â”€
  function renderDetail(root, tasks){
    if (!tasks.length) return root.innerHTML = '<div class="empty">No tasks in this view.</div>';
    const groups = groupByProject(tasks);
    root.innerHTML = groups.map(g => `
      <div class="group">
        <div class="group-head"><span class="dot" style="background:${esc(g.color)}"></span><span class="name">${esc(g.name)}</span><span class="meta">${g.tasks.length}</span></div>
        <div class="group-body">${g.tasks.map(rowDetail).join('')}</div>
      </div>`).join('');
  }
  function rowDetail(t){
    const done = t.status==='done';
    const projOpts = ['<option value="">â€” no project â€”</option>']
      .concat(STATE.projects.map(p=>`<option value="${esc(p.id)}"${t.project_id===p.id?' selected':''}>${esc(p.name)}</option>`)).join('');
    return `<div class="detail-card" data-id="${t.id}">
      <h3>
        <input type="checkbox" ${done?'checked':''} onchange="taskToggleDone(${t.id}, this.checked)">
        <span contenteditable="true" onblur="taskInlineSave(${t.id}, 'title', this.textContent)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(t.title||'(untitled)')}</span>
      </h3>
      <div class="body" contenteditable="true"
        onblur="taskInlineSave(${t.id}, 'notes', this.textContent)">${esc(t.notes||'')}</div>
      <div class="fields">
        <label>Priority
          <select onchange="taskInlineSave(${t.id}, 'priority', this.value)">
            <option value="high"${t.priority==='high'?' selected':''}>High</option>
            <option value="medium"${t.priority==='medium'?' selected':''}>Medium</option>
            <option value="low"${t.priority==='low'?' selected':''}>Low</option>
          </select>
        </label>
        <label>Status
          <select onchange="taskInlineSave(${t.id}, 'status', this.value)">
            <option value="open"${t.status==='open'?' selected':''}>To Do</option>
            <option value="in_progress"${t.status==='in_progress'?' selected':''}>In Progress</option>
            <option value="done"${t.status==='done'?' selected':''}>Done</option>
          </select>
        </label>
        <label>Due <input type="date" value="${esc(t.due_date||'')}" onchange="taskInlineSave(${t.id}, 'due_date', this.value||null)"></label>
        <label>Project <select onchange="taskInlineSave(${t.id}, 'project_id', this.value||null)">${projOpts}</select></label>
        <button class="btn btn-danger" style="margin-left:auto;" onclick="taskDelete(${t.id})">Delete</button>
      </div>
    </div>`;
  }

  // â”€â”€â”€ ACTIONS â”€â”€â”€â”€
  window.toggleGroup = function(id){
    STATE.collapsedGroups[id] = !STATE.collapsedGroups[id];
    localStorage.setItem('tasks.collapsed', JSON.stringify(STATE.collapsedGroups));
    render();
  };

  window.taskInlineSave = async function(id, field, value){
    const before = STATE.tasks.find(t=>t.id===id);
    if (before && before[field] === value) return;
    // optimistic
    if (before) before[field] = value;
    const { error } = await supa.from('tasks').update({ [field]: value }).eq('id', id);
    if (error) { alert('Save failed: ' + error.message); await loadAll(); render(); }
  };

  window.taskToggleDone = async function(id, checked){
    const next = checked ? 'done' : 'open';
    const patch = { status: next, completed_at: checked ? new Date().toISOString() : null };
    const t = STATE.tasks.find(x=>x.id===id);
    if (t) Object.assign(t, patch);
    render();
    const { error } = await supa.from('tasks').update(patch).eq('id', id);
    if (error) { alert('Failed: '+error.message); await loadAll(); render(); }
  };

  window.taskDelete = async function(id){
    if (!confirm('Delete this task?')) return;
    const { error } = await supa.from('tasks').delete().eq('id', id);
    if (error) return alert(error.message);
    STATE.tasks = STATE.tasks.filter(t=>t.id!==id);
    render();
  };

  window.taskAdd = function(){
    const projOpts = ['<option value="">â€” no project â€”</option>']
      .concat(STATE.projects.map(p=>`<option value="${esc(p.id)}">${esc(p.name)}</option>`)).join('');
    showModal('New Task', `
      <input id="m-title" placeholder="What needs doing?" autofocus>
      <textarea id="m-notes" placeholder="Notes (optional)"></textarea>
      <div class="row">
        <select id="m-prio"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
        <input id="m-due" type="date">
      </div>
      <select id="m-proj">${projOpts}</select>
    `, async ()=>{
      const title = document.getElementById('m-title').value.trim();
      if (!title) return;
      const payload = {
        title,
        notes: document.getElementById('m-notes').value || null,
        priority: document.getElementById('m-prio').value,
        due_date: document.getElementById('m-due').value || null,
        project_id: document.getElementById('m-proj').value || null,
        status: 'open'
      };
      const { data, error } = await supa.from('tasks').insert(payload).select().single();
      if (error) return alert(error.message);
      STATE.tasks.unshift(data);
      closeModal(); render();
    });
  };

  window.projectAdd = function(){
    showModal('New Project', `
      <input id="m-name" placeholder="Project name" autofocus>
      <div class="row">
        <input id="m-icon" placeholder="Icon (optional, e.g. ðŸ”¨)">
        <input id="m-color" type="color" value="#58a6ff" style="height:42px;padding:4px;">
      </div>
    `, async ()=>{
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      const payload = {
        name,
        icon: document.getElementById('m-icon').value || null,
        color: document.getElementById('m-color').value
      };
      const { data, error } = await supa.from('projects').insert(payload).select().single();
      if (error) return alert(error.message);
      STATE.projects.push(data);
      closeModal(); render();
    });
  };

  window.taskDetail = function(id){
    // Switch to detail view and scroll to task
    STATE.view = 'detail';
    localStorage.setItem('tasks.view', 'detail');
    render();
    setTimeout(() => {
      const el = document.querySelector(`.detail-card[data-id="${id}"]`);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 50);
  };

  // â”€â”€â”€ LOGIN â”€â”€â”€â”€
  function renderLogin(){
    app.innerHTML = `
      <div class="login-shell">
        <h2>Sign in to Command Centre</h2>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" autocomplete="username" required>
          <input type="password" id="pw" placeholder="Password" autocomplete="current-password" required>
          <button type="submit" class="btn" style="width:100%;padding:10px;">Sign in</button>
          <div class="login-msg" id="login-msg"></div>
        </form>
      </div>`;
    document.getElementById('login-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pw').value;
      const msg = document.getElementById('login-msg');
      msg.textContent = 'Signing inâ€¦';
      const { error } = await supa.auth.signInWithPassword({ email, password });
      if (error) { msg.textContent = error.message; return; }
      location.reload();
    });
  }

  // â”€â”€â”€ MODAL â”€â”€â”€â”€
  function showModal(title, bodyHtml, onSave){
    const bd = document.createElement('div');
    bd.className = 'modal-backdrop';
    bd.innerHTML = `<div class="modal"><h3>${esc(title)}</h3>${bodyHtml}
      <div class="actions"><button class="btn btn-ghost" id="m-cancel">Cancel</button><button class="btn" id="m-save">Save</button></div></div>`;
    document.body.appendChild(bd);
    document.getElementById('m-cancel').onclick = closeModal;
    document.getElementById('m-save').onclick = onSave;
    bd.addEventListener('click', e=>{ if(e.target===bd) closeModal(); });
  }
  function closeModal(){ const bd = document.querySelector('.modal-backdrop'); if (bd) bd.remove(); }
  window.closeModal = closeModal;

  boot();
})();
</script>
</body>
</html>
