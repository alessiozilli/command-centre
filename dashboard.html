<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://twrlvnfszohyrmivdhre.supabase.co wss://twrlvnfszohyrmivdhre.supabase.co; img-src 'self' data: https:;">
  <title>Dashboard — AZCK Command Centre</title>
  <link rel="icon" type="image/svg+xml" href="assets/az-sigil.svg">
  <link rel="stylesheet" href="cc-shell.css">

  <!-- GridStack CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">

  <script defer src="auth.js"></script>
  <script>
    window.PAGE = {
      id: 'dashboard',
      title: 'Dashboard',
      group: 'HOME',
      views: [
        { id: 'view', label: 'View' },
        { id: 'edit', label: 'Edit' }
      ],
      activeView: 'view',
      actions: [
        { label: 'Reset layout', variant: 'ghost', onClick: 'dash_resetLayout' }
      ]
    };
  </script>
  <script defer src="cc-shell.js"></script>

  <!-- Supabase UMD client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- GridStack JS (with jQuery-free HTML5 drag) -->
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>

  <style>
    /* ─── Dashboard-scoped styles ──────────────────────────── */
    .dash-wrap { max-width: 1280px; margin: 1.25rem auto 3rem; padding: 0 1rem; }

    /* GridStack overrides to match CC dark theme */
    .grid-stack { background: transparent; }
    .grid-stack-item-content {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      color: #e6edf3;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    /* Edit-mode affordances */
    .grid-stack.dash-edit .grid-stack-item-content {
      border-color: #58a6ff;
      cursor: move;
    }
    .grid-stack.dash-edit .grid-stack-item-content::before {
      content: "✥ drag · resize bottom-right";
      position: absolute; top: 6px; right: 10px;
      font-size: 0.65rem; color: #58a6ff; opacity: 0.6;
      pointer-events: none;
    }

    /* Widget header */
    .w-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem; margin: 0; padding-bottom: 0.4rem;
      border-bottom: 1px solid #21262d;
    }
    .w-head .w-title {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: #8b949e; margin: 0;
    }
    .w-head .w-tag {
      font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: #58a6ff; background: rgba(88,166,255,0.1);
      padding: 2px 6px; border-radius: 3px;
    }
    .w-body { flex: 1; overflow: auto; font-size: 0.88rem; color: #c9d1d9; min-height: 0; }
    .w-body .empty { color: #6e7681; font-style: italic; text-align: center; padding: 1.2rem 0.5rem; font-size: 0.82rem; }
    .w-body .err   { color: #f85149; font-size: 0.78rem; padding: 0.6rem; background: rgba(248,81,73,0.08); border-radius: 4px; }

    /* Hero stats — inline grid in one widget */
    .hero-inline { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.8rem; }
    .hero-cell { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 0.7rem 0.85rem; }
    .hero-cell .lbl { color: #8b949e; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .hero-cell .val { color: #e6edf3; font-size: 1.35rem; font-weight: 600; line-height: 1.1; }
    .hero-cell .sub { color: #6e7681; font-size: 0.72rem; margin-top: 0.2rem; }

    /* Task rows */
    .task-li { display: flex; align-items: center; gap: 0.55rem; padding: 0.35rem 0; border-top: 1px solid #21262d; font-size: 0.85rem; }
    .task-li:first-child { border-top: none; }
    .task-li .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .task-li .t { flex: 1; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-li .due { color: #8b949e; font-size: 0.72rem; flex: none; }
    .task-li .due.overdue { color: #f85149; }
    .task-li .due.today { color: #d29922; }

    /* Forge Status */
    .forge-ver { font-size: 1.2rem; font-weight: 600; color: #e6edf3; }
    .forge-sub { color: #8b949e; font-size: 0.82rem; }
    .forge-ring { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; background: rgba(88,166,255,0.1); color: #58a6ff; margin-top: 0.3rem; }

    /* Radar canvas */
    .radar-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
    .radar-wrap svg { max-width: 100%; max-height: 100%; }

    /* Quick Links */
    .ql-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .ql-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.55rem; background: #0d1117; border: 1px solid #21262d; border-radius: 5px; color: #e6edf3; text-decoration: none; font-size: 0.85rem; }
    .ql-item:hover { border-color: #58a6ff; }
    .ql-item .remove { color: #6e7681; font-size: 1rem; margin-left: auto; cursor: pointer; display: none; background: none; border: none; padding: 0; }
    body.dash-edit-mode .ql-item .remove { display: inline; }
    .ql-add { display: none; flex-direction: column; gap: 0.3rem; margin-top: 0.4rem; }
    body.dash-edit-mode .ql-add { display: flex; }
    .ql-add input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 5px 8px; border-radius: 4px; font-size: 0.82rem; }
    .ql-add button { background: #238636; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.82rem; }

    /* Meter bar (Usage / Finance) */
    .meter { background: #0d1117; border: 1px solid #21262d; border-radius: 5px; height: 10px; overflow: hidden; margin: 0.4rem 0; }
    .meter-fill { height: 100%; background: linear-gradient(90deg, #3fb950, #d29922, #f85149); transition: width 0.3s; }
    .meter-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: #8b949e; }

    /* Placeholder widgets */
    .placeholder-center {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; text-align: center; padding: 1rem;
    }
    .placeholder-center .icon { font-size: 1.8rem; opacity: 0.5; }
    .placeholder-center .msg { color: #8b949e; font-size: 0.85rem; }
    .placeholder-center .note { color: #6e7681; font-size: 0.72rem; }

    /* Sign-in prompt (when no Supabase session) */
    .signin-prompt { color: #8b949e; font-size: 0.82rem; }
    .signin-prompt a { color: #58a6ff; text-decoration: none; }
    .signin-prompt a:hover { text-decoration: underline; }

    /* Calendar widget footer */
    .cal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.4rem; padding-top: 0.4rem; border-top: 1px solid #21262d; font-size: 0.72rem; }
    .cal-footer a { color: #58a6ff; text-decoration: none; }
    .cal-footer a:hover { text-decoration: underline; }
    .sync-pill { font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; font-weight: 600; cursor: help; }
    .sync-pill.ok   { background: rgba(63,185,80,0.12);  color: #3fb950; border: 1px solid rgba(63,185,80,0.25); }
    .sync-pill.soft { background: rgba(210,153,34,0.10); color: #d29922; border: 1px solid rgba(210,153,34,0.25); }
    .sync-pill.warn { background: rgba(248,81,73,0.12);  color: #f85149; border: 1px solid rgba(248,81,73,0.30); }
  </style>
</head>
<body>
  <main class="dash-wrap">
    <div class="grid-stack" id="dash-grid"></div>
  </main>

  <script>
  (function(){
    'use strict';

    // ─── Config ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://twrlvnfszohyrmivdhre.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmx2bmZzem9oeXJtaXZkaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NjkxMTMsImV4cCI6MjA5MDE0NTExM30.o96DFNbBObst0EAmX51rnRFXzu8oTN1o-HNAxN7MY8A';
    const LS_LAYOUT = 'cc.dashboard.layout.v1';
    const LS_LINKS  = 'cc.dashboard.quickLinks.v1';

    const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { storageKey: 'sb-twrlvnfszohyrmivdhre-auth-token', persistSession: true, autoRefreshToken: true }
    });
    window.supa = supa;

    const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    const todayISO = () => new Date().toISOString().slice(0,10);
    const daysLeftInMonth = () => {
      const n = new Date();
      const last = new Date(n.getFullYear(), n.getMonth()+1, 0).getDate();
      return last - n.getDate();
    };

    // ─── Widget registry + default layout (12-col grid) ──────
    const WIDGETS = {
      hero:     { title: 'Hero Stats',       tag: 'LIVE',     pos: { x:0,  y:0,  w:12, h:2 } },
      tasks:    { title: "Today's Tasks",    tag: 'LIVE',     pos: { x:0,  y:2,  w:6,  h:4 } },
      forge:    { title: 'Forge Status',     tag: 'LIVE',     pos: { x:6,  y:2,  w:6,  h:4 } },
      roadmap:  { title: 'Roadmap · Active', tag: 'LIVE',     pos: { x:0,  y:6,  w:6,  h:4 } },
      usage:    { title: 'Usage Meter',      tag: 'STATIC',   pos: { x:6,  y:6,  w:6,  h:4 } },
      radar:    { title: 'Forge Radar',      tag: 'LIVE',     pos: { x:0,  y:10, w:4,  h:5 } },
      calendar: { title: 'Upcoming Events',  tag: 'LIVE',     pos: { x:4,  y:10, w:4,  h:5 } },
      finance:  { title: 'Finance Snapshot', tag: 'STATIC',   pos: { x:8,  y:10, w:4,  h:5 } },
      links:    { title: 'Quick Links',      tag: 'LOCAL',    pos: { x:0,  y:15, w:6,  h:4 } },
      buildProgress:    { title: 'Build Progress',   tag: 'LIVE', pos: { x:6, y:15, w:6, h:4 } },
      timeLog:          { title: 'Time Log',          tag: 'LIVE', pos: { x:0, y:19, w:4, h:5 } },
      agentMsgs:        { title: 'Agent Messages',    tag: 'LIVE', pos: { x:4, y:19, w:4, h:5 } },
      usageTracker:     { title: 'Usage Tracker',     tag: 'LIVE', pos: { x:8, y:19, w:4, h:5 } },
      shopWip:          { title: 'Shop WIP',          tag: 'LIVE', pos: { x:0, y:24, w:6, h:5 } },
      customerPipeline: { title: 'Customer Pipeline', tag: 'LIVE', pos: { x:6, y:24, w:6, h:5 } }
    };
    const WIDGET_ORDER = ['hero','tasks','forge','roadmap','usage','radar','calendar','finance','links','buildProgress','timeLog','agentMsgs','usageTracker','shopWip','customerPipeline'];

    // ─── LocalStorage helpers ────────────────────────────────
    const readLS = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; } };
    const writeLS = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };
    const getSavedLayout = () => readLS(LS_LAYOUT, null);
    function saveLayout() {
      if (!window.dashGrid) return;
      const items = window.dashGrid.save(false);
      writeLS(LS_LAYOUT, items);
    }

    // ─── GridStack init ──────────────────────────────────────
    let grid = null;

    function buildWidgetEl(id) {
      const def = WIDGETS[id];
      const saved = getSavedLayout();
      const layoutItem = saved ? saved.find(it => it.id === id) : null;
      const pos = layoutItem || def.pos;

      const wrap = document.createElement('div');
      wrap.className = 'grid-stack-item';
      wrap.setAttribute('gs-id', id);
      wrap.setAttribute('gs-x', pos.x); wrap.setAttribute('gs-y', pos.y);
      wrap.setAttribute('gs-w', pos.w); wrap.setAttribute('gs-h', pos.h);
      wrap.setAttribute('gs-min-w', 3); wrap.setAttribute('gs-min-h', 2);

      const content = document.createElement('div');
      content.className = 'grid-stack-item-content';
      content.innerHTML = `
        <div class="w-head">
          <span class="w-title">${esc(def.title)}</span>
          <span class="w-tag">${esc(def.tag)}</span>
        </div>
        <div class="w-body" id="w-body-${id}"><div class="empty">Loading…</div></div>`;
      wrap.appendChild(content);
      return wrap;
    }

    function initGrid() {
      const container = document.getElementById('dash-grid');
      WIDGET_ORDER.forEach(id => container.appendChild(buildWidgetEl(id)));

      grid = GridStack.init({
        column: 12,
        cellHeight: 60,
        margin: 8,
        float: false,
        animate: true,
        handle: '.grid-stack-item-content',
        resizable: { handles: 'se' },
        staticGrid: true // start locked (View mode)
      }, '#dash-grid');
      window.dashGrid = grid;

      grid.on('change', saveLayout);
      grid.on('resizestop', saveLayout);
    }

    // ─── Edit/View toggle ────────────────────────────────────
    function applyViewMode(mode) {
      const container = document.getElementById('dash-grid');
      const isEdit = mode === 'edit';
      if (grid) grid.setStatic(!isEdit);
      container.classList.toggle('dash-edit', isEdit);
      document.body.classList.toggle('dash-edit-mode', isEdit);
    }

    // ─── Helpers ─────────────────────────────────────────────
    function setBody(id, html) {
      const el = document.getElementById('w-body-' + id);
      if (el) el.innerHTML = html;
    }
    async function hasSession() {
      const { data:{ session } } = await supa.auth.getSession();
      return !!session;
    }
    function signinPrompt() {
      return `<div class="signin-prompt">Sign in on <a href="alessio.html">tasks</a> or <a href="shared.html">shared</a> first to see live data.</div>`;
    }

    // ─── Widget: Hero Stats (10) ─────────────────────────────
    async function mountHero() {
      const signed = await hasSession();
      let myTasks = '—', roadActive = '—';
      let forgeVer = 'v0.9.7', forgeName = 'The Road';

      if (signed) {
        try {
          const { count } = await supa.from('tasks').select('id', { count:'exact', head:true }).neq('status','done');
          if (count != null) myTasks = count;
        } catch(e) {}
        try {
          const { count } = await supa.from('roadmap').select('id', { count:'exact', head:true }).in('status', ['pending','future']);
          if (count != null) roadActive = count;
        } catch(e) {}
      }
      try {
        const fd = await fetch('forge-data.json', { cache:'no-cache' }).then(r=>r.json());
        if (fd && fd.versions && fd.versions.length) {
          const last = fd.versions[fd.versions.length - 1];
          forgeVer = last.version; forgeName = last.name;
        }
      } catch(e) {}

      setBody('hero', `
        <div class="hero-inline">
          <div class="hero-cell">
            <div class="lbl">My open tasks</div>
            <div class="val">${esc(myTasks)}</div>
            <div class="sub">${signed ? 'Live · all except done' : 'Sign in required'}</div>
          </div>
          <div class="hero-cell">
            <div class="lbl">Roadmap · active</div>
            <div class="val">${esc(roadActive)}</div>
            <div class="sub">${signed ? 'Status = active' : 'Sign in required'}</div>
          </div>
          <div class="hero-cell">
            <div class="lbl">Forge version</div>
            <div class="val">${esc(forgeVer)}</div>
            <div class="sub">${esc(forgeName)}</div>
          </div>
          <div class="hero-cell">
            <div class="lbl">This month spend</div>
            <div class="val">—</div>
            <div class="sub">$280 CAD ceiling</div>
          </div>
        </div>`);
    }

    // ─── Widget: Today's Tasks (1) ───────────────────────────
    async function mountTasks() {
      if (!(await hasSession())) { setBody('tasks', signinPrompt()); return; }
      try {
        const { data, error } = await supa.from('tasks')
          .select('id,title,priority,due_date,status')
          .neq('status','done')
          .order('due_date', { ascending:true, nullsFirst:false })
          .limit(8);
        if (error) throw error;
        if (!data || !data.length) { setBody('tasks', '<div class="empty">Nothing open. 🎯</div>'); return; }
        const today = todayISO();
        const rows = data.map(t => {
          let dueClass = '', dueTxt = '—';
          if (t.due_date) {
            dueTxt = t.due_date;
            if (t.due_date < today) dueClass = 'overdue';
            else if (t.due_date === today) dueClass = 'today';
          }
          const dotColor = t.priority==='high' ? '#f85149' : t.priority==='low' ? '#3fb950' : '#d29922';
          return `<div class="task-li">
            <span class="dot" style="background:${dotColor}"></span>
            <span class="t">${esc(t.title||'(untitled)')}</span>
            <span class="due ${dueClass}">${esc(dueTxt)}</span>
          </div>`;
        }).join('');
        setBody('tasks', rows + `<div style="margin-top:0.5rem;"><a href="alessio.html" style="color:#58a6ff;font-size:0.78rem;text-decoration:none;">Open full list →</a></div>`);
      } catch(e) {
        setBody('tasks', `<div class="err">Load failed: ${esc(e.message||e)}</div>`);
      }
    }

    // ─── Widget: Forge Status (3) ────────────────────────────
    async function mountForge() {
      try {
        const fd = await fetch('forge-data.json', { cache:'no-cache' }).then(r=>r.json());
        if (!fd || !fd.versions || !fd.versions.length) { setBody('forge', '<div class="empty">No Forge data</div>'); return; }
        const last = fd.versions[fd.versions.length - 1];
        const scores = last.scores || [];
        const nonZero = scores.filter(s => s > 0);
        const min = nonZero.length ? Math.min(...nonZero) : 0;
        const max = scores.length ? Math.max(...scores) : 0;
        const avg = nonZero.length ? (nonZero.reduce((a,b)=>a+b,0) / nonZero.length).toFixed(1) : '—';
        const ringName = min >= 51 ? 'Heirloom' : min >= 41 ? 'Finished' : min >= 31 ? 'Heat Treated' : min >= 21 ? 'Ground' : min >= 11 ? 'Forged' : 'Raw Steel';
        setBody('forge', `
          <div>
            <div class="forge-ver">${esc(last.version)} — ${esc(last.name)}</div>
            <div class="forge-sub">${esc(last.desc || '')}</div>
            <div class="forge-ring">Ring: ${esc(ringName)} · Weakest link rule</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-top:0.6rem;">
            <div class="hero-cell"><div class="lbl">Min</div><div class="val" style="font-size:1.1rem;">${min}</div></div>
            <div class="hero-cell"><div class="lbl">Avg</div><div class="val" style="font-size:1.1rem;">${avg}</div></div>
            <div class="hero-cell"><div class="lbl">Max</div><div class="val" style="font-size:1.1rem;">${max}</div></div>
          </div>
          <div style="margin-top:0.5rem;"><a href="forge.html" style="color:#58a6ff;font-size:0.78rem;text-decoration:none;">Open Forge chart →</a></div>`);
      } catch(e) {
        setBody('forge', `<div class="err">Load failed: ${esc(e.message||e)}</div>`);
      }
    }

    // ─── Widget: Forge Radar (4) — inline SVG ────────────────
    async function mountRadar() {
      try {
        const fd = await fetch('forge-data.json', { cache:'no-cache' }).then(r=>r.json());
        if (!fd || !fd.versions || !fd.versions.length) { setBody('radar', '<div class="empty">No Forge data</div>'); return; }
        const last = fd.versions[fd.versions.length - 1];
        const metrics = fd.metrics || [];
        const scores = last.scores || [];
        const n = Math.min(metrics.length, scores.length);
        if (!n) { setBody('radar', '<div class="empty">No scores</div>'); return; }

        const bodyEl = document.getElementById('w-body-radar');
        const W = Math.max(180, bodyEl.clientWidth - 20), H = Math.max(180, bodyEl.clientHeight - 40);
        const size = Math.min(W, H);
        const cx = size/2, cy = size/2, R = size/2 - 22;
        const max = 10;

        let gridRings = '';
        for (let r=1; r<=5; r++) {
          const pr = R * (r/5);
          let pts = [];
          for (let i=0; i<n; i++) {
            const ang = -Math.PI/2 + (2*Math.PI*i/n);
            pts.push(`${(cx + pr*Math.cos(ang)).toFixed(1)},${(cy + pr*Math.sin(ang)).toFixed(1)}`);
          }
          gridRings += `<polygon points="${pts.join(' ')}" fill="none" stroke="#21262d" stroke-width="1"/>`;
        }
        let axes = '', labels = '', polyPts = [];
        for (let i=0; i<n; i++) {
          const ang = -Math.PI/2 + (2*Math.PI*i/n);
          const xE = cx + R*Math.cos(ang), yE = cy + R*Math.sin(ang);
          axes += `<line x1="${cx}" y1="${cy}" x2="${xE.toFixed(1)}" y2="${yE.toFixed(1)}" stroke="#21262d" stroke-width="1"/>`;
          const pr = R * (Math.min(scores[i], max)/max);
          polyPts.push(`${(cx + pr*Math.cos(ang)).toFixed(1)},${(cy + pr*Math.sin(ang)).toFixed(1)}`);
          const lx = cx + (R+14)*Math.cos(ang), ly = cy + (R+14)*Math.sin(ang);
          const lbl = metrics[i].length > 10 ? metrics[i].slice(0,9)+'…' : metrics[i];
          labels += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#8b949e">${esc(lbl)}</text>`;
        }
        const nonZero = scores.filter(s=>s>0);
        const svg = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
          ${gridRings}${axes}

          <div class="icon">📊</div>
          <div class="msg">Usage data lives on the Usage page.</div>

    // ─── Widget: Calendar (reads calendar_events synced from Google) ────
    async function mountCalendar() {
      try {
        const nowIso = new Date().toISOString();
        const { data, error } = await supa.from('calendar_events')
          .select('id,summary,description,start_time,end_time,all_day,html_link,synced_at')
          .gte('end_time', nowIso)
          .order('start_time', { ascending: true })
          .limit(12);
        if (error) throw error;

        const calLink = 'https://calendar.google.com/calendar/u/0/r/week';
        const freshness = (rows) => {
          const stamps = (rows || []).map(r => r.synced_at).filter(Boolean).sort();
          if (!stamps.length) return '';
          const last = new Date(stamps[stamps.length - 1]);
          const mins = Math.floor((Date.now() - last.getTime()) / 60000);
          let label;
          if (mins < 1)        label = 'just now';
          else if (mins < 60)  label = mins + 'm ago';
          else if (mins < 1440) label = Math.floor(mins/60) + 'h ago';
          else                  label = Math.floor(mins/1440) + 'd ago';
          const cls = mins > 1440 ? 'warn' : (mins > 360 ? 'soft' : 'ok');
          return `<span class="sync-pill ${cls}" title="Last synced: ${last.toLocaleString()}">⟳ ${label}</span>`;
        };

        if (!data || !data.length) {
          setBody('calendar', `<div class="placeholder-center">
            <div class="icon">📅</div>
            <div class="msg">No upcoming events.</div>
            <div class="note"><a href="${calLink}" target="_blank" style="color:#58a6ff;">Open Google Calendar →</a></div>
          </div>`);
          return;
        }

        const today = new Date(); today.setHours(0,0,0,0);
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        const toLocalDate = (iso) => { const d = new Date(iso); d.setHours(0,0,0,0); return d; };
        const dateLabel = (d) => {
          if (d.getTime() === today.getTime()) return 'TODAY';
          if (d.getTime() === tomorrow.getTime()) return 'TOMORROW';
          return d.toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric' });
        };
        const timeLabel = (iso) => new Date(iso).toLocaleTimeString('en-CA', { hour:'numeric', minute:'2-digit', hour12:true });
        const dotFor = (summary) => {
          const s = (summary || '').toLowerCase();
          if (s.startsWith('shop')) return '#f0883e';
          if (s.includes('forge')) return '#bc8cff';
          if (s.includes('personal ai')) return '#58a6ff';
          if (s.includes('family')) return '#3fb950';
          if (s.includes('invoice')) return '#d29922';
          return '#8b949e';
        };

        const buckets = new Map();
        data.forEach(ev => {
          const d = toLocalDate(ev.start_time);
          const key = d.getTime();
          if (!buckets.has(key)) buckets.set(key, { label: dateLabel(d), events: [] });
          buckets.get(key).events.push(ev);
        });

        const sections = Array.from(buckets.values()).map(b => {
          const rows = b.events.map(ev => {
            const time = ev.all_day ? 'all day' : timeLabel(ev.start_time);
            const link = ev.html_link || calLink;
            return `<div class="task-li" style="cursor:pointer;" onclick="window.open('${esc(link)}','_blank')">
              <span class="dot" style="background:${dotFor(ev.summary)}"></span>
              <span class="t">${esc(ev.summary || '(untitled)')}</span>
              <span class="due">${esc(time)}</span>
            </div>`;
          }).join('');
          return `<div style="margin-bottom:0.6rem;">
            <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.08em;color:#58a6ff;margin-bottom:0.25rem;">${esc(b.label)}</div>
            ${rows}
          </div>`;
        }).join('');

        const footer = `<div class="cal-footer">
          <a href="${calLink}" target="_blank">Open full calendar →</a>
          ${freshness(data)}
        </div>`;
        setBody('calendar', sections + footer);
      } catch(e) {
        setBody('calendar', `<div class="err">Load failed: ${esc(e.message||e)}</div>`);
      }
    }

    function mountLinks() { renderLinks(); return Promise.resolve(); }

    // ─── Reset layout action ─────────────────────────────────
    window.dash_resetLayout = function() {
      if (!confirm('Reset dashboard layout to default? This only affects this device.')) return;
      localStorage.removeItem(LS_LAYOUT);
      location.reload();
    };

    const mountFns = {
      hero: mountHero, tasks: mountTasks, forge: mountForge, roadmap: mountRoadmap,
      usage: mountUsage, radar: mountRadar, calendar: mountCalendar, finance: mountFinance,
      links: mountLinks, buildProgress: mountBuildProgress,
      timeLog: mountTimeLog, agentMsgs: mountAgentMsgs, usageTracker: mountUsageTracker,
      shopWip: mountShopWip, customerPipeline: mountCustomerPipeline
    };

    // ─── Boot ────────────────────────────────────────────────
    function boot() {
      if (!window.GridStack) { console.error('GridStack not loaded'); return; }
      if (!window.supabase)  { console.error('Supabase not loaded'); return; }

      initGrid();
      WIDGET_ORDER.forEach(id => {
        try { mountFns[id](); } catch(e) { setBody(id, `<div class="err">${esc(e.message||e)}</div>`); }
      });

      function wireShell() {
        if (window.CC && window.CC.onViewChange) window.CC.onViewChange(applyViewMode);
        if (window.CC && window.CC.registerAction) window.CC.registerAction('dash_resetLayout', window.dash_resetLayout);
      }
      if (window.CC && window.CC.onViewChange) wireShell();
      else document.addEventListener('cc-shell-ready', wireShell, { once:true });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  })();
  </script>
