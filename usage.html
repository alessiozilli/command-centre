     ENGINE — DO NOT EDIT BELOW

<div id="app"></div>

<script>
(function(){
  /* === HELPERS === */
  function $(id){ return document.getElementById(id); }
  function sum(a,k){ return a.reduce(function(s,x){ return s+(x[k]||0); },0); }
  function fmt(n){ return n.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtK(n){ return n>=1000?(n/1000).toFixed(1)+'M':n+'K'; }
  function pctClass(p){ return p<60?'':p<85?'warn':'danger'; }
  function pctBgClass(p){ return p<60?'':p<85?'warn-bg':'danger-bg'; }
  function valClass(p){ return p<60?'green':p<85?'warn':'danger'; }
  function tagHTML(tags){
    return (tags||[]).map(function(t){ return '<span class="tag tag-'+t+'">'+t+'</span>'; }).join('');
  }
  function statusDot(s){
    var c=s==='active'?'status-active':s==='parked'?'status-parked':'status-free';
    return '<span class="status-dot '+c+'"></span>';
  }

  var D = DATA;
  var P = D.plan;
  var S = D.sessions;
  var V = D.versions;

  /* === COMPUTED === */
  var totalCost = sum(S,'estCostCAD');
  var totalTurns = sum(S,'turns');
  var totalTokensInK = sum(S,'tokensInK');
  var totalTokensOutK = sum(S,'tokensOutK');
  var totalTokensCachedK = sum(S,'tokensCachedK');
  var totalSessions = S.length;
  var pctUsed = Math.min((totalCost/P.costCAD)*100,100);
  var remaining = P.costCAD - totalCost;

  /* days in month calc */
  var now = new Date();
  var daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  var dayOfMonth = now.getDate();
  var daysLeft = daysInMonth - dayOfMonth;
  var dailyBudget = daysLeft > 0 ? remaining / daysLeft : 0;

  /* per-project */
  var projects = {};
  S.forEach(function(s){
    if(!projects[s.project]) projects[s.project]={sessions:0,turns:0,costCAD:0,tokensK:0};
    var p=projects[s.project];
    p.sessions++; p.turns+=s.turns; p.costCAD+=s.estCostCAD;
    p.tokensK+=(s.tokensInK||0)+(s.tokensOutK||0)+(s.tokensCachedK||0);
  });

  /* per-model */
  var models = {};
  S.forEach(function(s){
    if(!models[s.model]) models[s.model]={sessions:0,costCAD:0};
    models[s.model].sessions++; models[s.model].costCAD+=s.estCostCAD;
  });

  /* per-day */
  var dailyMap = {};
  S.forEach(function(s){
    if(!dailyMap[s.date]) dailyMap[s.date]=0;
    dailyMap[s.date]+=s.estCostCAD;
  });
  var dailyDates = Object.keys(dailyMap).sort();
  var dailyCosts = dailyDates.map(function(d){ return dailyMap[d]; });
  var cumCosts=[]; var run=0;
  dailyCosts.forEach(function(c){ run+=c; cumCosts.push(run); });

  /* weekly grouping */
  function getWeek(dateStr){
    var d=new Date(dateStr+'T12:00:00');
    var jan1=new Date(d.getFullYear(),0,1);
    return 'W'+Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  }
  var weeklyMap={};
  S.forEach(function(s){
    var w=getWeek(s.date);
    if(!weeklyMap[w]) weeklyMap[w]={cost:0,turns:0,sessions:0,tokensK:0};
    weeklyMap[w].cost+=s.estCostCAD; weeklyMap[w].turns+=s.turns;
    weeklyMap[w].sessions++; weeklyMap[w].tokensK+=(s.tokensInK||0)+(s.tokensOutK||0);
  });
  var weeks=Object.keys(weeklyMap).sort();

  /* projection: avg daily spend → projected month-end */
  var activeDays = dailyDates.length || 1;
  var avgDailySpend = totalCost / activeDays;
  var projectedMonthEnd = totalCost + (avgDailySpend * daysLeft);
  var projOnTrack = projectedMonthEnd <= P.costCAD;

  /* CB version: current */
  var currentCB = V[V.length-1];

  /* === BUILD HTML === */
  var H = '';

  /* --- TABS --- */
  H += '<div class="tab-bar">';
  H += '<button class="tab-btn active" onclick="showTab(\'usage\')">Usage</button>';
  H += '<button class="tab-btn" onclick="showTab(\'versions\')">Brain Versions</button>';
  H += '<button class="tab-btn" onclick="showTab(\'files\')">File Registry</button>';
  H += '<button class="tab-btn" onclick="showTab(\'platforms\')">Platforms</button>';
  H += '<button class="tab-btn" onclick="showTab(\'protocols\')">Protocol Costs</button>';
  H += '<button class="tab-btn" onclick="showTab(\'tips\')">Efficiency</button>';
  H += '</div>';

  /* ============================================================
     TAB 1: USAGE
     ============================================================ */

    var pDatasets=D.protocols.map(function(p,i){
      return {
        label:p.cbVersion,
        data:protoKeys.map(function(k){return p[k].costCAD;}),
        backgroundColor:pColors[i]+'66',borderColor:pColors[i],borderWidth:1,borderRadius:4
      };
    });
    new Chart($('protocolChart'), {
      type:'bar',
      data:{ labels:protoKeys.map(function(k){return protoLabels[k];}), datasets:pDatasets },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#8b949e'}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': $'+fmt(c.parsed.y);}}}},
        scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:function(v){return '$'+v;}},grid:{color:'#21262d'}}}
      }
    });
  }

})();

/* === TAB SWITCHING === */
function showTab(name){
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
  /* Trigger chart resize for hidden tabs */
  window.dispatchEvent(new Event('resize'));
}
</script>
