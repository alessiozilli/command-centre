.tip-box{background:#0d1117;border-left:3px solid #58a6ff;padding:12px 16px;margin:10px 0;border-radius:0 8px 8px 0;font-size:14px}
.version-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;background:#58a6ff22;color:#58a6ff;margin-right:6px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-active{background:#3fb950}.status-parked{background:#d29922}.status-free{background:#58a6ff}

/* daily map */
var dMap={};S.forEach(function(s){dMap[s.date]=(dMap[s.date]||0)+s.estCostCAD});
var dDates=Object.keys(dMap).sort(), dCosts=dDates.map(function(d){return dMap[d]});
var cumCosts=[],run=0;dCosts.forEach(function(c){run+=c;cumCosts.push(run)});
var activeDays=dDates.length||1, avgDaily=totalCost/activeDays;

/* models */
var models={};S.forEach(function(s){if(!models[s.model])models[s.model]={n:0,c:0};models[s.model].n++;models[s.model].c+=s.estCostCAD});

/* projects */
var proj={};S.forEach(function(s){if(!proj[s.project])proj[s.project]={n:0,t:0,c:0,k:0};var p=proj[s.project];p.n++;p.t+=s.turns;p.c+=s.estCostCAD;p.k+=(s.tokensInK||0)+(s.tokensOutK||0)+(s.tokensCachedK||0)});

/* weekly */
var wMap={};S.forEach(function(s){var w=getWeek(s.date);if(!wMap[w])wMap[w]={c:0,t:0,n:0,k:0};wMap[w].c+=s.estCostCAD;wMap[w].t+=s.turns;wMap[w].n++;wMap[w].k+=(s.tokensInK||0)+(s.tokensOutK||0)});
var weeks=Object.keys(wMap).sort();

/* cb version stats */
var cbStats={};S.forEach(function(s){if(!cbStats[s.cbVersion])cbStats[s.cbVersion]={n:0,c:0,t:0};cbStats[s.cbVersion].n++;cbStats[s.cbVersion].c+=s.estCostCAD;cbStats[s.cbVersion].t+=s.turns});

/* reset projection */
var resetDate=P.nextReset?new Date(P.nextReset):null;
var hoursToReset=resetDate?Math.max(0,(resetDate-now)/36e5):0;
var daysToReset=(hoursToReset/24).toFixed(1);
var projAtReset=totalCost+(avgDaily*parseFloat(daysToReset));
var underBudget=projAtReset<=P.costCAD;

/* current CB */
var curCB=V[V.length-1];

/* === SECTION RENDERERS === */
var R={};
var chartQueue=[];
var cid=0;
function nextId(){return'chart-'+(cid++)}

  }

    H+='<div class="stat-box"><div class="stat-value '+valCl(underBudget?0:100)+'">$'+fmt(projAtReset)+'</div><div class="stat-label">Projected at Reset</div></div>';

    H+='</div>';
    H+='<p style="font-size:14px;">'+(underBudget?'<span class="green">On track.</span> $'+fmt(P.costCAD-projAtReset)+' headroom at reset.':'<span class="danger">Over budget.</span> Reduce to $'+fmt(remaining/Math.max(1,parseFloat(daysToReset)))+'/day to stay within $'+P.costCAD+'.')+'</p>';

    H+='<div class="progress-label">'+cbPct+'% of ceiling</div></div>';
  }
  return H;
};

H+='</div>';

D.tabs.forEach(function(tab,i){
  H+='<div id="tab-'+tab.id+'" class="tab-content'+(i===0?' active':'')+'">';
  if(!tab.sections||tab.sections.length===0){
    H+='<div class="placeholder-card"><div class="ph-title">'+tab.label+'</div><div class="ph-desc">'+(tab.description||'This tab is ready for data. Add sections via JSON to activate it.')+'</div></div>';
  } else {
    tab.sections.forEach(function(sec){
      H+='<h2>'+(sec.title||'')+'</h2><div class="card">';

      H+=renderer(sec);

    });

/* === TAB SWITCHING === */
function showTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active')});
  var target=document.getElementById('tab-'+name);
  if(target)target.classList.add('active');
  if(btn)btn.classList.add('active');
  window.dispatchEvent(new Event('resize'));
}

/* === SHELL BRIDGE ===
   cc-shell.js renders subtabs in the unified banner. When user clicks
   a shell subtab, call showTab() so the engine's content swaps. Also
   push live computed stats into the shell's stats bar. */
document.addEventListener('cc-shell-ready', function(){
  if(!window.CC)return;
  // Sync initial subtab (whatever the shell restored from localStorage)
  var active=window.CC.getSubtab();
  if(active)showTab(active);
  // Future clicks on shell subtabs drive engine tabs
  window.CC.onSubtabChange(function(id){ showTab(id); });

  // Push live stats into the shell stats bar
  try{
    var D=window.DATA, P=D.plan, S=D.sessions;
    var sum=function(a,k){return a.reduce(function(s,x){return s+(x[k]||0)},0)};
    var fmt=function(n){return n.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})};
    var totalCost=sum(S,'estCostCAD'), remaining=P.costCAD-totalCost;
    var now=new Date(), dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    var daysLeft=Math.max(1,dim-now.getDate());
    var dMap={};S.forEach(function(s){dMap[s.date]=(dMap[s.date]||0)+s.estCostCAD});
    var activeDays=Object.keys(dMap).length||1;
    var pct=Math.min(100,totalCost/P.costCAD*100);
    window.CC.updateStats([
      { label:'Sessions',    value:S.length },
      { label:'Spent (CAD)', value:'$'+fmt(totalCost) },
      { label:'Remaining',   value:'$'+fmt(remaining), tone:pct<60?'ok':pct<85?'warn':'danger' },
      { label:'% of plan',   value:pct.toFixed(1)+'%' },
      { label:'Avg / day',   value:'$'+fmt(totalCost/activeDays) },
      { label:'Days left',   value:daysLeft }
    ]);
  }catch(e){ console.warn('[usage] stats bridge:',e); }
});
// Expose DATA so the bridge can read it (engine IIFE scopes it otherwise)
window.DATA=DATA;
</script>
